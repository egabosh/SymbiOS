---
# ============================================================================
# ACME PKI - Local Fallback CA for Certificate Management
# ============================================================================
# This component sets up a local ACME server (Pebble) that serves as a
# fallback for Let's Encrypt.
#
# Use cases for this Fallback PKI:
#   1. Fallback-CA: When Let's Encrypt is unreachable (no internet)
#   2. Local operation: Internal certificate service without external DNS
#   3. Dev/Test: ACME-compliant server for local development
#
# Simple flat PKI: single Root CA, no Intermediate CA.
# Pebble uses its own CA internally for ACME operations.
# The SymbiOS Root CA signs Traefik certs directly.
# ============================================================================

- name: ACME PKI - Set up local Fallback CA
  hosts: all
  gather_facts: true
  vars:
    acme_dir: "/home/docker/acme-pki"
    pki_dir: "{{ acme_dir }}/pki"
    ca_cert: "{{ pki_dir }}/ca/root-ca.pem"
    ca_key: "{{ pki_dir }}/ca/root-ca-key.pem"
    trust_bundle: "{{ pki_dir }}/ca-trust-bundle.pem"
    pki_cn: "SymbiOS Local CA"
    pki_org: "SymbiOS"
    traefik_dir: "/home/docker/traefik"
    pebble_port: "14000"
    pebble_mgmt_port: "15000"
    pebble_container: "acme-pki-pebble"
    pebble_ca_dir: "{{ acme_dir }}/pebble-ca"
    pebble_ca_cert: "{{ pebble_ca_dir }}/ca.pem"

  tasks:
    - name: Create directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0750"
        owner: root
        group: docker
      loop:
        - "{{ pki_dir }}/ca"
        - "{{ pki_dir }}/certs"
        - "{{ acme_dir }}/data/acme"
        - "{{ acme_dir }}"
        - "{{ pebble_ca_dir }}"
        - "{{ acme_dir }}/http-challenge"

    # ===== Root CA (flat PKI, no intermediate) =====
    - name: Generate Root CA Key
      ansible.builtin.shell: openssl genrsa -out {{ ca_key }} 4096
      args: { creates: "{{ ca_key }}" }

    - name: Self-sign Root CA Certificate
      ansible.builtin.shell: |
        openssl req -x509 -new -nodes -key "{{ ca_key }}" -sha256 -days 3650 \
          -out "{{ ca_cert }}" \
          -subj "/C=DE/ST=Local/L=Local/O={{ pki_org }}/CN={{ pki_cn }} Root CA" \
          -addext "basicConstraints=critical,CA:TRUE" \
          -addext "keyUsage=critical,keyCertSign,cRLSign" \
          -addext "subjectKeyIdentifier=hash"
      args: { creates: "{{ ca_cert }}" }

    - name: Create Trust Bundle (single Root CA)
      ansible.builtin.copy:
        src: "{{ ca_cert }}"
        dest: "{{ trust_bundle }}"
        mode: "0444"
        owner: root
        group: docker
        remote_src: yes

    # ===== Demo-Zertifikat (signiert direkt von Root CA) =====
    - name: Generate Demo Certificate Key + CSR
      ansible.builtin.shell: |
        openssl genrsa -out "{{ pki_dir }}/ca/demo-key.pem" 2048
        openssl req -new -sha256 \
          -key "{{ pki_dir }}/ca/demo-key.pem" \
          -out "{{ pki_dir }}/ca/demo.csr" \
          -subj "/C=DE/ST=Local/L=Local/O={{ pki_org }}/CN=traefik.{{ inventory_hostname }}"
      args: { creates: "{{ pki_dir }}/ca/demo.csr" }

    - name: Demo Certificate Extensions Config
      ansible.builtin.copy:
        content: |
          basicConstraints = CA:FALSE
          keyUsage = digitalSignature, keyEncipherment
          extendedKeyUsage = serverAuth
          subjectAltName = DNS:traefik.{{ inventory_hostname }},DNS:*.{{ inventory_hostname }}
        dest: "{{ pki_dir }}/ca/demo-ext.cnf"
        mode: "0644"

    - name: Sign Demo Certificate with Root CA
      ansible.builtin.shell: |
        openssl x509 -req -sha256 \
          -in "{{ pki_dir }}/ca/demo.csr" \
          -CA "{{ ca_cert }}" -CAkey "{{ ca_key }}" -CAcreateserial \
          -out "{{ pki_dir }}/certs/traefik-{{ inventory_hostname }}.pem" \
          -days 365 -extfile "{{ pki_dir }}/ca/demo-ext.cnf"
      args: { creates: "{{ pki_dir }}/certs/traefik-{{ inventory_hostname }}.pem" }

    # ===== Pebble ACME Server TLS =====
    - name: Generate Pebble Certificate Key
      ansible.builtin.shell: openssl genrsa -out "{{ pki_dir }}/pebble-key.pem" 2048
      args: { creates: "{{ pki_dir }}/pebble-key.pem" }

    - name: Pebble Certificate Extensions Config
      ansible.builtin.copy:
        content: |
          basicConstraints = CA:FALSE
          keyUsage = digitalSignature, keyEncipherment
          extendedKeyUsage = serverAuth
          subjectAltName = @alt_names
          [alt_names]
          DNS.1 = localhost
          DNS.2 = acme-pki-pebble
        dest: "{{ pki_dir }}/pebble-ext.cnf"
        mode: "0644"

    - name: Create Pebble CSR and Sign It
      ansible.builtin.shell: |
        openssl req -new -sha256 \
          -key "{{ pki_dir }}/pebble-key.pem" \
          -out "{{ pki_dir }}/pebble.csr" \
          -subj "/C=DE/ST=Local/L=Local/O={{ pki_org }}/CN=acme.{{ inventory_hostname }}" \
          -config "{{ pki_dir }}/pebble-ext.cnf"
        openssl x509 -req -sha256 \
          -in "{{ pki_dir }}/pebble.csr" \
          -CA "{{ ca_cert }}" -CAkey "{{ ca_key }}" -CAcreateserial \
          -out "{{ pki_dir }}/pebble-cert.pem" \
          -days 365 -extfile "{{ pki_dir }}/pebble-ext.cnf"
      args: { creates: "{{ pki_dir }}/pebble-cert.pem" }

    # ===== Traefik Integration =====
    - name: Copy Trust Bundle to Traefik
      ansible.builtin.copy:
        src: "{{ trust_bundle }}"
        dest: "{{ traefik_dir }}/providers/symbios-pki-ca.pem"
        mode: "0444"
        owner: root
        group: docker
        backup: yes

    - name: Copy Pebble Cert to Traefik
      ansible.builtin.copy:
        src: "{{ pki_dir }}/pebble-cert.pem"
        dest: "{{ traefik_dir }}/providers/acme-pki-cert.pem"
        mode: "0444"
        owner: root
        group: docker
        backup: yes

    - name: Copy Pebble Key to Traefik
      ansible.builtin.copy:
        src: "{{ pki_dir }}/pebble-key.pem"
        dest: "{{ traefik_dir }}/providers/acme-pki-key.pem"
        mode: "0444"
        owner: root
        group: docker
        backup: yes

    - name: Create Traefik ACME Resolver for Local PKI
      ansible.builtin.copy:
        content: |
          ---
          certificatesResolvers:
            symbios-pki:
              acme:
                # Local ACME server - fallback when Let's Encrypt is not available
                # Uses Docker container name "acme-pki-pebble" - no IP needed
                caServer: "https://{{ pebble_container }}:{{ pebble_port }}/dir"
                email: "admin@{{ inventory_hostname }}"
                storage: "/acme-pki/acme.json"
                httpChallenge:
                  entryPoint: http
                tlsChallenge: {}
          networks:
            traefik:
              external: true
        dest: "{{ traefik_dir }}/providers/acme-pki-resolver.yml"
        mode: "0444"
        owner: root
        group: docker
        backup: yes
      notify: Restart traefik

    - name: Write Pebble Config
      ansible.builtin.copy:
        content: |
          {
            "pebble": {
              "listenAddress": "0.0.0.0:{{ pebble_port }}",
              "managementListenAddress": "0.0.0.0:{{ pebble_mgmt_port }}",
              "certificate": "/test/pebble-cert.pem",
              "privateKey": "/test/pebble-key.pem",
              "httpPort": 8000, "tlsPort": 443,
              "eabAdminEmail": "admin@symbios-dev",
              "eabHmacKey": "acme-pki-eab-hmac-key",
              "eabKeyId": "acme-pki-eab-key-id",
              "policyFile": "/etc/pebble/policy.json"
            }
          }
        dest: "{{ acme_dir }}/pebble-config.json"
        mode: "0644"

    - name: Write Pebble Docker Compose
      ansible.builtin.copy:
        content: |
          # ============================================================================
          # ACME PKI - Pebble ACME Server
          # Fallback for Let's Encrypt during local operation without internet
          # ============================================================================
          services:
            pebble:
              image: ghcr.io/letsencrypt/pebble:latest
              container_name: {{ pebble_container }}
              restart: unless-stopped
              security_opt:
                - no-new-privileges:true
              networks:
                traefik: null
              ports:
                - "{{ pebble_port }}:{{ pebble_port }}"
                - "{{ pebble_mgmt_port }}:{{ pebble_mgmt_port }}"
              command:
                - "-config=/etc/pebble/config.json"
              volumes:
                - ./pki:/test
                - ./data/acme:/acme-data
                - ./pebble-config.json:/etc/pebble/config.json:ro
                - ./pebble-policy.json:/etc/pebble/policy.json:ro
                - /etc/localtime:/etc/localtime:ro
          networks:
            traefik:
              external: true
        dest: "{{ acme_dir }}/docker-compose.yml"
        mode: "0440"
        owner: root
        group: docker
        backup: yes
      notify: Restart pebble

    - name: Export Pebble CA Certificate
      ansible.builtin.uri:
        url: "https://localhost:{{ pebble_mgmt_port }}/roots/0"
        method: GET
        dest: "{{ pebble_ca_cert }}"
        validate_certs: no
        mode: "0644"
      register: pebble_ca_result
      ignore_errors: yes

    - name: Display PKI Summary
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - "ACME PKI - Local Fallback CA deployed successfully!"
          - "============================================================"
          - ""
          - "SymbiOS PKI (flat, single Root CA):"
          - "  Root CA:         {{ ca_cert }}"
          - "  Trust Bundle:    {{ trust_bundle }}"
          - ""
          - "Pebble ACME Server:"
          - "  Container:       {{ pebble_container }}"
          - "  ACME URL:        https://{{ pebble_container }}:{{ pebble_port }}"
          - "  CA Cert Export:  {{ pebble_ca_cert }}"
          - ""
          - "PKI Certificates:"
          - "  Demo Cert:       {{ pki_dir }}/certs/traefik-{{ inventory_hostname }}.pem"
          - "  Pebble TLS:      {{ pki_dir }}/pebble-cert.pem"
          - ""
          - "Traefik Resolver:  {{ traefik_dir }}/providers/acme-pki-resolver.yml"
          - ""
          - "FALLBACK PKI USAGE:"
          - "============================================================"
          - "certresolver=symbios-pki -> Uses local ACME server"
          - ""
          - "Note: The symbios-pki CA is a fallback when"
          - "Let's Encrypt is not available (no internet access)."
          - "============================================================"
      changed_when: false

  handlers:
    - name: Restart pebble
      ansible.builtin.shell: cd {{ acme_dir }} && docker compose up -d --force-recreate
      args: { chdir: "{{ acme_dir }}" }
    - name: Restart traefik
      ansible.builtin.shell: docker-compose up -d --force-recreate
      args: { chdir: "{{ traefik_dir }}" }
