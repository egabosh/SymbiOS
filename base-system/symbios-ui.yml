---
- name: symbios-ui
  hosts: all

  vars:
    service_name: "symbios-ui"
    service_domain: "{{ symbios_domain }}"
    docker_path: "/home/docker/{{ service_name }}"

  tasks:

    - name: Create required directories
      ansible.builtin.file:
        path: "{{ docker_path }}/{{ item.path }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
        state: directory
      loop:
        - { path: "", owner: root, group: docker, mode: "0550" }
        - { path: "log", owner: "10000", group: "10000", mode: "0770" }
        - { path: "config", owner: "10000", group: "10000", mode: "0770" }
        - { path: "webui", owner: "10000", group: "10000", mode: "0770" }

    - name: Dockerfile
      ansible.builtin.copy:
        src: /home/SymbiOS/webui/Dockerfile
        dest: "{{ docker_path }}/Dockerfile"
        owner: root
        group: docker
        mode: "0440"
      notify: Restart {{ service_name }}

    - name: docker-compose.yml
      ansible.builtin.blockinfile:
        path: "{{ docker_path }}/docker-compose.yml"
        create: yes
        mode: "0440"
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          services:

            symbios-webui:
              build:
                context: .
                dockerfile: Dockerfile
              volumes:
                - ./webui:/app
                - ./config:/config
                - ./log:/log
                - /var/log:/var/log:ro
              restart: unless-stopped
              environment:
                - PYTHONUNBUFFERED=1
                - CONFIG_PATH=/config/inventory.yml
                - LDAP_URI=ldap://openldap
                - DJANGO_SECRET_KEY={{ lookup("password", "/home/docker/symbios-ui/.django_secret_key length=50 chars=ascii_letters,digits") }}
              extra_hosts:
                - "host.docker.internal:host-gateway"
              labels:
                - traefik.enable=true
                - traefik.http.routers.{{ service_name }}.rule=Host(`{{ service_domain }}`)
                - traefik.http.routers.{{ service_name }}.entrypoints=https
                - traefik.http.routers.{{ service_name }}.tls=true
                - traefik.http.services.{{ service_name }}.loadbalancer.server.port=8080
                - traefik.http.routers.{{ service_name }}.service={{ service_name }}
                - traefik.http.routers.{{ service_name }}.tls.certresolver={{ acme_resolver }}
                - traefik.docker.network=traefik
              networks:
                - traefik

          networks:
            traefik:
              external: true
        backup: yes
      notify: Restart {{ service_name }}

    - name: Sync webui source
      ansible.builtin.synchronize:
        src: /home/SymbiOS/webui/
        dest: "{{ docker_path }}/webui/"
        delete: yes
        recursive: yes
        rsync_opts:
          - "--exclude=__pycache__"
          - "--exclude=db.sqlite3"
          - "--exclude=*.pyc"
      notify: Restart {{ service_name }}

    - name: Set permissions
      ansible.builtin.command:
        cmd: "chmod -R o+r {{ docker_path }}/webui"
      changed_when: false

    - name: Copy symbios-configd.sh
      ansible.builtin.copy:
        src: /home/SymbiOS/symbios-configd.sh
        dest: /usr/local/sbin/symbios-configd.sh
        owner: root
        group: root
        mode: "0755"

    - name: Install symbios-configd systemd service
      ansible.builtin.copy:
        content: "[Unit]\nDescription=SymbiOS Config Daemon\nAfter=network.target docker.service\n\n[Service]\nType=simple\nExecStart=/usr/local/sbin/symbios-configd.sh\nRestart=always\nRestartSec=10\n\n[Install]\nWantedBy=multi-user.target\n"
        dest: /etc/systemd/system/symbios-configd.service
        mode: "0644"
      notify:
        - Reload systemd
        - Enable configd

  handlers:

    - name: Restart {{ service_name }}
      ansible.builtin.shell: docker compose build --no-cache && docker compose down && docker compose up -d
      args:
        chdir: "{{ docker_path }}"

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable configd
      ansible.builtin.systemd:
        name: symbios-configd
        enabled: yes
        state: started
