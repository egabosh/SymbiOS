---
- name: symbios-ui
  hosts: all

  vars:
    service_name: "symbios-ui"
    service_domain: "{{ symbios_domain }}"
    docker_path: "/home/docker/{{ service_name }}"

  tasks:

    - name: Create required directories
      ansible.builtin.file:
        path: "{{ docker_path }}/{{ item.path }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
        state: directory
      loop:
        - { path: "", owner: root, group: docker, mode: "0550" }
        - { path: "log", owner: "10000", group: "10000", mode: "0770" }
        - { path: "config", owner: "10000", group: "10000", mode: "0770" }
        - { path: "webui", owner: "10000", group: "10000", mode: "0770" }

    - name: Dockerfile
      ansible.builtin.copy:
        src: /home/SymbiOS/webui/Dockerfile
        dest: "{{ docker_path }}/Dockerfile"
        owner: root
        group: docker
        mode: "0440"
      notify: Restart {{ service_name }}

    - name: docker-compose.yml
      ansible.builtin.blockinfile:
        path: "{{ docker_path }}/docker-compose.yml"
        create: yes
        mode: "0440"
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          services:

            symbios-webui:
              build:
                context: .
                dockerfile: Dockerfile
              volumes:
                - ./webui:/app
                - ./config:/config
                - ./log:/log
                - /var/log:/var/log:ro
                - /var/lib/docker/containers:/docker/containers:ro
                - type: tmpfs
                  target: /app/db
                  tmpfs:
                    mode: 511
              restart: unless-stopped
              environment:
                - PYTHONUNBUFFERED=1
                - CONFIG_PATH=/config/inventory.yml
                - LDAP_URI=ldap://openldap
                - HOME=/app
                - DJANGO_SECRET_KEY={{ lookup("password", "/home/docker/symbios-ui/.django_secret_key length=50 chars=ascii_letters,digits") }}
              extra_hosts:
                - "host.docker.internal:host-gateway"
              labels:
                - traefik.enable=true
                - traefik.http.routers.{{ service_name }}.rule=Host(`{{ service_domain }}`)
                - traefik.http.routers.{{ service_name }}.entrypoints=https
                - traefik.http.routers.{{ service_name }}.middlewares=secHeaders@file,authelia@file
                - traefik.http.routers.{{ service_name }}.tls=true
                - traefik.http.services.{{ service_name }}.loadbalancer.server.port=8080
                - traefik.http.routers.{{ service_name }}.service={{ service_name }}
                - traefik.http.routers.{{ service_name }}.tls.certresolver={{ acme_resolver }}
                - traefik.docker.network=traefik
              networks:
                - traefik

          networks:
            traefik:
              external: true
        backup: yes
      notify: Restart {{ service_name }}

    - name: Sync webui source
      ansible.builtin.copy:
        src: /home/SymbiOS/webui/
        dest: "{{ docker_path }}/webui/"
        mode: preserve
      notify: Restart {{ service_name }}

    - name: Set permissions
      ansible.builtin.command:
        cmd: "chmod -R o+r {{ docker_path }}/webui"
      changed_when: false

    - name: Copy symbios-configd.sh
      ansible.builtin.copy:
        src: /home/SymbiOS/symbios-configd.sh
        dest: /usr/local/sbin/symbios-configd.sh
        owner: root
        group: root
        mode: "0755"

    - name: Install symbios-configd systemd service
      ansible.builtin.copy:
        content: "[Unit]\nDescription=SymbiOS Config Daemon\nAfter=network.target docker.service\n\n[Service]\nType=simple\nExecStart=/usr/local/sbin/symbios-configd.sh\nRestart=always\nRestartSec=10\n\n[Install]\nWantedBy=multi-user.target\n"
        dest: /etc/systemd/system/symbios-configd.service
        mode: "0644"
      notify:
        - Reload systemd
        - Enable configd

    - name: Ensure symbios-configd is enabled and running
      ansible.builtin.systemd:
        name: symbios-configd
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:

    - name: Restart {{ service_name }}
      ansible.builtin.shell: |
        if docker compose build --no-cache
        then
          if docker compose down
          then
            docker compose up -d
          fi
        fi
      args:
        chdir: "{{ docker_path }}"

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable configd
      ansible.builtin.systemd:
        name: symbios-configd
        enabled: yes
        state: started


- name: setup-infrastructure
  hosts: all
  become: yes
  tasks:
    - name: Copy container-index.sh
      ansible.builtin.copy:
        dest: /usr/local/bin/symbios-container-index.sh
        content: |
          #!/bin/bash

          # Index file storing Docker container information
          g_index_file=/home/docker/symbios-ui/log/docker-containers.tsv
          g_temp_file="${g_index_file}.tmp"

          # Write current container list to temp file
          docker ps --no-trunc --format '{% raw %}{{.ID}}\t{{.Names}}{% endraw %}' > "$g_temp_file" 2>/dev/null

          # Atomically replace index file
          mv "$g_temp_file" "$g_index_file"

          # Set permissions on index file
          chmod 644 "$g_index_file"

          # Grant read and execute on containers directory
          setfacl -m u:10000:rx /var/lib/docker/containers/ 2>/dev/null

          # Grant read and execute on each container subdirectory
          for d in /var/lib/docker/containers/*/
          do
            setfacl -m u:10000:rx "$d" 2>/dev/null
          done

          # Grant read permission on each JSON log file
          for f in /var/lib/docker/containers/*/*-json.log
          do
            setfacl -m u:10000:r "$f" 2>/dev/null
          done
        mode: "0755"
        owner: root
        group: root

    - name: Copy service-status.sh
      ansible.builtin.copy:
        dest: /usr/local/bin/symbios-service-status.sh
        content: |
          #!/bin/bash

          # File storing system service statuses
          g_file=/home/docker/symbios-ui/log/symbios-services.tsv
          g_tmp="${g_file}.tmp"

          # Write status for each service to temp file
          for svc in symbios-configd
          do
            # Get service status, fall back to "unknown" on failure
            if ! g_status=$(systemctl is-active "$svc" 2>/dev/null)
            then
              g_status="unknown"
            fi
            echo -e "${svc}\t${g_status}"
          done > "$g_tmp"

          # Set permissions on temp file
          chmod 644 "$g_tmp"

          # Atomically replace status file
          mv "$g_tmp" "$g_file"
        mode: "0755"
        owner: root
        group: root

    - name: Install container-index systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/symbios-container-index.service
        content: |
          [Unit]
          Description=Write Docker container index to /var/run
          After=docker.service

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/symbios-container-index.sh
          User=root
          Group=root

    - name: Install container-index systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/symbios-container-index.timer
        content: |
          [Unit]
          Description=Update Docker container index every 60s

          [Timer]
          OnBootSec=30
          OnUnitActiveSec=60
          Unit=symbios-container-index.service

          [Install]
          WantedBy=timers.target

    - name: Install service-status systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/symbios-service-status.service
        content: |
          [Unit]
          Description=Write system service statuses to /var/run

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/symbios-service-status.sh
          User=root
          Group=root

    - name: Install service-status systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/symbios-service-status.timer
        content: |
          [Unit]
          Description=Update service statuses every 60s

          [Timer]
          OnBootSec=35
          OnUnitActiveSec=60
          Unit=symbios-service-status.service

          [Install]
          WantedBy=timers.target

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable container-index timer
      ansible.builtin.systemd:
        name: symbios-container-index.timer
        enabled: yes
        state: started

    - name: Enable service-status timer
      ansible.builtin.systemd:
        name: symbios-service-status.timer
        enabled: yes
        state: started
