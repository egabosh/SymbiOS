---
- name: traefik
  hosts: all
  tasks:

    - name: /home/docker/traefik/default-basic-auth-genpw.sh (generate Random PW for default-basic-auth)
      blockinfile:
        path: /home/docker/traefik/default-basic-auth-genpw.sh
        create: yes
        mode: 0550
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Change to traefik configuration directory
          cd /home/docker/traefik
          # Set default admin username
          f_user=admin
          # Generate a random 32-character password
          f_password=$(pwgen -s 32 1)

          # Create env file with placeholders if it does not exist yet
          if ! [ -f default-basic-auth-env ]
          then
            echo "USER=!USER!
          PASSWORD=!PASSWORD!
          " >default-basic-auth-env
          fi

          # Restrict access to the env file
          chmod 440 default-basic-auth-env
          chown root:docker default-basic-auth-env
          # Substitute placeholders with actual credentials
          sed -i "s/\!USER\!/$f_user/g" default-basic-auth-env
          sed -i "s/\!PASSWORD\!/$f_password/g" default-basic-auth-env

          # Load credentials and generate htpasswd entry for basic auth
          . default-basic-auth-env
          mkdir -p providers
          htpasswd -nb "$USER" "$PASSWORD" >providers/default-basic-auth.usersfile

        backup: yes
        validate: /bin/bash -n %s

    - name: /home/docker/traefik/default-basic-auth-genpw.sh shebang
      lineinfile:
        path: /home/docker/traefik/default-basic-auth-genpw.sh
        insertbefore: BOF
        line: "#!/bin/bash -e"

    # Generate initial htpasswd if the users file does not exist yet
    - name: Gen initial password if not exists
      ansible.builtin.shell: ./default-basic-auth-genpw.sh
      args:
        chdir: /home/docker/traefik
        creates: /home/docker/traefik/providers/default-basic-auth.usersfile

    - name: /home/docker/traefik/docker-compose.yml Traefik Container Configuration
      ansible.builtin.copy:
        content: |
          # BEGIN ANSIBLE MANAGED BLOCK

          services:
            traefik:
              image: traefik:latest
              command:
                # Be careful in production as it exposes the traffic you might not want to expose.
                - --log.level=ERROR
                # http -> https redirect
                - --entrypoints.http.address=:80
                - --entrypoints.http.http.redirections.entryPoint.to=https
                - --entrypoints.http.http.redirections.entryPoint.scheme=https
                - --entrypoints.http.http.redirections.entrypoint.permanent=true
                # https
                - --entrypoints.https.address=:443
                - --entrypoints.https.http.encodedcharacters.allowencodedsemicolon=true
                - --entrypoints.https.http.encodedcharacters.allowencodedpercent=true
                - --entrypoints.https.http.encodedcharacters.allowencodedquestionmark=true
                - --entrypoints.https.http.encodedcharacters.allowencodedhash=true
                # ldaps
                - --entrypoints.ldaps.address=:636
                # Docker
                - --providers.docker=true
                - --providers.docker.endpoint=unix:///var/run/docker.sock
                - --providers.docker.exposedByDefault=false
                # Traefik
                - --api=true
                - --api.dashboard=true
                - --api.insecure=false
                # LetsEncrypt 
                # Staging Server - uncomment when testing
                #- --certificatesResolvers.letsencrypt.acme.caServer=https://acme-staging-v02.api.letsencrypt.org/directory
                - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
                - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=http
                - --certificatesresolvers.letsencrypt.acme.email=ssl@{{ default_domain }}
                - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
                # ACME PKI (SymbiOS local CA)
                - --certificatesresolvers.symbios-pki.acme.caServer=https://acme-pki-stepca:9000/acme/acme/directory
                - --certificatesresolvers.symbios-pki.acme.httpChallenge.entryPoint=http
                - --certificatesresolvers.symbios-pki.acme.email=admin@local
                - --certificatesresolvers.symbios-pki.acme.storage=/acme-pki/acme.json
                # non-docker services
                - --providers.file=true
                - --providers.file.directory=/etc/traefik/providers.local
                - --providers.file.watch=true
                # log
                - --accesslog.filepath=/log/access.log
                - --accesslog.format=json
              container_name: traefik
              restart: unless-stopped
              security_opt:
                - no-new-privileges:true
              networks:
                traefik:
                  ipv4_address: 192.168.41.200
              ports:
                - 80:80
                - 443:443
                - 636:636
              volumes:
                - /etc/localtime:/etc/localtime:ro
                - /var/run/docker.sock:/var/run/docker.sock:ro
                - ./letsencrypt:/letsencrypt
                - ./providers:/etc/traefik/providers.local
                - ./log:/log
                - /home/docker/acme-pki/data/acme:/acme-pki
                - ./ca-bundle.crt:/etc/ssl/certs/ca-certificates.crt:ro
              labels:
                - traefik.enable=true
                - traefik.http.routers.traefik.rule=Host(`traefik.{{ default_domain }}`)
                - traefik.http.routers.traefik.entrypoints=https
                - traefik.http.routers.traefik.middlewares=secHeaders@file,authelia@file
                - traefik.http.routers.traefik.service=api@internal
                - traefik.http.routers.traefik.tls=true
                - traefik.http.routers.traefik.tls.certresolver={{ acme_resolver }}
                - traefik.http.middlewares.to-https.redirectscheme.scheme=https
          networks:
            traefik:
              external: true
          # END ANSIBLE MANAGED BLOCK
        dest: /home/docker/traefik/docker-compose.yml
        mode: '0440'
        owner: root
        group: docker
      notify: Restart traefik


    - name: Create empty ca-bundle for Traefik
      ansible.builtin.copy:
        content: ""
        dest: /home/docker/traefik/ca-bundle.crt
        force: no
        owner: root
        group: docker
        mode: "0644"

    - name: Create traefik dir
      ansible.builtin.file:
        path: /home/docker/traefik/providers
        owner: root
        group: docker
        state: directory
        mode: '0755'

    - name: Defaults for TLS,...
      blockinfile:
        path: /home/docker/traefik/providers/_default.yml
        create: yes
        mode: 0444
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          ---
          tls:
            options:
              default:
                minVersion: VersionTLS12
                cipherSuites:
                  - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384   # TLS 1.2
                  - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305    # TLS 1.2
                  - TLS_AES_256_GCM_SHA384                  # TLS 1.3
                  - TLS_CHACHA20_POLY1305_SHA256            # TLS 1.3
                curvePreferences:
                  - CurveP521
                  - CurveP384
                sniStrict: true
          http:
            middlewares:
              secHeaders:
                compress: false
                headers:
                  browserXssFilter: true
                  contentTypeNosniff: true
                  frameDeny: true
                  # HSTS Configuration
                  forceSTSHeader: true
                  stsIncludeSubdomains: true
                  stsPreload: true
                  stsSeconds: 31536000
                  customFrameOptionsValue: "SAMEORIGIN"
                  sslProxyHeaders:
                    X-Forwarded-Proto: "https"
              authelia:
                forwardAuth:
                  address: "http://authelia.local:9091/api/authz/forward-auth?authelia_url=https://auth.{{ default_domain }}"
                  trustForwardHeader: true
                  authResponseHeaders:
                    - "X-Forwarded-Remote-User"
                    - "X-Forwarded-Remote-Groups"
                    - "X-Forwarded-Remote-Name"
                    - "X-Forwarded-Remote-Email"
                    - "X-Forwarded-Method"
              default-basic-auth:
                basicAuth:
                  usersFile: "/etc/traefik/providers.local/default-basic-auth.usersfile"
              allowlocalipsonly:
                ipAllowList:
                  sourceRange:
                    - "127.0.0.1/32"
                    - "192.168.0.0/16"
                    - "172.16.0.0/12"
                    - "10.0.0.0/8"
                    - "fe80::/10"
                    - "fc00::/7"
                    - "::1/128"
                  ipStrategy:
                    ipv6Subnet: 64
      notify: Restart traefik

    # Script to run Qualys SSL Labs scan against all Traefik-hosted services
    - name: /usr/local/sbin/traefik-qualys-ssl-labs-check.sh
      blockinfile:
        path: /usr/local/sbin/traefik-qualys-ssl-labs-check.sh
        mode: "0700"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          . /etc/bash/gaboshlib.include
          g_lockfile
          g_nice
          g_all-to-syslog
          g_echo_ok "Starting $0"

          # Using official ssllabs-scan API client
          # https://www.ssllabs.com/projects/ssllabs-apis/
          # https://github.com/ssllabs/ssllabs-scan/

          # Download and build ssllabs-scan if not already installed
          if ! [ -f /usr/local/bin/ssllabs-scan ]
          then
            cd /tmp
            rm -rf ssllabs-scan
            # Clone the ssllabs-scan repository
            if ! git clone https://github.com/ssllabs/ssllabs-scan/
            then
              g_echo_error "Could not download ssllabs-scan"
            else
              cd ssllabs-scan
              make >"${g_tmp}/ssllabs-scan-make.out"
              if [ -f ssllabs-scan-v3 ]
              then
                cp ssllabs-scan-v3 /usr/local/bin/ssllabs-scan
                chmod 755 /usr/local/bin/ssllabs-scan
                chown root. /usr/local/bin/ssllabs-scan
              else
                g_echo_error "Could not build ssllabs-scan $(cat ${g_tmp}/ssllabs-scan-make.out)"
              fi
            fi
          fi

          # Scan every Traefik-hosted service
          if [ -f /usr/local/bin/ssllabs-scan ]
          then
            # Collect all hostnames from docker-compose files
            find /home/docker -maxdepth 1 -mindepth 1 -type d | grep -E -v "\.del$|\.bak$|\.old$|var-lib-docker$" | while read f_dir
            do
              if grep -q Host "$f_dir"/docker-compose.override.yml >/dev/null 2>&1
              then
                grep Host "$f_dir"/docker-compose.override.yml >>"$g_tmp/hosts"
              else
                if [ -f "$f_dir"/docker-compose.yml ]
                then
                  grep Host "$f_dir"/docker-compose.yml >>"$g_tmp/hosts"
                fi
              fi
            done
            grep Host /home/docker/traefik/providers/*.yml >>"$g_tmp/hosts"

            # Iterate over unique hostnames and run ssllabs-scan
            cat "$g_tmp/hosts" | cut -d '`' -f2 | sort -u | while read f_host
            do
              f_resultfile="/tmp/ssllabs-scan-result-$$-$f_host"

              # Skip if host is not resolvable
              if ! host "${f_host}" >/dev/null 2>&1
              then
                continue
              fi
              # Skip if host does not respond to HTTPS
              if ! curl -s "https://${f_host}" >/dev/null 2>&1
              then
                continue
              fi

              # Initialize result file with empty JSON array
              echo '[]' >"$f_resultfile"

              # Poll until ssllabs-scan returns a non-empty result
              while cat "$f_resultfile" | jq -r | grep -E -q '^\[\]$'
              do
                until ssllabs-scan --quiet "${f_host}" >"$f_resultfile"
                do
                  sleep 60
                done
                sleep 60
              done

              # Extract grade for each endpoint
              cat "$f_resultfile" | jq '.[] | .endpoints | .[] | .grade' >"${g_tmp}/ssllabs-scan-result" 2>&1 >"${g_tmp}/ssllabs-scan-result"

              # Report grade; warn if not A+
              if ! grep -E -q 'A+|null' "${g_tmp}/ssllabs-scan-result"
              then
                g_echo_error "Qualys SSL Labs scan-result for ${f_host} not A+: $(cat ${g_tmp}/ssllabs-scan-result)

          https://www.ssllabs.com/ssltest/analyze.html?d=${f_host}&hideResults=on

          Result: $(cat ${g_tmp}/ssllabs-scan-result)"
              else
                g_echo_ok "Qualys SSL Labs scan-result for ${f_host}: $(cat ${g_tmp}/ssllabs-scan-result)"
              fi
              rm "$f_resultfile"
            done
          fi
        backup: yes
        validate: /bin/bash -n %s

    - name: /usr/local/sbin/traefik-qualys-ssl-labs-check.sh shebang
      lineinfile:
        path: /usr/local/sbin/traefik-qualys-ssl-labs-check.sh
        insertbefore: BOF
        line: "#!/bin/bash"

    # Check script run by runchecks framework to verify Traefik hosts are reachable
    - name: /usr/local/sbin/runchecks.d/traefik.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/traefik.check
        mode: "0700"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          . /etc/bash/gaboshlib.include

          # Truncate hosts file and collect all hostnames from docker-compose
          >"$g_tmp/hosts"
          find /home/docker -maxdepth 1 -mindepth 1 -type d | grep -E -v "\.del$|\.bak$|\.old$|var-lib-docker$" | while read f_dir
          do
            # Skip directories marked as down
            if [ -s "$f_dir/.downok" ]
            then
              continue
            fi
            # Extract Host labels from docker-compose files
            if grep -q Host "$f_dir/docker-compose.override.yml" >/dev/null 2>&1
            then
              grep Host "$f_dir/docker-compose.override.yml" >>"$g_tmp/hosts"
            else
              if [ -f "$f_dir/docker-compose.yml" ]
              then
                grep Host "$f_dir/docker-compose.yml" >>"$g_tmp/hosts"
              fi
            fi
          done
          grep Host /home/docker/traefik/providers/*.yml >>"$g_tmp/hosts"

          # Ensure each host has a local /etc/hosts entry
          cat "$g_tmp/hosts" | cut -d '`' -f2 | sort -u | while read f_host
          do
            # Skip hosts checked within the last 5 minutes
            if find -mmin -5 "/tmp/$f_host" >/dev/null 2>&1 | grep -q "$f_host"
            then
              continue
            fi
            # Add host to /etc/hosts if not already present
            if ! grep -E -q "192.168.41.1  $f_host" /etc/hosts
            then
              echo "192.168.41.1  $f_host" >>/etc/hosts
            fi
          done

          # Verify each host is reachable via HTTP
          cat "$g_tmp/hosts" | grep -v tcp | cut -d '`' -f2 | sort -u | while read f_host
          do
            # Skip hosts checked within the last 5 minutes
            if find -mmin -5 "/tmp/$f_host" >/dev/null 2>&1 | grep -q "$f_host"
            then
              continue
            fi
            # Attempt HTTP connection with wget
            if ! wget --dns-timeout=120 -t5 --waitretry=120 --connect-timeout=300 --read-timeout=15 "http://${f_host}" >"${g_tmp}/traefik-wget-check" -O /dev/null 2>&1
            then
              # Report error only if it is not a known-auth response
              if ! grep -E -q "401 Unauthorized|403 Forbidden" "${g_tmp}/traefik-wget-check"
              then
                g_echo_error "Error while connecting ${f_host} with wget:

          $(cat ${g_tmp}/traefik-wget-check)"
              else
                if [ -f "${g_tmp}/$f_host-502" ]
                then
                  rm "${g_tmp}/$f_host-502"
                fi
              fi
              # Track persistent 502 errors
              if grep -E -q "502 Bad Gateway" "${g_tmp}/traefik-wget-check"
              then
                if [ -s "${g_tmp}/$f_host-502" ] && find "${g_tmp}/$f_host-502" | grep "$f_host-502" -mmin +15
                then
                  g_echo_error "Error while connecting ${f_host} with wget:
          $(cat ${g_tmp}/traefik-wget-check)"
                else
                  date >"${g_tmp}/$f_host-502"
                fi
              fi
            fi
          done
        backup: yes
        validate: /bin/bash -n %s

    - name: /etc/cron.d/traefik-qualys-ssl-labs-check_local
      blockinfile:
        path: /etc/cron.d/traefik-qualys-ssl-labs-check_local
        create: yes
        mode: 0644
        owner: root
        group: root
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          @daily root /usr/local/sbin/traefik-qualys-ssl-labs-check.sh
        backup: yes

    - name: Allow http from all clients
      community.general.ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Allow https from all clients
      community.general.ufw:
        rule: allow
        port: '443'
        proto: tcp

    - name: Allow access from br-traefik to Docker-Host for services running without docker
      community.general.ufw:
        rule: allow
        interface: br-traefik
        direction: in

    - name: Install logrotate for Traefik access log
      ansible.builtin.copy:
        dest: /etc/logrotate.d/traefik
        mode: '0644' 
        content: |
          /home/docker/traefik/log/access.log {
              daily
              rotate 7
              compress
              delaycompress
              missingok
              notifempty
              copytruncate
          }

  handlers:

    - name: Restart traefik
      ansible.builtin.shell: docker-compose up -d --force-recreate
      args: { chdir: /home/docker/traefik }
