- name: authelia
  hosts: all

  vars:
    service_name: "authelia"
    symbios_domain: "{{ base_domain }}"
    authelia_domain: "auth.{{ base_domain }}"
    traefik_domain: "traefik.{{ base_domain }}"
    service_domain: "{{ authelia_domain }}"
    service_path: "/home/docker/{{ service_name }}"
    ldap_service_path: "/home/docker/ldap"

  tasks:


    - name: "Create {{ service_path }} dir"
      ansible.builtin.file:
        path: "{{ service_path }}"
        owner: root
        group: docker
        state: directory
        mode: '0550'

    - name: Check if Authelia secrets exists
      stat:
        path: "{{ service_path }}/env"
      register: authelia_conf_status

    - name: Generate Authelia secrets
      when: not authelia_conf_status.stat.exists
      block:

        # Generate session secret via pwgen
        - name: Generate a secure password using pwgen
          command: pwgen -s 32 1
          register: session_secret

        # Generate encryption key via pwgen
        - name: Generate a secure password using pwgen
          command: pwgen -s 32 1
          register: encryption_key

        # Save plaintext secrets to env file
        - name: Save plaintext password to env file
          copy:
            content: |
              session_secret={{ session_secret.stdout }}
              encryption_key={{ encryption_key.stdout }}
            dest: "{{ service_path }}/env"
            mode: '0440'
            owner: docker
            group: root

    # Read session secret from env file
    - name: Get session_secret from file
      shell: "grep ^session_secret= {{ service_path }}/env | cut -d= -f2-"
      register: session_secret
      changed_when: false

    # Read encryption key from env file
    - name: Get encryption_key from file
      shell: "grep ^encryption_key= {{ service_path }}/env | cut -d= -f2-"
      register: encryption_key
      changed_when: false

    # Read LDAP admin password from the OpenLDAP env file
    - name: Get LDAP admin password from file
      shell: "grep ^LDAP_ADMIN_PASSWORD= {{ ldap_service_path }}/env.openldap | cut -d= -f2-"
      register: ldap_admin_password
      changed_when: false

    - name: Check if admin user has mail attribute in LDAP
      shell: >
        docker compose exec -T openldap
        ldapsearch -x -H ldap://localhost -D "cn=head-of-ldap,{{ldap_basedn}}"
        -w "{{ ldap_admin_password.stdout }}"
        -b "uid=admin,ou=users,{{ldap_basedn}}" mail 2>/dev/null
        | grep -q "^mail:"
      args:
        chdir: "{{ ldap_service_path }}"
      register: admin_mail_check
      changed_when: false
      failed_when: false

    - name: Set admin_has_mail fact
      set_fact:
        admin_has_mail: "{{ admin_mail_check.rc == 0 }}"
      changed_when: false

    - name: "{{ service_path }}/authelia-data/configuration.yml"
      blockinfile:
        path: "{{ service_path }}/authelia-data/configuration.yml"
        mode: "0600"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          session:
            secret: "{{ session_secret.stdout }}"
            name: {{ authelia_domain }}_session
            same_site: lax
            expiration: 16h
            inactivity: 4h
            remember_me: 1M
            cookies:
              - domain: "{{ base_domain }}"
                authelia_url: https://{{ authelia_domain }}
              {% if ddns_host is defined and ddns_host and ddns_host != base_domain %}
              - domain: "{{ ddns_host }}"
                authelia_url: https://{{ authelia_domain }}
              {% endif %}

          storage:
            local:
              path: /config/db.sqlite3
            encryption_key: "{{encryption_key.stdout}}"

          authentication_backend:
            password_reset:
              disable: true
            ldap:
              implementation: custom
              address: ldap://openldap:389
              base_dn: "{{ldap_basedn}}"
              additional_users_dn: "ou=users"
              additional_groups_dn: "ou=groups"
              user: "cn=head-of-ldap,{{ldap_basedn}}"
              password: "{{ ldap_admin_password.stdout }}"
              attributes:
                username: uid
                display_name: cn
                mail: mail
              users_filter: "(&({username_attribute}={input})(objectClass=posixAccount))"
              groups_filter: "(&(objectClass=posixGroup)(memberUid={input}))"

          totp:
            disable: {{ not (twofa_enabled | default(false) | bool and admin_has_mail | default(false) | bool) }}
            issuer: {{ authelia_domain }}
            algorithm: sha1
            digits: 6
            period: 30
            skew: 1
          webauthn:
            disable: {{ not (twofa_enabled | default(false) | bool and admin_has_mail | default(false) | bool) }}

        backup: yes
      notify:
      - Restart authelia


    - name: Check if mail settings are given (needed by 2FA)
      stat:
        path: /home/docker/_defaults/mailclient
      register: authelia_mail

    - name: generate authelia notifier dummy to notifications.txt
      when: not authelia_mail.stat.exists
      block:
       - name: "{{ service_path }}/authelia-data/configuration.yml notifications.txt dummy notifier"
         blockinfile:
           path: "{{ service_path }}/authelia-data/configuration.yml"
           mode: "0600"
           owner: root
           group: root
           create: yes
           marker: "# {mark} ANSIBLE MANAGED BLOCK NOTIFICATION"
           block: |

             notifier:
               disable_startup_check: true
               filesystem:
                 filename: /config/notifications.txt

           backup: yes
         notify:
         - Restart authelia

       - name: create check file for default authorization_policy
         ansible.builtin.copy:
           dest: "{{ service_path }}/authorization_policy"
           content: "one_factor"
           mode: "0644"


    - name: generate authelia notifier mail
      when: authelia_mail.stat.exists
      block:

       - name: "{{ service_path }}/authelia-data/configuration.yml mail notifier"
         blockinfile:
           path: "{{ service_path }}/authelia-data/configuration.yml"
           mode: "0600"
           owner: root
           group: root
           create: yes
           marker: "# {mark} ANSIBLE MANAGED BLOCK NOTIFICATION"
           block: |
             notifier:
               disable_startup_check: true
               smtp:
                 username: "{{ smtp_from if smtp_user == '%EMAILADDRESS%' else smtp_user }}"
                 password: {{ smtp_password }}
                 address: {{ smtp_server }}:{{ smtp_port }}
                 sender: {{ smtp_from }}
                 subject: "[{{ authelia_domain }}] Notification"
                 startup_check_address: {{ smtp_from }}
                 identifier: "authelia"
                 timeout: 15s

           backup: yes
         notify: Restart authelia

       - name: create check file for default authorization_policy
         ansible.builtin.copy:
           dest: "{{ service_path }}/authorization_policy"
           content: "one_factor"
           mode: "0644"


    - name: "{{ service_path }}/authelia-data/configuration.yml default domain"
      blockinfile:
        path: "{{ service_path }}/authelia-data/configuration.yml"
        mode: "0600"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK ACCESS CONTROL"
        block: "{{ lookup('template', '/home/SymbiOS/base-system/authelia-access-control.j2') }}"

        backup: yes
      notify: Restart authelia

    - name: "{{ service_path }}/docker-compose.yml Container Configuration"
      blockinfile:
        path: "{{ service_path }}/docker-compose.yml"
        create: yes
        mode: 0440
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          services:

            authelia.local:
              image: authelia/authelia:latest
              restart: unless-stopped
              networks:
                authelia:
                traefik:
                  aliases:
                    - authelia
                ldap:
              volumes:
                - ./authelia-data:/config
                - /etc/localtime:/etc/localtime:ro
                - /etc/hosts:/etc/hosts:ro
              labels:
                - traefik.enable=true
                # HTTPS
                - traefik.http.routers.authelia-default.rule=Host(`{{ authelia_domain }}`)
                - traefik.http.routers.authelia-default.entrypoints=https
                - traefik.http.routers.authelia-default.tls=true
                # Proxy to service-port
                - traefik.http.services.authelia-default.loadbalancer.server.port=9091
                - traefik.http.routers.authelia-default.service=authelia-default
                # cert via letsencrypt
                - traefik.http.routers.authelia-default.tls.certresolver={{ acme_resolver }}
                # Traefik network
                - traefik.docker.network=traefik
                # auth
                - traefik.http.routers.authelia-default.middlewares=secHeaders@file

          networks:
            authelia:
              driver: bridge
              driver_opts:
                com.docker.network.bridge.name: br-authelia
            ldap:
              external: false
            traefik:
              external: true

        backup: yes        
      notify: Restart authelia


    #### OIDC (Open ID Connect)
 
    # Generate RSA key pair for OIDC signing
    - name: generate RSA key pair for OIDC
      ansible.builtin.command: >
        docker run --rm -v "{{ service_path }}/authelia-data:/config" authelia/authelia:latest authelia crypto pair rsa generate --directory /config --file.private-key oidc.key --file.public-key oidc.pub
      args:
        creates: "{{ service_path }}/authelia-data/oidc.key"

    # Read OIDC private key (raw, no indent — handled by Jinja2 filter)
    - name: OIDC Key aus Datei lesen
      ansible.builtin.command: >
        cat {{ service_path }}/authelia-data/oidc.key
      register: oidc_key
      changed_when: false

    - name: write OIDC config in configuration.yml
      ansible.builtin.blockinfile:
        path: "{{ service_path }}/authelia-data/configuration.yml"
        marker: "# {mark} ANSIBLE MANAGED BLOCK OIDC"
        block: |
          identity_providers:
            oidc:
              jwks:
                - key: |
                   {{ oidc_key.stdout | indent(9, first=False) }}
              cors:
                endpoints:
                  - "authorization"
                  - "token"
                  - "revocation"
                  - "introspection"
                  - "userinfo"
                allowed_origins_from_client_redirect_uris: true
              clients:
                # dummy client because authelia forces at least one client to work
                - client_id: 'dummy'
                  client_name: 'dummy'
                  client_secret: '$pbkdf2-sha512$310000$EXkvBmRZx/6476FyviXRZw$OpkrwApe5yPfrXJadOM8VUwQBjmo4rDD1SonNsuQ.6WgevPNKYQJrob404o1yHYbybQPJTRXuwnyKVLqtIhN.A' # random created dummy pw
        insertbefore: "^# BEGIN ANSIBLE MANAGED BLOCK ACCESS CONTROL"
        backup: yes
      notify: Restart authelia

    # Script to generate OIDC client secrets using Authelia's crypto tool
    - name: "Script for generating oidc client secrets"
      blockinfile:
        path: "{{ service_path }}/gen-oidc-client-secret.sh"
        mode: "0500"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          . /etc/bash/gaboshlib.include

          # Path argument: directory to store secrets
          f_secret_path=$1
          f_client_secret_file=$f_secret_path/oidc_password
          f_client_digest_file=$f_secret_path/oidc_digest

          # Exit early if secret already exists
          if [ -s "$f_client_secret_file" ]
          then
            exit 0
          fi

          # Create target directory if it does not exist yet
          if ! [ -d "$f_secret_path" ]
          then
            mkdir -p "$f_secret_path"
          fi

          # Create empty output files with restricted permissions
          touch "$g_tmp/output" "$f_client_secret_file" "$f_client_digest_file"
          chmod 400 "$g_tmp/output" "$f_client_secret_file" "$f_client_digest_file"

          # Generate a pbkdf2 hash via Authelia's crypto tool
          docker run --rm authelia/authelia:latest authelia crypto hash generate pbkdf2 --random --random.length 72 --random.charset alphanumeric >"$g_tmp/output"

          # Extract random password from output
          grep "^Random Password:" "$g_tmp/output" | cut -d" " -f3 >"$f_client_secret_file"

          # Extract digest hash from output
          grep "^Digest:" "$g_tmp/output" | cut -d" " -f2 >"$f_client_digest_file"
        backup: yes
        validate: /bin/bash -n %s
      notify: 

    - name: "gen-oidc-client-secret.sh shebang"
      lineinfile:
        path: "{{ service_path }}/gen-oidc-client-secret.sh"
        insertbefore: BOF
        line: "#!/bin/bash"


  handlers:

    - name: Restart authelia
      ansible.builtin.shell: docker compose up -d --force-recreate
      args: { chdir: "{{ service_path }}" }

