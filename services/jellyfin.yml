    - name: /home/docker/jellyfin/docker-compose.yml Container Configuration
      blockinfile:
        path: /home/docker/jellyfin/docker-compose.yml
        create: yes
        mode: 0440
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |

          name: ""

          services:

            jellyfin:
              image: jellyfin/jellyfin:latest
              container_name: jellyfin
              restart: unless-stopped
              #env_file: env
              user: "0:0"
              #environment:
              volumes:
                - ./data/config:/config
                - ./data/cache:/cache
                - /etc/localtime:/etc/localtime
              networks:
                - traefik
          # optional hardware acceleration
          #    devices:
          #      - /dev/dri:/dev/dri
          #      - /dev/vcsm:/dev/vcsm
          #      - /dev/vchiq:/dev/vchiq
          #      - /dev/video10:/dev/video10
          #      - /dev/video11:/dev/video11
          #      - /dev/video12:/dev/video12


          networks:
            traefik:
              external: true

        backup: yes
      notify: Restart jellyfin

    - name: Start jellyfin
      ansible.builtin.shell: docker compose up -d
      args:
        chdir: /home/docker/jellyfin

    - name: /home/docker/traefik/providers/jellyfin.yml Routing Configuration
      blockinfile:
        path: /home/docker/traefik/providers/jellyfin.yml
        create: yes
        mode: 0444
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          http:
            routers:
              jellyfin:
                rule: "Host(`jellyfin.{{ base_domain }}`)"
                service: jellyfin
                entryPoints:
                  - "https"
                tls:
                  certResolver: {{ acme_resolver }}
                middlewares:
                  - "secHeaders@file"
                  - "allowlocalipsonly@file"
            services:
              jellyfin:
                loadBalancer:
                  servers:
                    - url: "http://jellyfin:8096"
        backup: yes
      notify: Restart traefik

    - name: /usr/local/sbin/runchecks.d/symbios-healthcheck-jellyfin.check
      ansible.builtin.blockinfile:
        path: /usr/local/sbin/runchecks.d/symbios-healthcheck-jellyfin.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Healthcheck for jellyfin
          g_svc_url="https://{{ service_domain }}"
          g_check_file="${g_tmp}/symbios-healthcheck-jellyfin"
          if [ -f "$g_check_file" ] && find "$g_check_file" -mmin -5 | grep -q "$g_check_file"
          then
            return 2>/dev/null || true
          fi
          date > "$g_check_file"
          g_http_code=$(wget -q -O /dev/null --server-response --timeout=10 "$g_svc_url" 2>&1 | grep -oE "HTTP/[0-9.]+" | tail -1 | grep -oE "[0-9]+$")
          if [ -z "$g_http_code" ] || [ "$g_http_code" -ge 500 ]
          then
            g_echo_error "Healthcheck failed for jellyfin: HTTP $g_http_code from $g_svc_url"
          fi
        backup: yes
        validate: /bin/bash -n %s

