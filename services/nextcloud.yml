# docs:
#   short_description: Deploy the Nextcloud service
#   description: Deploys Nextcloud (file sync/collaboration) together with its database and storage, exposed via Traefik.
#   author: Oliver Bohlen
#   version: '1.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: Service
#   service_control:
#     services:
#     - name: nextcloud
#       type: docker
#       compose_file: /home/docker/nextcloud.{{ inventory_hostname }}/docker-compose.yml
#       install: docker compose -f /home/docker/nextcloud.{{ inventory_hostname }}/docker-compose.yml up -d
#       uninstall: docker compose -f /home/docker/nextcloud.{{ inventory_hostname }}/docker-compose.yml down -v
#       reinstall: docker compose -f /home/docker/nextcloud.{{ inventory_hostname }}/docker-compose.yml up -d --force-recreate --build
#       start: docker compose -f /home/docker/nextcloud.{{ inventory_hostname }}/docker-compose.yml up -d
#       stop: docker compose -f /home/docker/nextcloud.{{ inventory_hostname }}/docker-compose.yml down
#       restart: docker compose -f /home/docker/nextcloud.{{ inventory_hostname }}/docker-compose.yml restart
#       reload: docker compose -f /home/docker/nextcloud.{{ inventory_hostname }}/docker-compose.yml up -d
#       status: docker compose -f /home/docker/nextcloud.{{ inventory_hostname }}/docker-compose.yml ps
#       logs: docker compose -f /home/docker/nextcloud.{{ inventory_hostname }}/docker-compose.yml logs --tail=100
#

---
- name: nextcloud
  hosts: all

  vars:
    ldap_basedn: "{{ 'dc=openldap,' ~ inventory_hostname | split('.') | map('regex_replace', '^(.*)$', 'dc=\\1') | join(',') }}"


  tasks:

    - name: Create /home/docker/nextcloud.{{inventory_hostname}} dir
      ansible.builtin.file:
        path: /home/docker/nextcloud.{{inventory_hostname}}
        owner: root
        group: docker
        state: directory
        mode: '0550'

    - name: /home/docker/nextcloud.{{inventory_hostname}}/genpw.sh (generate Random PW for Nextcloud and DB)
      blockinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/genpw.sh
        create: yes
        mode: 0550
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Change to service directory
          cd /home/docker/nextcloud.{{inventory_hostname}}

          # Generate random passwords for Nextcloud admin and database
          g_ncadminpassword=$(pwgen -s 32 1)
          g_mysqluser=$(pwgen -s 32 1)
          g_mysqlpassword=$(pwgen -s 32 1)

          # Create env file for Nextcloud if not exists
          if [ ! -f env ]
          then
            echo "MYSQL_USER=!MYSQLUSER!
          MYSQL_PASSWORD=!MYSQLPASSWORD!
          NEXTCLOUD_ADMIN_PASSWORD=!NCADMINPASSWORD!" >env
          fi

          # Create env file for MariaDB if not exists
          if [ ! -f env.db ]
          then
            echo "MARIADB_USER=!MYSQLUSER!
          MARIADB_PASSWORD=!MYSQLPASSWORD!" >env.db
          fi

          # Create env file for phpMyAdmin if not exists
          if [ ! -f env.phpmyadmin ]
          then
            echo "PMA_USER=!MYSQLUSER!
          PMA_PASSWORD=!MYSQLPASSWORD!" >env.phpmyadmin
          fi

          # Set secure permissions on env files
          chmod 440 env env.db env.phpmyadmin
          chown root:docker env env.db env.phpmyadmin

          # Replace placeholders with generated passwords
          sed -i "s/\!MYSQLUSER\!/$g_mysqluser/g" env env.db env.phpmyadmin
          sed -i "s/\!MYSQLPASSWORD\!/$g_mysqlpassword/g" env env.db env.phpmyadmin
          sed -i "s/\!NCADMINPASSWORD\!/$g_ncadminpassword/g" env
        backup: yes
        validate: /bin/bash -n %s
      notify: run genpw.sh

    - name: /home/docker/nextcloud.{{inventory_hostname}}/genpw.sh shebang
      lineinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/genpw.sh
        insertbefore: BOF
        line: "#!/bin/bash -e"

    - name: Gen initial passwords if not exists
      ansible.builtin.shell: ./genpw.sh
      args:
        chdir: /home/docker/nextcloud.{{inventory_hostname}}
        creates: /home/docker/nextcloud.{{inventory_hostname}}/env

    - name: /home/docker/nextcloud.{{inventory_hostname}}/fulldockerfile.sh (Download full Dockerfile)
      blockinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/fulldockerfile.sh
        create: yes
        mode: 0550
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Change to service directory
          cd /home/docker/nextcloud.{{inventory_hostname}}

          # Download current Dockerfile template from Nextcloud repository
          wget -q https://raw.githubusercontent.com/nextcloud/docker/refs/heads/master/Dockerfile-debian.template -O Dockerfile

          # Download supervisor configuration for full Apache image
          wget -q https://github.com/nextcloud/docker/raw/master/.examples/dockerfiles/full/apache/supervisord.conf -O supervisord.conf
        backup: yes
        validate: /bin/bash -n %s
      notify: run fulldockerfile.sh

    - name: /home/docker/nextcloud.{{inventory_hostname}}/fulldockerfile.sh shebang
      lineinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/fulldockerfile.sh
        insertbefore: BOF
        line: "#!/bin/bash -e"

    - name: Gen initial passwords if not exists
      ansible.builtin.shell: ./fulldockerfile.sh
      args:
        chdir: /home/docker/nextcloud.{{inventory_hostname}}
        creates: /home/docker/nextcloud.{{inventory_hostname}}/Dockerfile


    - name: /home/docker/nextcloud.{{inventory_hostname}}/collabora.genpw.sh (generate Collabora PW)
      blockinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/collabora.genpw.sh
        create: yes
        mode: 0550
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Change to service directory
          cd /home/docker/nextcloud.{{inventory_hostname}}

          # Generate random password for Collabora
          g_collabora_password=$(pwgen -s 32 1)

          # Create environment file for Collabora if not exists
          if [ ! -f env.collabora ]
          then
            echo "password=!COLLABORA_PASSWORD!" > env.collabora
          fi

          # Set secure permissions on Collabora env file
          chmod 440 env.collabora
          chown root:docker env.collabora

          # Replace placeholder with actual password
          sed -i "s/!COLLABORA_PASSWORD!/$g_collabora_password/g" env.collabora
        backup: yes
        validate: /bin/bash -n %s
      notify: run collabora.genpw.sh

    - name: /home/docker/nextcloud.{{inventory_hostname}}/collabora.genpw.sh shebang
      lineinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/collabora.genpw.sh
        insertbefore: BOF
        line: "#!/bin/bash -e"

    - name: Generate Collabora password
      ansible.builtin.shell: ./collabora.genpw.sh
      args:
        chdir: /home/docker/nextcloud.{{inventory_hostname}}
        creates: /home/docker/nextcloud.{{inventory_hostname}}/env.collabora

    - name: /home/docker/nextcloud.{{inventory_hostname}}/remoteip.conf (real IP logging and no Proxy IP)
      blockinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/remoteip.conf
        create: yes
        mode: 0444
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          RemoteIPHeader X-Forwarded-For
          RemoteIPInternalProxy 10.0.0.0/8
          RemoteIPInternalProxy 172.16.0.0/12
          RemoteIPInternalProxy 192.168.0.0/16
        backup: yes
      notify: Restart nextcloud

    - name: /home/docker/nextcloud.{{inventory_hostname}}/turnserver.conf
      blockinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/turnserver.conf
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          syslog
          listening-port=3478
          fingerprint
          use-auth-secret
          static-auth-secret=
          realm=nextcloud.{{inventory_hostname}}
          total-quota=100
          bps-capacity=0
          stale-nonce
          no-multicast-peers
        backup: yes

    - name: /home/docker/nextcloud.{{inventory_hostname}}/docker-compose.yml Container Configuration
      blockinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/docker-compose.yml
        create: yes
        mode: 0440
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
        
          services:
            nextcloud.{{inventory_hostname}}:
              image: nextcloud:stable-apache
              security_opt:
                - no-new-privileges:true
              restart: unless-stopped
              volumes:
                - ./nextcloud-data:/var/www/html
                - ./remoteip.conf:/etc/apache2/conf-enabled/remoteip.conf:ro
                - /etc/localtime:/etc/localtime:ro
                - /etc/hosts:/etc/hosts:ro
              depends_on:
                - nextcloud.{{inventory_hostname}}--db
                - nextcloud.{{inventory_hostname}}--redis
              env_file: env
              environment:
                - MYSQL_HOST=nextcloud.{{inventory_hostname}}--db
                - MYSQL_DATABASE=nextcloud-db
                - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.{{inventory_hostname}}
                - TRUSTED_PROXIES=192.168.41.200/24
                - REDIS_HOST=nextcloud.{{inventory_hostname}}--redis
                - SMTP_HOST=mail.{{inventory_hostname}}
                - SMTP_PORT=25
                - MAIL_FROM_ADDRESS=nextcloud
                - MAIL_DOMAIN={{inventory_hostname}}
                - OVERWRITEPROTOCOL=https
                - NEXTCLOUD_ADMIN_USER=ncadmin
                - PHP_MEMORY_LIMIT=1024M
                - PHP_UPLOAD_LIMIT=1024M
              networks:
                - nextcloud.{{inventory_hostname}}--network
                - traefik
              labels:
                - traefik.enable=true
                # HTTPS
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}.rule=Host(`nextcloud.{{ ansible_facts['nodename'] }}`)
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}.entrypoints=https
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}.tls=true
                # Proxy to service-port
                - traefik.http.services.nextcloud-{{ ansible_facts['hostname'] }}.loadbalancer.server.port=80
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}.service=nextcloud-{{ ansible_facts['hostname'] }}
                # cert via letsencrypt
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}.tls.certresolver=letsencrypt
                # Traefik network
                - traefik.docker.network=traefik
                # Nextcloud specific
                # .well-known for dav
                - traefik.http.middlewares.nextcloud-{{ ansible_facts['hostname'] }}-dav.redirectRegex.permanent=true
                - traefik.http.middlewares.nextcloud-{{ ansible_facts['hostname'] }}-dav.redirectRegex.regex=https://(.*)/.well-known/(card|cal)dav
                - traefik.http.middlewares.nextcloud-{{ ansible_facts['hostname'] }}-dav.redirectRegex.replacement=https://$${1}/remote.php/dav/
                # activate secHeaders@file and .well.known
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}.middlewares=secHeaders@file,nextcloud-{{ ansible_facts['hostname'] }}-dav
            
            nextcloud.{{inventory_hostname}}--db:
              image: mariadb:lts
              cap_add:
                - SYS_NICE
              restart: unless-stopped
              volumes:
                - ./nextclouddb-data:/var/lib/mysql
                - /etc/localtime:/etc/localtime:ro
              env_file: env.db
              environment:
                - MARIADB_RANDOM_ROOT_PASSWORD=1
                - MARIADB_DATABASE=nextcloud-db
                - MARIADB_AUTO_UPGRADE=1
                - MARIADB_INITDB_SKIP_TZINFO=1
              networks:
                - nextcloud.{{inventory_hostname}}--network

            nextcloud.{{inventory_hostname}}--redis:
              image: redis:latest
              restart: unless-stopped
              networks:
                - nextcloud.{{inventory_hostname}}--network

            nextcloud.{{inventory_hostname}}--cron:
              image: nextcloud:stable-apache
              restart: unless-stopped
              volumes:
                - ./nextcloud-data:/var/www/html
                - /etc/localtime:/etc/localtime:ro
              entrypoint: /cron.sh
              environment:
                - PHP_MEMORY_LIMIT=1024M
                - PHP_UPLOAD_LIMIT=1024M
              depends_on:
                - nextcloud.{{inventory_hostname}}--db
              networks:
                - nextcloud.{{inventory_hostname}}--network

            nextcloud.{{inventory_hostname}}--phpmyadmin:
              image: phpmyadmin:latest
              restart: unless-stopped
              env_file: env.phpmyadmin
              environment:
                - PMA_ARBITRARY=0
                - PMA_HOST=nextcloud.{{inventory_hostname}}--db
              volumes:
                - /etc/localtime:/etc/localtime:ro
              networks:
                - nextcloud.{{inventory_hostname}}--network
                - traefik
              labels:
                - traefik.enable=true
                # HTTPS
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--phpmyadmin.rule=Host(`nextcloud-phpmyadmin.{{ ansible_facts['nodename'] }}`)
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--phpmyadmin.entrypoints=https
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--phpmyadmin.tls=true
                # Proxy to service-port
                - traefik.http.services.nextcloud-{{ ansible_facts['hostname'] }}--phpmyadmin.loadbalancer.server.port=80
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--phpmyadmin.service=nextcloud-{{ ansible_facts['hostname'] }}--phpmyadmin
                # cert via letsencrypt
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--phpmyadmin.tls.certresolver=letsencrypt
                # Auth
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--phpmyadmin.middlewares=secHeaders@file,default-basic-auth@file
                # Traefik network
                - traefik.docker.network=traefik

            nextcloud.{{inventory_hostname}}--collabora:
              image: collabora/code:latest
              cap_add:
                - FOWNER
                - CHOWN
                - SYS_ADMIN
                - SYS_CHROOT
              restart: unless-stopped
              volumes:
                - /etc/localtime:/etc/localtime:ro
                - /etc/hosts:/etc/hosts:ro
              environment:
                - username=admin
                - aliasgroup1=https://nextcloud.{{inventory_hostname}}
                - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:storage.wopi{wopi://}@enable=true --o:auth.allow_known=true --o:net.proto=websocket
                - DONT_GEN_SSL_CERTS=true
              networks:
                - nextcloud.{{inventory_hostname}}--network 
                - traefik
              labels:
                - traefik.enable=true
                # HTTPS
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--collabora.rule=Host(`office.{{ ansible_facts['nodename'] }}`)
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--collabora.entrypoints=https
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--collabora.tls=true
                # Proxy to service-port
                - traefik.http.services.nextcloud-{{ ansible_facts['hostname'] }}--collabora.loadbalancer.server.port=9980
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--collabora.service=nextcloud-{{ ansible_facts['hostname'] }}--collabora
                # cert via letsencrypt
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--collabora.tls.certresolver=letsencrypt
                # Auth
                - traefik.http.routers.nextcloud-{{ ansible_facts['hostname'] }}--collabora.middlewares=secHeaders@file
                # Traefik network
                - traefik.docker.network=traefik


          networks:
            nextcloud.{{inventory_hostname}}--network:
              driver: bridge
              driver_opts:
                com.docker.network.bridge.name: br-nextcloud
            traefik:
              external: true

        backup: yes
      notify: Restart nextcloud


    #######################
    #### OIDC Authelia ####
    #######################

    - name: Create oidc client secret for Nextcloud
      ansible.builtin.shell: |
        /home/docker/authelia.{{inventory_hostname}}/gen-oidc-client-secret.sh /home/docker/nextcloud.{{inventory_hostname}}
      changed_when: false
      failed_when: false

    - name: write OIDC config in authelias configuration.yml for Nextcloud
      ansible.builtin.blockinfile:
        path: /home/docker/authelia.{{inventory_hostname}}/authelia-data/configuration.yml
        marker: "# {mark} ANSIBLE MANAGED BLOCK OIDC nextcloud.{{inventory_hostname}}"
        block: |2
                # Nextcloud
                - client_id: 'nextcloud'
                  client_name: 'Nextcloud'
                  client_secret: '{{ lookup('file', '/home/docker/nextcloud.' + inventory_hostname + '/oidc_digest') }}'
                  public: false
                  authorization_policy: '{{ lookup('file', '/home/docker/authelia.' + inventory_hostname + '/authorization_policy') }}'
                  redirect_uris:
                    - 'https://nextcloud.{{inventory_hostname}}/apps/user_oidc/code'
                  scopes:
                    - 'openid'
                    - 'profile'
                    - 'email'
                    - 'groups'
                  response_types:
                    - 'code'
                  grant_types:
                    - 'authorization_code'
                  access_token_signed_response_alg: 'none'
                  userinfo_signed_response_alg: 'none'
                  token_endpoint_auth_method: 'client_secret_post'
        insertafter: "^# END ANSIBLE MANAGED BLOCK OIDC"
        backup: yes
        validate: docker run --rm -v "{{ ansible_env.HOME }}/.ansible:{{ ansible_env.HOME }}/.ansible" authelia/authelia:latest authelia validate-config --config %s
      notify: Restart authelia


    - name: Start nextcloud
      ansible.builtin.shell: docker-compose up -d
      args:
        chdir: /home/docker/nextcloud.{{inventory_hostname}}
        creates: /home/docker/nextcloud.{{inventory_hostname}}/nextcloud-data/config/config.php

    - name: Wait until nextcloud install is finished
      wait_for:
        path: /home/docker/nextcloud.{{inventory_hostname}}/nextcloud-data/config/config.php

    - name: /home/docker/nextcloud.{{inventory_hostname}}/nextcloud-data/config/local.config.php (local nextcloud config)
      blockinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/nextcloud-data/config/local.config.php
        create: yes
        mode: 0444
        owner: root
        group: docker
        marker: "// {mark} ANSIBLE MANAGED BLOCK"
        block: |
          $CONFIG = array (
            'loglevel' => 1,
            'logtimezone' => 'Europe/Berlin',
            'log_rotate_size' => 10485760,
            'default_phone_region' => 'DE',
            'session_lifetime' => 28800,
            'session_keepalive' => true,
            'skeletondirectory' => '',
          );
        backup: yes

    - name: /home/docker/nextcloud.{{inventory_hostname}}/nextcloud-data/config/local.config.php shebang
      lineinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/nextcloud-data/config/local.config.php
        insertbefore: BOF
        line: "<?php"

    - name: /home/docker/nextcloud.{{inventory_hostname}}/nextcloud.init.sh
      blockinfile:
        path: /home/docker/nextcloud.{{inventory_hostname}}/nextcloud.init.sh
        mode: "0500"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # waiting for started Nextcloud (Login-Screen)
          until wget nextcloud.{{inventory_hostname}} -O - | grep -q Login
          do
            echo "Waiting for Login screen..."
            # restart traefik on Problems with ACME/letsencrypt
            if [ -f /home/docker/traefik/docker-compose.yml ]
            then
              if docker compose -f /home/docker/traefik/docker-compose.yml logs | grep -E -q "nextcloud.{{inventory_hostname}}.+error.+acme-challenge"
              then
                docker compose -f /home/docker/traefik/docker-compose.yml up -d --force-recreate
              fi
            fi
            sleep 10
          done

          # Change to service directory
          if ! cd /home/docker/nextcloud.{{inventory_hostname}}
          then
            exit 1
          fi

          # Install and enable Nextcloud apps
          for app in admin_audit bookmarks calendar contacts files_external gpoddersync impersonate maps news notes oauth2 passwords phonetrack photos spreed tasks twofactor_backupcodes twofactor_totp richdocuments user_oidc user_ldap
          do
            if [ ! -f "app.${app}.installed" ]
            then
              docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ app:install "${app}" | tee -a nextcloud.init.log >"app.${app}.installed" 2>&1
            fi
            if [ ! -f "app.${app}.installed" ]
            then
              docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ app:enable "${app}" | tee -a nextcloud.init.log >>"app.${app}.installed" 2>&1
            fi
          done

          # Disable unnecessary apps
          for app in dashboard nextcloud_announcements serverinfo support updatenotification weather_status
          do
            if [ ! -f "app.${app}.installed" ]
            then
              docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ app:disable "${app}" | tee -a nextcloud.update.log >"app.${app}.disabled" 2>&1
            fi
          done
          
          # stun/turn server
          if [ -s /home/docker/turn.{{inventory_hostname}}/env ]
          then
            source /home/docker/turn.{{inventory_hostname}}/env
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ talk:turn:add --secret $TURN_SECRET turns turn.{{inventory_hostname}}:5349 udp,tcp
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ talk:stun:add turn.{{inventory_hostname}}:5349
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ talk:stun:delete stun.nextcloud.com:443
          fi

          #  richdocuments Collabora Office (Nextcloud Office App)
          if ! [ -s app.richdocuments.configured ]
          then
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ config:app:set richdocuments wopi_allowlist --value="0.0.0.0/0,::0" >>app.richdocuments.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ richdocuments:activate-config >>app.richdocuments.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ config:app:set richdocuments wopi_callback_url   --value="https://nextcloud.{{inventory_hostname}}" >>app.richdocuments.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ config:app:set richdocuments wopi_url            --value="https://office.{{inventory_hostname}}" >>app.richdocuments.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ config:app:set richdocuments public_wopi_url     --value="https://office.{{inventory_hostname}}" >>app.richdocuments.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ config:system:set overwrite.cli.url --value="https://nextcloud.{{inventory_hostname}}"
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ config:system:set trusted_proxies 1 --value="192.168.41.0/24"
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ config:system:set trusted_proxies 2 --value="fdaa:a192:b168:cd41::/64"
          fi

          # OIDC via Authelia (user_oidc)
          if ! [ -s app.user_oidc.configured ]
          then
            if [ -s /home/docker/nextcloud.{{inventory_hostname}}/oidc_password ]
            then
              oidc_secret=$(cat /home/docker/nextcloud.{{inventory_hostname}}/oidc_password)

              echo "
                ./occ user_oidc:provider \
                --clientid=\"nextcloud\" \
                --clientsecret='${oidc_secret}' \
                --discoveryuri=\"https://auth.{{inventory_hostname}}/.well-known/openid-configuration\" \
                --scope=\"openid profile email groups\" \
                --mapping-uid=\"preferred_username\" \
                --mapping-groups=\"groups\" \
                Authelia" >nextcloud-data/oidc.sh
              docker-compose exec -ti -u www-data nextcloud.{{inventory_hostname}} bash oidc.sh
              rm nextcloud-data/oidc.sh

              # multiple backends
              docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ config:app:set user_oidc allow_multiple_user_backends --value="1"
              # local remote ip
              docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ config:system:set allow_local_remote_servers --value true --type bool

              date >> app.user_oidc.configured

            fi
          fi


          # LDAP-Backend (user_ldap)
          if ! [ -s app.user_ldap.configured ]
          then
            LDAP_BASE_DN="{{ ldap_basedn }}"
            LDAP_BIND_DN="cn=readuser,${LDAP_BASE_DN}"

            if [ -s /home/docker/ldap.{{inventory_hostname}}/env.openldap ]
            then
              LDAP_PASSWORD=$(grep ^LDAP_READUSER_PASSWORD= /home/docker/ldap.{{inventory_hostname}}/env.openldap | cut -d= -f2-)
            fi

            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:create-empty-config >>app.user_ldap.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapHost "openldap.{{inventory_hostname}}" >>app.user_ldap.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapPort "636" >>app.user_ldap.configured
            #docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapTLS "1" >>app.user_ldap.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapBase "${LDAP_BASE_DN}" >>app.user_ldap.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapBaseUsers "ou=users,${LDAP_BASE_DN}" >>app.user_ldap.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapBaseGroups "ou=groups,${LDAP_BASE_DN}" >>app.user_ldap.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapAgentName "${LDAP_BIND_DN}" >>app.user_ldap.configured
            if [ -n "${LDAP_PASSWORD}" ]
            then
              docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapAgentPassword "${LDAP_PASSWORD}" >>app.user_ldap.configured
            fi
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapLoginFilter "(&(|(objectclass=posixAccount))(uid=%uid))" >>app.user_ldap.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapGroupFilter "(&(objectClass=posixGroup)(memberUid=%uid))" >>app.user_ldap.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapUserDisplayName "cn" >>app.user_ldap.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapEmailAttribute "mail" >>app.user_ldap.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapConfigurationActive "1" >>app.user_ldap.configured
            docker-compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ ldap:set-config s01 ldapUserLoginName uid >>app.user_ldap.configured
            date >> app.user_ldap.configured
          fi


          exit 0
        backup: yes
        validate: /bin/bash -n %s
      notify: run nextcloud.init

    - name: Run nextcloud.init after install
      ansible.builtin.shell: bash /home/docker/nextcloud.{{inventory_hostname}}/nextcloud.init.sh
      args:
        chdir: /home/docker/nextcloud.{{inventory_hostname}}
        creates: /home/docker/nextcloud.{{inventory_hostname}}/nextcloud.init.log

    - name: /usr/local/sbin/autoupdate.d/nextcloud.update
      blockinfile:
        path: /usr/local/sbin/autoupdate.d/nextcloud.update
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Change to service directory or skip update
          if ! cd /home/docker/nextcloud.{{inventory_hostname}}
          then
            continue
          fi

          # Update full Dockerfile
          /home/docker/nextcloud.{{inventory_hostname}}/fulldockerfile.sh
          # Nextcloud maintenance and app-update
          docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ db:add-missing-columns
          docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ db:add-missing-indices
          docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ db:add-missing-primary-keys
          docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ app:update --all
          docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ dav:sync-birthday-calendar
          docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ trashbin:cleanup --all-users
          docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ files:cleanup
          docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ files:scan --all --generate-metadata --home-only --no-interaction -q
          # maps:scan-photos replaced by "occ files:scan --generate-metadata"
          #docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ maps:scan-photos --now
          docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ db:convert-filecache-bigint -n
          # define stun/turn server maybe new password
          if [ -s /home/docker/turn.{{inventory_hostname}}/env ]
          then
             # turn
             source /home/docker/turn.{{inventory_hostname}}/env
             docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ talk:turn:delete turns turn.{{inventory_hostname}}:5349 udp,tcp
             docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ talk:turn:add --secret $TURN_SECRET turns turn.{{inventory_hostname}}:5349 udp,tcp
             # stun
             docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ talk:stun:delete turn.{{inventory_hostname}}:5349
             docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ talk:stun:add turn.{{inventory_hostname}}:5349
             docker compose exec -T -u www-data nextcloud.{{inventory_hostname}} ./occ talk:stun:delete stun.nextcloud.com:443
          fi
          if [ -s /home/docker/nextcloud.{{inventory_hostname}}/nextcloud-data/data/nextcloud.log ]
          then
            docker compose -f /home/docker/nextcloud.{{inventory_hostname}}/docker-compose.yml exec -ti -u www-data nextcloud.{{inventory_hostname}} ./occ log:tail 1000 | grep " Error " | grep -v "Can't get app storage," | dd bs=1M count=1 2>/dev/null >"${g_tmp}/nextcloud-error.log"
            if [ -s "${g_tmp}/nextcloud-error.log" ]
            then
              g_echo_error "Errors in Nextcloud Log: $(cat "${g_tmp}/nextcloud-error.log")"
            fi
          fi
        backup: yes
        validate: /bin/bash -n %s
      notify: run nextcloud.update


  handlers:
    - name: run genpw.sh
      ansible.builtin.shell: ./genpw.sh
      args:
        chdir: /home/docker/nextcloud.{{inventory_hostname}}
      notify: Restart nextcloud

    - name: run fulldockerfile.sh
      ansible.builtin.shell: ./fulldockerfile.sh
      args:
        chdir: /home/docker/nextcloud.{{inventory_hostname}}

    - name: run nextcloud.update
      ansible.builtin.shell: bash /usr/local/sbin/autoupdate.d/nextcloud.update

    - name: run nextcloud.init
      ansible.builtin.shell: bash /home/docker/nextcloud.{{inventory_hostname}}/nextcloud.init.sh

    - name: Restart nextcloud
      ansible.builtin.shell: docker-compose up -d --force-recreate
      args:
        chdir: /home/docker/nextcloud.{{inventory_hostname}}

    - name: run collabora.genpw.sh
      ansible.builtin.shell: ./collabora.genpw.sh
      args:
        chdir: /home/docker/nextcloud.{{inventory_hostname}}
      notify: Restart nextcloud

    - name: Restart authelia
      ansible.builtin.shell: |
        if docker-compose down
        then
          docker-compose up -d
        fi
      args:
        chdir: /home/docker/authelia.{{inventory_hostname}}

