# docs:
#   short_description: Deploy the Nextcloud service
#   description: Deploys Nextcloud (file sync/collaboration) together with its database and storage, exposed via Traefik.
#   author: Oliver Bohlen
#   version: '1.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: Service
#   service_control:
#     services:
#     - name: nextcloud
#       type: docker
#       compose_file: /home/docker/nextcloud/docker-compose.yml
#       status: test -d /home/docker/nextcloud || exit 2; docker compose -f /home/docker/nextcloud/docker-compose.yml ps | grep -q "Up "
#     logs:
#     - name: nextcloud
#       command: docker compose -f /home/docker/nextcloud/docker-compose.yml logs -f --tail=100
#   actions:
#     uninstall: docker compose -f /home/docker/nextcloud/docker-compose.yml down
#     start: docker compose -f /home/docker/nextcloud/docker-compose.yml up -d
#     stop: docker compose -f /home/docker/nextcloud/docker-compose.yml down
#     restart: docker compose -f /home/docker/nextcloud/docker-compose.yml restart
#     reload: docker compose -f /home/docker/nextcloud/docker-compose.yml up -d
#

---
- name: nextcloud
  hosts: all

  vars:
    service_name: nextcloud
    service_domain: "{{ service_name }}.{{ base_domain }}"
    traefik_ip: "192.168.41.200"
    trusted_proxies_cidr: "192.168.41.0/24"
    ldap_basedn: "{{ 'dc=openldap,' ~ base_domain | split('.') | map('regex_replace', '^(.*)$', 'dc=\\1') | join(',') }}"


  tasks:

    - name: Create /home/docker/nextcloud dir
      ansible.builtin.file:
        path: /home/docker/nextcloud
        owner: root
        group: docker
        state: directory
        mode: '0550'

    - name: /home/docker/nextcloud/genpw.sh (generate Random PW for Nextcloud and DB)
      blockinfile:
        path: /home/docker/nextcloud/genpw.sh
        create: yes
        mode: 0550
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Change to service directory
          cd /home/docker/nextcloud

          # Generate random passwords for Nextcloud admin and database
          g_ncadminpassword=$(pwgen -s 32 1)
          g_mysqluser=$(pwgen -s 32 1)
          g_mysqlpassword=$(pwgen -s 32 1)

          # Create env file for Nextcloud if not exists
          if [ ! -f env ]
          then
            echo "MYSQL_USER=!MYSQLUSER!
          MYSQL_PASSWORD=!MYSQLPASSWORD!
          NEXTCLOUD_ADMIN_PASSWORD=!NCADMINPASSWORD!" >env
          fi

          # Create env file for MariaDB if not exists
          if [ ! -f env.db ]
          then
            echo "MARIADB_USER=!MYSQLUSER!
          MARIADB_PASSWORD=!MYSQLPASSWORD!" >env.db
          fi

          # Create env file for phpMyAdmin if not exists
          if [ ! -f env.phpmyadmin ]
          then
            echo "PMA_USER=!MYSQLUSER!
          PMA_PASSWORD=!MYSQLPASSWORD!" >env.phpmyadmin
          fi

          # Set secure permissions on env files
          chmod 440 env env.db env.phpmyadmin
          chown root:docker env env.db env.phpmyadmin

          # Replace placeholders with generated passwords
          sed -i "s/\!MYSQLUSER\!/$g_mysqluser/g" env env.db env.phpmyadmin
          sed -i "s/\!MYSQLPASSWORD\!/$g_mysqlpassword/g" env env.db env.phpmyadmin
          sed -i "s/\!NCADMINPASSWORD\!/$g_ncadminpassword/g" env
        backup: yes
        validate: /bin/bash -n %s
      notify: run genpw.sh

    - name: /home/docker/nextcloud/genpw.sh shebang
      lineinfile:
        path: /home/docker/nextcloud/genpw.sh
        insertbefore: BOF
        line: "#!/bin/bash -e"

    - name: Gen initial passwords if not exists
      ansible.builtin.shell: ./genpw.sh
      args:
        chdir: /home/docker/nextcloud
        creates: /home/docker/nextcloud/env

    - name: /home/docker/nextcloud/fulldockerfile.sh (Download full Dockerfile)
      blockinfile:
        path: /home/docker/nextcloud/fulldockerfile.sh
        create: yes
        mode: 0550
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Change to service directory
          cd /home/docker/nextcloud

          # Download current Dockerfile template from Nextcloud repository
          wget -q https://raw.githubusercontent.com/nextcloud/docker/refs/heads/master/Dockerfile-debian.template -O Dockerfile

          # Download supervisor configuration for full Apache image
          wget -q https://github.com/nextcloud/docker/raw/master/.examples/dockerfiles/full/apache/supervisord.conf -O supervisord.conf
        backup: yes
        validate: /bin/bash -n %s
      notify: run fulldockerfile.sh

    - name: /home/docker/nextcloud/fulldockerfile.sh shebang
      lineinfile:
        path: /home/docker/nextcloud/fulldockerfile.sh
        insertbefore: BOF
        line: "#!/bin/bash -e"

    - name: Gen initial passwords if not exists
      ansible.builtin.shell: ./fulldockerfile.sh
      args:
        chdir: /home/docker/nextcloud
        creates: /home/docker/nextcloud/Dockerfile


    - name: /home/docker/nextcloud/collabora.genpw.sh (generate Collabora PW)
      blockinfile:
        path: /home/docker/nextcloud/collabora.genpw.sh
        create: yes
        mode: 0550
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Change to service directory
          cd /home/docker/nextcloud

          # Generate random password for Collabora
          g_collabora_password=$(pwgen -s 32 1)

          # Create environment file for Collabora if not exists
          if [ ! -f env.collabora ]
          then
            echo "password=!COLLABORA_PASSWORD!" > env.collabora
          fi

          # Set secure permissions on Collabora env file
          chmod 440 env.collabora
          chown root:docker env.collabora

          # Replace placeholder with actual password
          sed -i "s/!COLLABORA_PASSWORD!/$g_collabora_password/g" env.collabora
        backup: yes
        validate: /bin/bash -n %s
      notify: run collabora.genpw.sh

    - name: /home/docker/nextcloud/collabora.genpw.sh shebang
      lineinfile:
        path: /home/docker/nextcloud/collabora.genpw.sh
        insertbefore: BOF
        line: "#!/bin/bash -e"

    - name: Generate Collabora password
      ansible.builtin.shell: ./collabora.genpw.sh
      args:
        chdir: /home/docker/nextcloud
        creates: /home/docker/nextcloud/env.collabora

    - name: /home/docker/nextcloud/remoteip.conf (real IP logging and no Proxy IP)
      blockinfile:
        path: /home/docker/nextcloud/remoteip.conf
        create: yes
        mode: 0444
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          RemoteIPHeader X-Forwarded-For
          RemoteIPInternalProxy 10.0.0.0/8
          RemoteIPInternalProxy 172.16.0.0/12
          RemoteIPInternalProxy 192.168.0.0/16
        backup: yes
      notify: Restart nextcloud

    - name: /home/docker/nextcloud/turnserver.conf
      blockinfile:
        path: /home/docker/nextcloud/turnserver.conf
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          syslog
          listening-port=3478
          fingerprint
          use-auth-secret
          static-auth-secret=
          realm=nextcloud.{{ base_domain }}
          total-quota=100
          bps-capacity=0
          stale-nonce
          no-multicast-peers
        backup: yes

    - name: /home/docker/nextcloud/docker-compose.yml Container Configuration
      blockinfile:
        path: /home/docker/nextcloud/docker-compose.yml
        create: yes
        mode: 0440
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
        
          services:
            nextcloud:
              image: nextcloud:stable-apache
              security_opt:
                - no-new-privileges:true
              restart: unless-stopped
              volumes:
                - ./nextcloud-data:/var/www/html
                - ./remoteip.conf:/etc/apache2/conf-enabled/remoteip.conf:ro
                - /etc/localtime:/etc/localtime:ro
                - /etc/hosts:/etc/hosts:ro
              depends_on:
                - nextcloud-db
                - nextcloud-redis
              env_file: env
              environment:
                - MYSQL_HOST=nextcloud-db
                - MYSQL_DATABASE=nextcloud-db
                - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.{{ base_domain }}
                - TRUSTED_PROXIES={{ traefik_ip }}/24
                - REDIS_HOST=nextcloud-redis
                - SMTP_HOST=mail.{{ base_domain }}
                - SMTP_PORT=25
                - MAIL_FROM_ADDRESS=nextcloud
                - MAIL_DOMAIN={{ base_domain }}
                - OVERWRITEPROTOCOL=https
                - NEXTCLOUD_ADMIN_USER=ncadmin
                - PHP_MEMORY_LIMIT=1024M
                - PHP_UPLOAD_LIMIT=1024M
              networks:
                - nextcloud
                traefik:
                  aliases:
                    - nextcloud
            
            nextcloud-db:
              image: mariadb:lts
              cap_add:
                - SYS_NICE
              restart: unless-stopped
              volumes:
                - ./nextclouddb-data:/var/lib/mysql
                - /etc/localtime:/etc/localtime:ro
              env_file: env.db
              environment:
                - MARIADB_RANDOM_ROOT_PASSWORD=1
                - MARIADB_DATABASE=nextcloud-db
                - MARIADB_AUTO_UPGRADE=1
                - MARIADB_INITDB_SKIP_TZINFO=1
              networks:
                - nextcloud

            nextcloud-redis:
              image: redis:latest
              restart: unless-stopped
              networks:
                - nextcloud

            nextcloud-cron:
              image: nextcloud:stable-apache
              restart: unless-stopped
              volumes:
                - ./nextcloud-data:/var/www/html
                - /etc/localtime:/etc/localtime:ro
              entrypoint: /cron.sh
              environment:
                - PHP_MEMORY_LIMIT=1024M
                - PHP_UPLOAD_LIMIT=1024M
              depends_on:
                - nextcloud-db
              networks:
                - nextcloud

            nextcloud-phpmyadmin:
              image: phpmyadmin:latest
              restart: unless-stopped
              env_file: env.phpmyadmin
              environment:
                - PMA_ARBITRARY=0
                - PMA_HOST=nextcloud-db
              volumes:
                - /etc/localtime:/etc/localtime:ro
              networks:
                - nextcloud
                traefik:
                  aliases:
                    - nextcloud-phpmyadmin

            nextcloud-collabora:
              image: collabora/code:latest
              cap_add:
                - FOWNER
                - CHOWN
                - SYS_ADMIN
                - SYS_CHROOT
              restart: unless-stopped
              volumes:
                - /etc/localtime:/etc/localtime:ro
                - /etc/hosts:/etc/hosts:ro
              environment:
                - username=admin
                - aliasgroup1=https://nextcloud.{{ base_domain }}
                - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:storage.wopi{wopi://}@enable=true --o:auth.allow_known=true --o:net.proto=websocket
                - DONT_GEN_SSL_CERTS=true
              networks:
                - nextcloud
                traefik:
                  aliases:
                    - nextcloud-collabora


          networks:
            nextcloud:
              driver: bridge
              driver_opts:
                com.docker.network.bridge.name: br-nextcloud
            traefik:
              external: true

        backup: yes
      notify: Restart nextcloud

    - name: /home/docker/traefik/providers/nextcloud.yml Routing Configuration
      blockinfile:
        path: /home/docker/traefik/providers/nextcloud.yml
        create: yes
        mode: 0444
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          http:
            routers:
              nextcloud:
                rule: "Host(`nextcloud.{{ base_domain }}`)"
                service: nextcloud
                entryPoints:
                  - "https"
                tls:
                  certResolver: {{ acme_resolver }}
                middlewares:
                  - "secHeaders@file"
                  - "nextcloud-dav"
              nextcloud-phpmyadmin:
                rule: "Host(`nextcloud-phpmyadmin.{{ base_domain }}`)"
                service: nextcloud-phpmyadmin
                entryPoints:
                  - "https"
                tls:
                  certResolver: {{ acme_resolver }}
                middlewares:
                  - "secHeaders@file"
                  - "default-basic-auth@file"
              nextcloud-collabora:
                rule: "Host(`office.{{ base_domain }}`)"
                service: nextcloud-collabora
                entryPoints:
                  - "https"
                tls:
                  certResolver: {{ acme_resolver }}
                middlewares:
                  - "secHeaders@file"
            middlewares:
              nextcloud-dav:
                redirectRegex:
                  permanent: true
                  regex: "https://(.*)/.well-known/(card|cal)dav"
                  replacement: "https://$${1}/remote.php/dav/"
            services:
              nextcloud:
                loadBalancer:
                  servers:
                    - url: "http://nextcloud:80"
              nextcloud-phpmyadmin:
                loadBalancer:
                  servers:
                    - url: "http://nextcloud-phpmyadmin:80"
              nextcloud-collabora:
                loadBalancer:
                  servers:
                    - url: "http://nextcloud-collabora:9980"
        backup: yes
      notify: Restart traefik


    #######################
    #### OIDC Authelia ####
    #######################

    - name: Create oidc client secret for Nextcloud
      ansible.builtin.shell: |
        /home/docker/authelia/gen-oidc-client-secret.sh /home/docker/nextcloud
      changed_when: false
      failed_when: false

    - name: write OIDC config in authelias configuration.yml for Nextcloud
      ansible.builtin.blockinfile:
        path: /home/docker/authelia/authelia-data/configuration.yml
        marker: "# {mark} ANSIBLE MANAGED BLOCK OIDC nextcloud"
        block: |2
                # Nextcloud
                - client_id: 'nextcloud'
                  client_name: 'Nextcloud'
                  client_secret: '{{ lookup('file', '/home/docker/nextcloud/oidc_digest') }}'
                  public: false
                  authorization_policy: '{{ lookup('file', '/home/docker/authelia/authorization_policy') }}'
                  redirect_uris:
                    - 'https://nextcloud.{{ base_domain }}/apps/user_oidc/code'
                  scopes:
                    - 'openid'
                    - 'profile'
                    - 'email'
                    - 'groups'
                  response_types:
                    - 'code'
                  grant_types:
                    - 'authorization_code'
                  access_token_signed_response_alg: 'none'
                  userinfo_signed_response_alg: 'none'
                  token_endpoint_auth_method: 'client_secret_post'
        insertafter: "^# END ANSIBLE MANAGED BLOCK OIDC"
        backup: yes
        validate: docker run --rm -v "{{ ansible_env.HOME }}/.ansible:{{ ansible_env.HOME }}/.ansible" authelia/authelia:latest authelia validate-config --config %s
      notify: Restart authelia


    - name: Start nextcloud
      ansible.builtin.shell: docker compose up -d
      args:
        chdir: /home/docker/nextcloud
        creates: /home/docker/nextcloud/nextcloud-data/config/config.php

    - name: Wait until nextcloud install is finished
      wait_for:
        path: /home/docker/nextcloud/nextcloud-data/config/config.php

    - name: /home/docker/nextcloud/nextcloud-data/config/local.config.php (local nextcloud config)
      blockinfile:
        path: /home/docker/nextcloud/nextcloud-data/config/local.config.php
        create: yes
        mode: 0444
        owner: root
        group: docker
        marker: "// {mark} ANSIBLE MANAGED BLOCK"
        block: |
          $CONFIG = array (
            'loglevel' => 1,
            'logtimezone' => 'Europe/Berlin',
            'log_rotate_size' => 10485760,
            'default_phone_region' => 'DE',
            'session_lifetime' => 28800,
            'session_keepalive' => true,
            'skeletondirectory' => '',
          );
        backup: yes

    - name: /home/docker/nextcloud/nextcloud-data/config/local.config.php shebang
      lineinfile:
        path: /home/docker/nextcloud/nextcloud-data/config/local.config.php
        insertbefore: BOF
        line: "<?php"

    - name: /home/docker/nextcloud/nextcloud.init.sh
      blockinfile:
        path: /home/docker/nextcloud/nextcloud.init.sh
        mode: "0500"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # waiting for started Nextcloud (Login-Screen)
          until wget nextcloud.{{ base_domain }} -O - | grep -q Login
          do
            echo "Waiting for Login screen..."
            # restart traefik on Problems with ACME/letsencrypt
            if [ -f /home/docker/traefik/docker-compose.yml ]
            then
              if docker compose -f /home/docker/traefik/docker-compose.yml logs | grep -E -q "nextcloud.{{ base_domain }}.+error.+acme-challenge"
              then
                docker compose -f /home/docker/traefik/docker-compose.yml up -d --force-recreate
              fi
            fi
            sleep 10
          done

          # Change to service directory
          if ! cd /home/docker/nextcloud
          then
            exit 1
          fi

          # Install and enable Nextcloud apps
          for app in admin_audit bookmarks calendar contacts files_external gpoddersync impersonate maps news notes oauth2 passwords phonetrack photos spreed tasks twofactor_backupcodes twofactor_totp richdocuments user_oidc user_ldap
          do
            if [ ! -f "app.${app}.installed" ]
            then
              docker compose exec -T -u www-data nextcloud ./occ app:install "${app}" | tee -a nextcloud.init.log >"app.${app}.installed" 2>&1
            fi
            if [ ! -f "app.${app}.installed" ]
            then
              docker compose exec -T -u www-data nextcloud ./occ app:enable "${app}" | tee -a nextcloud.init.log >>"app.${app}.installed" 2>&1
            fi
          done

          # Disable unnecessary apps
          for app in dashboard nextcloud_announcements serverinfo support updatenotification weather_status
          do
            if [ ! -f "app.${app}.installed" ]
            then
              docker compose exec -T -u www-data nextcloud ./occ app:disable "${app}" | tee -a nextcloud.update.log >"app.${app}.disabled" 2>&1
            fi
          done
          
          # stun/turn server
          if [ -s /home/docker/turn/env ]
          then
            source /home/docker/turn/env
            docker compose exec -T -u www-data nextcloud ./occ talk:turn:add --secret $TURN_SECRET turns turn.{{ base_domain }}:5349 udp,tcp
            docker compose exec -T -u www-data nextcloud ./occ talk:stun:add turn.{{ base_domain }}:5349
            docker compose exec -T -u www-data nextcloud ./occ talk:stun:delete stun.nextcloud.com:443
          fi

          #  richdocuments Collabora Office (Nextcloud Office App)
          if ! [ -s app.richdocuments.configured ]
          then
            docker compose exec -T -u www-data nextcloud ./occ config:app:set richdocuments wopi_allowlist --value="0.0.0.0/0,::0" >>app.richdocuments.configured
            docker compose exec -T -u www-data nextcloud ./occ richdocuments:activate-config >>app.richdocuments.configured
            docker compose exec -T -u www-data nextcloud ./occ config:app:set richdocuments wopi_callback_url   --value="https://nextcloud.{{ base_domain }}" >>app.richdocuments.configured
            docker compose exec -T -u www-data nextcloud ./occ config:app:set richdocuments wopi_url            --value="https://office.{{ base_domain }}" >>app.richdocuments.configured
            docker compose exec -T -u www-data nextcloud ./occ config:app:set richdocuments public_wopi_url     --value="https://office.{{ base_domain }}" >>app.richdocuments.configured
            docker compose exec -T -u www-data nextcloud ./occ config:system:set overwrite.cli.url --value="https://nextcloud.{{ base_domain }}"
            docker compose exec -T -u www-data nextcloud ./occ config:system:set trusted_proxies 1 --value="{{ trusted_proxies_cidr }}"
            docker compose exec -T -u www-data nextcloud ./occ config:system:set trusted_proxies 2 --value="fdaa:a192:b168:cd41::/64"
          fi

          # OIDC via Authelia (user_oidc)
          if ! [ -s app.user_oidc.configured ]
          then
            if [ -s /home/docker/nextcloud/oidc_password ]
            then
              oidc_secret=$(cat /home/docker/nextcloud/oidc_password)

              echo "
                ./occ user_oidc:provider \
                --clientid=\"nextcloud\" \
                --clientsecret='${oidc_secret}' \
                --discoveryuri=\"https://auth.{{ base_domain }}/.well-known/openid-configuration\" \
                --scope=\"openid profile email groups\" \
                --mapping-uid=\"preferred_username\" \
                --mapping-groups=\"groups\" \
                Authelia" >nextcloud-data/oidc.sh
              docker compose exec -ti -u www-data nextcloud bash oidc.sh
              rm nextcloud-data/oidc.sh

              # multiple backends
              docker compose exec -T -u www-data nextcloud ./occ config:app:set user_oidc allow_multiple_user_backends --value="1"
              # local remote ip
              docker compose exec -T -u www-data nextcloud ./occ config:system:set allow_local_remote_servers --value true --type bool

              date >> app.user_oidc.configured

            fi
          fi


          # LDAP-Backend (user_ldap)
          if ! [ -s app.user_ldap.configured ]
          then
            LDAP_BASE_DN="{{ ldap_basedn }}"
            LDAP_BIND_DN="cn=readuser,${LDAP_BASE_DN}"

            if [ -s /home/docker/ldap/env.openldap ]
            then
              LDAP_PASSWORD=$(grep ^LDAP_READUSER_PASSWORD= /home/docker/ldap/env.openldap | cut -d= -f2-)
            fi

            docker compose exec -T -u www-data nextcloud ./occ ldap:create-empty-config >>app.user_ldap.configured
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapHost "openldap.{{ base_domain }}" >>app.user_ldap.configured
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapPort "636" >>app.user_ldap.configured
            #docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapTLS "1" >>app.user_ldap.configured
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapBase "${LDAP_BASE_DN}" >>app.user_ldap.configured
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapBaseUsers "ou=users,${LDAP_BASE_DN}" >>app.user_ldap.configured
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapBaseGroups "ou=groups,${LDAP_BASE_DN}" >>app.user_ldap.configured
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapAgentName "${LDAP_BIND_DN}" >>app.user_ldap.configured
            if [ -n "${LDAP_PASSWORD}" ]
            then
              docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapAgentPassword "${LDAP_PASSWORD}" >>app.user_ldap.configured
            fi
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapLoginFilter "(&(|(objectclass=posixAccount))(uid=%uid))" >>app.user_ldap.configured
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapGroupFilter "(&(objectClass=posixGroup)(memberUid=%uid))" >>app.user_ldap.configured
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapUserDisplayName "cn" >>app.user_ldap.configured
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapEmailAttribute "mail" >>app.user_ldap.configured
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapConfigurationActive "1" >>app.user_ldap.configured
            docker compose exec -T -u www-data nextcloud ./occ ldap:set-config s01 ldapUserLoginName uid >>app.user_ldap.configured
            date >> app.user_ldap.configured
          fi


          exit 0
        backup: yes
        validate: /bin/bash -n %s
      notify: run nextcloud.init

    - name: Run nextcloud.init after install
      ansible.builtin.shell: bash /home/docker/nextcloud/nextcloud.init.sh
      args:
        chdir: /home/docker/nextcloud
        creates: /home/docker/nextcloud/nextcloud.init.log

    - name: /usr/local/sbin/autoupdate.d/nextcloud.update
      blockinfile:
        path: /usr/local/sbin/autoupdate.d/nextcloud.update
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Change to service directory or skip update
          if ! cd /home/docker/nextcloud
          then
            continue
          fi

          # Update full Dockerfile
          /home/docker/nextcloud/fulldockerfile.sh
          # Nextcloud maintenance and app-update
          docker compose exec -T -u www-data nextcloud ./occ db:add-missing-columns
          docker compose exec -T -u www-data nextcloud ./occ db:add-missing-indices
          docker compose exec -T -u www-data nextcloud ./occ db:add-missing-primary-keys
          docker compose exec -T -u www-data nextcloud ./occ app:update --all
          docker compose exec -T -u www-data nextcloud ./occ dav:sync-birthday-calendar
          docker compose exec -T -u www-data nextcloud ./occ trashbin:cleanup --all-users
          docker compose exec -T -u www-data nextcloud ./occ files:cleanup
          docker compose exec -T -u www-data nextcloud ./occ files:scan --all --generate-metadata --home-only --no-interaction -q
          # maps:scan-photos replaced by "occ files:scan --generate-metadata"
          #docker compose exec -T -u www-data nextcloud ./occ maps:scan-photos --now
          docker compose exec -T -u www-data nextcloud ./occ db:convert-filecache-bigint -n
          # define stun/turn server maybe new password
          if [ -s /home/docker/turn/env ]
          then
             # turn
             source /home/docker/turn/env
             docker compose exec -T -u www-data nextcloud ./occ talk:turn:delete turns turn.{{ base_domain }}:5349 udp,tcp
             docker compose exec -T -u www-data nextcloud ./occ talk:turn:add --secret $TURN_SECRET turns turn.{{ base_domain }}:5349 udp,tcp
             # stun
             docker compose exec -T -u www-data nextcloud ./occ talk:stun:delete turn.{{ base_domain }}:5349
             docker compose exec -T -u www-data nextcloud ./occ talk:stun:add turn.{{ base_domain }}:5349
             docker compose exec -T -u www-data nextcloud ./occ talk:stun:delete stun.nextcloud.com:443
          fi
          if [ -s /home/docker/nextcloud/nextcloud-data/data/nextcloud.log ]
          then
            docker compose -f /home/docker/nextcloud/docker-compose.yml exec -ti -u www-data nextcloud ./occ log:tail 1000 | grep " Error " | grep -v "Can't get app storage," | dd bs=1M count=1 2>/dev/null >"${g_tmp}/nextcloud-error.log"
            if [ -s "${g_tmp}/nextcloud-error.log" ]
            then
              g_echo_error "Errors in Nextcloud Log: $(cat "${g_tmp}/nextcloud-error.log")"
            fi
          fi
        backup: yes
        validate: /bin/bash -n %s
      notify: run nextcloud.update


  handlers:
    - name: run genpw.sh
      ansible.builtin.shell: ./genpw.sh
      args:
        chdir: /home/docker/nextcloud
      notify: Restart nextcloud

    - name: run fulldockerfile.sh
      ansible.builtin.shell: ./fulldockerfile.sh
      args:
        chdir: /home/docker/nextcloud

    - name: run nextcloud.update
      ansible.builtin.shell: bash /usr/local/sbin/autoupdate.d/nextcloud.update

    - name: run nextcloud.init
      ansible.builtin.shell: bash /home/docker/nextcloud/nextcloud.init.sh

    - name: Restart nextcloud
      ansible.builtin.shell: docker compose up -d --force-recreate
      args:
        chdir: /home/docker/nextcloud

    - name: run collabora.genpw.sh
      ansible.builtin.shell: ./collabora.genpw.sh
      args:
        chdir: /home/docker/nextcloud
      notify: Restart nextcloud

    - name: Restart authelia
      ansible.builtin.shell: |
        if docker compose down
        then
          docker compose up -d
        fi
      args:
        chdir: /home/docker/authelia

