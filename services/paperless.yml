# docs:
#   short_description: Deploy the Paperless-ngx document management system
#   description: Deploys Paperless-ngx for document management with OCR, tagging, and full-text search. Includes Redis broker. Exposed via Traefik.
#   author: Oliver Bohlen
#   version: '1.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: Service
#   service_control:
#     services:
#     - name: paperless
#       type: docker
#       compose_file: /home/docker/paperless/docker-compose.yml
#       status: test -d /home/docker/paperless || exit 2; docker compose -f /home/docker/paperless/docker-compose.yml ps | grep -q "Up "
#     logs:
#     - name: paperless
#       command: docker compose -f /home/docker/paperless/docker-compose.yml logs -f --tail=100
#   actions:
#     uninstall: docker compose -f /home/docker/paperless/docker-compose.yml down
#     start: docker compose -f /home/docker/paperless/docker-compose.yml up -d
#     stop: docker compose -f /home/docker/paperless/docker-compose.yml down
#     restart: docker compose -f /home/docker/paperless/docker-compose.yml restart
#     reload: docker compose -f /home/docker/paperless/docker-compose.yml up -d
#
---
- name: paperless
  hosts: all
  vars:
    service_name: paperless
    service_domain: "{{ service_name }}.{{ base_domain }}"
  tasks:

    - name: Create /home/docker/paperless dir
      ansible.builtin.file:
        path: /home/docker/paperless
        owner: root
        group: docker
        state: directory
        mode: '0550'

    - name: /home/docker/paperless/genpw.sh (generate Random PW for Nextcloud and DB)
      blockinfile:
        path: /home/docker/paperless/genpw.sh
        create: yes
        mode: 0550
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          cd /home/docker/paperless

          secretkey=$(pwgen -s 64 1)
          
          [ -f docker-compose.env ] || echo "PAPERLESS_SECRET_KEY=$secretkey
          " >docker-compose.env
          
          chmod 440 docker-compose.env
          chown root:docker docker-compose.env
        backup: yes
        validate: /bin/bash -n %s
      notify: run genpw.sh

    - name: /home/docker/paperless/genpw.sh shebang
      lineinfile:
        path: /home/docker/paperless/genpw.sh
        insertbefore: BOF
        line: "#!/bin/bash -e"

    - name: Gen initial passwords if not exists
      ansible.builtin.shell: ./genpw.sh
      args:
        chdir: /home/docker/paperless
        creates: /home/docker/paperless/docker-compose.env

    - name: /home/docker/paperless/docker-compose.yml Container Configuration
      blockinfile:
        path: /home/docker/paperless/docker-compose.yml
        create: yes
        mode: 0440
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
        
          services:
            paperless:
              image: ghcr.io/paperless-ngx/paperless-ngx:latest
              restart: unless-stopped
              volumes:
                - ./data:/usr/src/paperless/data
                - ./media:/usr/src/paperless/media
                - ./export:/usr/src/paperless/export
                - ./consume:/usr/src/paperless/consume
              depends_on:
                - paperless-broker
              env_file: docker-compose.env
              environment:
                - USERMAP_UID=998
                - USERMAP_GID=1003
                - PAPERLESS_REDIS=redis://paperless-broker:6379
                - PAPERLESS_FILENAME_FORMAT={correspondent}/{created}-{title}
                - PAPERLESS_TASK_WORKERS=1
                - PAPERLESS_THREADS_PER_WORKER=1
                - PAPERLESS_OCR_MODE=skip_noarchive
                - PAPERLESS_WEBSERVER_WORKERS=1
                - PAPERLESS_OCR_LANGUAGE=deu
                - PAPERLESS_TIME_ZONE=Europe/Berlin
                - PAPERLESS_URL=https://{{ service_domain }}
                - PAPERLESS_DEBUG=false
                - PAPERLESS_OIDC_ENABLED=true
                - PAPERLESS_OIDC_CLIENT_ID=paperless
                - PAPERLESS_OIDC_CLIENT_SECRET={{ lookup('file', '/home/docker/paperless/oidc_digest') }}
                - PAPERLESS_OIDC_PROVIDER_URL=https://auth.{{ base_domain }}
                - PAPERLESS_OIDC_REDIRECT_URI=https://{{ service_domain }}/oidc/callback/
                - PAPERLESS_OIDC_USERNAME_CLAIM=preferred_username
                - PAPERLESS_OIDC_DISPLAY_NAME=Authelia
                - PAPERLESS_OIDC_AUTO_logout=true
              networks:
                - paperless
                traefik:
                  aliases:
                    - paperless
              labels: []
            
            paperless-broker:
              image: redis:6.0
              restart: unless-stopped
              volumes:
                - ./redisdata:/data
              networks:
                - paperless

          networks:
            paperless:
              driver: bridge
              driver_opts:
                com.docker.network.bridge.name: br-paperless
            traefik:
              external: true

        backup: yes
      notify: Restart paperless

    - name: Start paperless
      ansible.builtin.shell: docker compose up -d --force-recreate
      args:
        chdir: /home/docker/paperless
        creates: /home/docker/paperless/data/db.sqlite3

    - name: Create paperless User
      ansible.builtin.user:
        name: paperless
        comment: Paperless User for samba
        uid: 998
        shell: /bin/false
        group: docker

    - name: Samba Share for incoming documents
      blockinfile:
        path: /etc/samba/smb-{{ ansible_facts['hostname'] }}.conf
        mode: "0444"
        owner: root
        group: root
        marker: "# {mark} paperless ANSIBLE MANAGED BLOCK"
        block: |
          [paperless-in]
            valid users = paperless
            path = /home/docker/paperless/consume
            public = no
            writable = yes
            read only = no
            printable = no
            guest ok = no
        backup: yes
      notify:
      - Restart samba

    - name: Give paperless permissions for consume dir
      ansible.builtin.file:
        path: /home/docker/paperless/consume
        owner: paperless
        group: root
        mode: '0770'

    - name: /home/docker/traefik/providers/paperless.yml Routing Configuration
      blockinfile:
        path: /home/docker/traefik/providers/paperless.yml
        create: yes
        mode: 0444
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          http:
            routers:
              paperless:
                rule: "Host(`{{ service_domain }}`)"
                service: paperless
                entryPoints:
                  - "https"
                tls:
                  certResolver: {{ acme_resolver }}
                middlewares:
                  - "secHeaders@file"
            services:
              paperless:
                loadBalancer:
                  servers:
                    - url: "http://paperless:8000"
        backup: yes
      notify: Restart traefik

    - name: Generate OIDC client secret for Paperless
      ansible.builtin.shell: /home/docker/authelia/gen-oidc-client-secret.sh /home/docker/paperless
      changed_when: false
      failed_when: false

    - name: /home/docker/authelia/configuration.yml OIDC paperless
      blockinfile:
        path: /home/docker/authelia/configuration.yml
        create: yes
        mode: 0640
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK OIDC paperless"
        insertafter: "^# END ANSIBLE MANAGED BLOCK OIDC"
        block: |
          # Paperless-ngx
          - client_id: 'paperless'
            client_name: 'Paperless'
            client_secret: '{{ lookup('file', '/home/docker/paperless/oidc_digest') }}'
            public: false
            authorization_policy: '{{ lookup('file', '/home/docker/authelia/authorization_policy') }}'
            redirect_uris:
              - 'https://paperless.{{ base_domain }}/oidc/callback/'
            scopes:
              - 'openid'
              - 'profile'
              - 'email'
              - 'groups'
            response_types:
              - 'code'
            grant_types:
              - 'authorization_code'
            access_token_signed_response_alg: 'none'
            userinfo_signed_response_alg: 'none'
            token_endpoint_auth_method: 'client_secret_post'
        backup: yes
      notify: Restart authelia


  handlers:
    - name: run genpw.sh
      ansible.builtin.shell: ./genpw.sh
      args:
        chdir: /home/docker/paperless
      notify: Restart paperless

    - name: Restart paperless
      ansible.builtin.shell: docker compose up -d --force-recreate
      args:
        chdir: /home/docker/paperless

    - name: Restart samba
      service:
        name: samba-{{ ansible_facts['hostname'] }}
        state: restarted

    - name: Restart traefik
      ansible.builtin.shell: docker compose restart traefik
      args:
        chdir: /home/docker/traefik

    - name: Restart authelia
      ansible.builtin.shell: docker compose restart authelia
      args:
        chdir: /home/docker/authelia


