#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: Service
#   service_control:
#     services:
#     - name: home-assistant
#       type: docker
#       compose_file: /home/docker/home-assistant/docker-compose.yml
#       status: test -d /home/docker/home-assistant || exit 2; docker compose -f /home/docker/home-assistant/docker-compose.yml ps | grep -q "Up "
#     logs:
#     - name: home-assistant
#       command: docker compose -f /home/docker/home-assistant/docker-compose.yml logs -f --tail=100
#   actions:
#     uninstall: docker compose -f /home/docker/home-assistant/docker-compose.yml down
#     start: docker compose -f /home/docker/home-assistant/docker-compose.yml up -d
#     stop: docker compose -f /home/docker/home-assistant/docker-compose.yml down
#     restart: docker compose -f /home/docker/home-assistant/docker-compose.yml restart
#     reload: docker compose -f /home/docker/home-assistant/docker-compose.yml up -d
#

---
- name: home-assistant
  hosts: all
  vars:
    service_name: home-assistant
    service_domain: "{{ service_name }}.{{ base_domain }}"
    traefik_ip: "{{ traefik_ip }}"
    home_assistant_ip: "{{ home_assistant_ip }}"
  tasks:

    - name: Create /home/docker/home-assistant dir
      ansible.builtin.file:
        path: /home/docker/home-assistant
        owner: root
        group: docker
        state: directory
        mode: '0550'

    - name: Create /home/docker/home-assistant/config dir
      ansible.builtin.file:
        path: /home/docker/home-assistant/config
        owner: 3000
        group: 3000
        state: directory
        mode: '0750'

    - name: Create /home/docker/home-assistant/ha_pingcheck_data dir
      ansible.builtin.file:
        path: /home/docker/home-assistant/ha_pingcheck_data
        state: directory
        owner: root
        group: docker
        mode: '0755'

    - name: Create oidc client secret
      ansible.builtin.shell: |
        /home/docker/authelia/gen-oidc-client-secret.sh /home/docker/home-assistant
      changed_when: false
      failed_when: false

    - name: Edit Home Assistant config
      blockinfile:
        path: /home/docker/home-assistant/config/configuration.yaml
        create: yes
        mode: 0444
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Loads default set of integrations. Do not remove.
          #default_config:
          homeassistant:
            name: Home
            latitude: 51.1657
            longitude: 10.4515
            elevation: 100
            unit_system: metric
            currency: EUR
            time_zone: Europe/Berlin
            external_url: "https://home-assistant.{{ base_domain }}"

          api:
          history:
          logbook:
          system_health:
          ssdp:
          zeroconf:
          sun:
          sensor:
          weather:
          person:
          mobile_app:
          light:
          mqtt:
          tts:
          stream:
          media_source:
                    
          # Load frontend themes from the themes folder
          frontend:
            themes: !include_dir_merge_named themes
          automation: !include automations.yaml
          script: !include scripts.yaml
          scene: !include scenes.yaml
          
          http:
            use_x_forwarded_for: true
            trusted_proxies:
              - {{ traefik_ip }} # traefik
          
          auth_oidc:
            client_id: 'home-assistant'
            client_secret: '{{ lookup('file', '/home/docker/home-assistant/oidc_password') }}'
            discovery_url: 'https://auth.{{ base_domain }}/.well-known/openid-configuration'
            display_name: 'Authelia'
            claims:
              groups: 'groups'
            roles:
              admin: 'home-assistant-admin'
              user: 'home-assistant'

        backup: yes
      notify: Restart home-assistant

    - name: Touch HA config files
      ansible.builtin.file:
        path: "/home/docker/home-assistant/config/{{ item }}"
        state: touch
        access_time: preserve
        modification_time: preserve
      loop:
        - scenes.yaml
        - scripts.yaml
        - automations.yaml

    - name: /home/docker/home-assistant/genpw.sh (generate Random PW for Home Assistant)
      blockinfile:
        path: /home/docker/home-assistant/genpw.sh
        create: yes
        mode: 0550
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Change to service directory
          cd /home/docker/home-assistant

          # Generate random admin password
          g_homeassistantadminpassword=$(pwgen -s 32 1)

          # Create env file if it does not exist
          if [ ! -f env ]
          then
            echo "HA_ADMIN_PASSWORD=!HA_ADMIN_PASSWORD!" >env
          fi

          chmod 440 env
          chown root:docker env
          # Replace placeholder with actual password in env file
          sed -i "s/\!HA_ADMIN_PASSWORD\!/$g_homeassistantadminpassword/g" env
        backup: yes
        validate: /bin/bash -n %s
      notify: run genpw.sh

    - name: /home/docker/home-assistant/genpw.sh shebang
      lineinfile:
        path: /home/docker/home-assistant/genpw.sh
        insertbefore: BOF
        line: "#!/bin/bash -e"

    - name: Gen initial passwords if not exists
      ansible.builtin.shell: ./genpw.sh
      args:
        chdir: /home/docker/home-assistant
        creates: /home/docker/home-assistant/env

    - name: /home/docker/home-assistant/docker-compose.yml Container Configuration
      blockinfile:
        path: /home/docker/home-assistant/docker-compose.yml
        create: yes
        mode: 0440
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          services:
            home-assistant.{{ base_domain }}:
              image: ghcr.io/home-assistant/home-assistant
              restart: unless-stopped
              volumes:
                - ./config:/config
                - ./media:/media
                - /etc/localtime:/etc/localtime:ro
                - /run/dbus:/run/dbus:ro
              network_mode: host
              privileged: true

            matter.{{ base_domain }}:
              image: ghcr.io/home-assistant-libs/python-matter-server:stable
              restart: unless-stopped
              network_mode: host
              volumes:
                - ./matter-server:/data
                - /run/dbus:/run/dbus:ro
              command: >
                  --storage-path /data
                  --primary-interface iot0
                  --log-level info
                  --log-level-sdk none
                  --bluetooth-adapter 0
              #privileged: true
            
            ha_pingcheck.{{ base_domain }}:
              image: nginx:latest
              restart: unless-stopped
              ports:
                - "8889:80"
              volumes:
                - /home/docker/home-assistant/ha_pingcheck_data:/usr/share/nginx/html/pingcheck:ro
                - /etc/localtime:/etc/localtime:ro
              networks:
                - traefik
              labels:
                - traefik.enable=true
                - traefik.http.routers.ha_pingcheck.rule=Host(`ha-health.{{ base_domain }}`)
                - traefik.http.routers.ha_pingcheck.entrypoints=https
                - traefik.http.routers.ha_pingcheck.tls=true
                - traefik.http.routers.ha_pingcheck.tls.certresolver={{ acme_resolver }}
                - traefik.http.routers.ha_pingcheck.middlewares=secHeaders@file
                - traefik.http.services.ha_pingcheck.loadbalancer.server.port=80
                - traefik.docker.network=traefik

          networks:
            traefik:
              external: true
        backup: yes
      notify: Restart home-assistant

    - name: /home/docker/traefik/providers/home-assistant.yml Home-Assistant<->Traefik provider
      blockinfile:
        path: /home/docker/traefik/providers/home-assistant.yml
        create: yes
        mode: 0444
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          http:
            routers:
              home-assistant:
                rule: "Host(`home-assistant.{{ base_domain }}`)"
                service: home-assistant
                entryPoints:
                  - "https"
                tls:
                  certResolver: {{ acme_resolver }}
                middlewares: 
                  - "secHeaders@file"

              matter:
                rule: "Host(`matter.{{ base_domain }}`)"
                service: matter
                entryPoints:
                  - "https"
                tls:
                  certResolver: {{ acme_resolver }}
                middlewares: 
                  - "secHeaders@file"
                  - "allowlocalipsonly"

            services:
              home-assistant:
                loadBalancer:
                  servers:
                    - url: "http://{{ home_assistant_ip }}:8123"
              matter:
                loadBalancer:
                  servers:
                    - url: "http://{{ home_assistant_ip }}:5580"

    - name: Create group and add user if not exists
      ansible.builtin.shell: |
        ldapaddgroup home-assistant
        ldapaddgroup home-assistant-admin
        ldapaddusertogroup admin home-assistant-admin
      changed_when: false
      failed_when: false

    - name: Clone hass-oidc-auth repo
      git:
        repo: "https://github.com/christiaangoossens/hass-oidc-auth.git"
        dest: "/tmp/hass-oidc-auth"
        version: "main"

    - name: Create custom_components dir
      file:
        path: "/home/docker/home-assistant/config/custom_components"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy hass_oidc_auth component
      copy:
        src: "/tmp/hass-oidc-auth/custom_components/auth_oidc"
        dest: "/home/docker/home-assistant/config/custom_components"
        owner: root
        group: root
        mode: "0644"
      notify: Restart home-assistant

    - name: write OIDC config in authelias configuration.yml
      ansible.builtin.blockinfile:
        path: /home/docker/authelia/authelia-data/configuration.yml
        marker: "# {mark} ANSIBLE MANAGED BLOCK OIDC home-assistant.{{ base_domain }}"
        block: |2
                # home-assistant
                - client_id: 'home-assistant'
                  client_name: 'Home Assistant'
                  client_secret: '{{ lookup('file', '/home/docker/home-assistant/oidc_digest') }}'
                  public: false
                  require_pkce: true
                  pkce_challenge_method: 'S256'
                  authorization_policy: '{{ lookup('file', '/home/docker/authelia/authorization_policy') }}'
                  consent_mode: 'implicit'
                  redirect_uris:
                    - 'https://home-assistant.{{ base_domain }}/auth/oidc/callback'
                  scopes:
                    - 'openid'
                    - 'profile'
                    - 'groups'
                  response_types:
                    - 'code'
                  grant_types:
                    - 'authorization_code'
                  access_token_signed_response_alg: 'none'
                  userinfo_signed_response_alg: 'none'
                  token_endpoint_auth_method: 'client_secret_post'
        insertafter: "^# END ANSIBLE MANAGED BLOCK OIDC"
        backup: yes
        validate: docker run --rm -v "{{ ansible_env.HOME }}/.ansible:{{ ansible_env.HOME }}/.ansible" authelia/authelia:latest authelia validate-config --config %s
      notify: Restart authelia

    - name: Start home-assistant
      ansible.builtin.shell: docker compose up -d
      args:
        chdir: /home/docker/home-assistant
        creates: /home/docker/home-assistant/config/home-assistant_v2.db
     
    - name: Wait until home-assistant install is finished
      wait_for:
        path: /home/docker/home-assistant/config/home-assistant_v2.db
     
    - name: /home/docker/home-assistant/home-assistant.init.sh
      blockinfile:
        path: /home/docker/home-assistant/home-assistant.init.sh
        mode: "0500"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Wait for home-assistant container startup
          sleep 30

          # Change to service directory
          if ! cd /home/docker/home-assistant
          then
            exit 1
          fi

          # Load environment variables
          . ./env
          curl --location --request POST 'http://{{ home_assistant_ip }}:8123/api/onboarding/users' --header 'Content-Type: application/json' --data-raw "{
            \"client_id\": \"http://{{ home_assistant_ip }}:8123/\",
           \"name\": \"admin\",
            \"username\": \"haadmin\",
            \"password\": \"${HA_ADMIN_PASSWORD}\",
            \"language\": \"de\"
          }" >>/home/docker/home-assistant/home-assistant.init.log 2>&1
          # install home assistant community store (hacs)
          docker compose exec -ti home-assistant.{{ base_domain }} wget -O - https://get.hacs.xyz | bash - >>/home/docker/home-assistant/home-assistant.init.log 2>&1
        backup: yes
        validate: /bin/bash -n %s
      #notify: run home-assistant.init
    
    - name: Run home-assistant.init after install
      ansible.builtin.shell: bash /home/docker/home-assistant/home-assistant.init.sh
      args:
        chdir: /home/docker/home-assistant
        creates: /home/docker/home-assistant/home-assistant.init.log

    - name: Allow port 8123/tcp on iot0 interface for healthchecks for example for shelly switches
      community.general.ufw:
        rule: allow
        port: '8123'
        proto: tcp
        interface: iot0
        direction: in

    - name: Matter UDP ports
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: udp
      loop:
        - 5353  # mDNS
    

    ### Pingcheck for IOT Hosts
    - name: Deploy ha_pingcheck ping loop script
      ansible.builtin.copy:
        content: |
          #!/bin/bash
          #set -o pipefail
          HOME=/tmp
          . /etc/bash/gaboshlib.include
          DIR="/home/docker/home-assistant/ha_pingcheck_data"
          ROUTER="router"
          INTERVAL=2

          g_echo "ha_pingcheck started"

          while true
          do
            g_echo "Fetching host list"
            hosts=$(ssh -o StrictHostKeyChecking=no \
                        -o BatchMode=yes \
                        -o ConnectTimeout=5 \
                        root@"$ROUTER" \
                        "uci show dhcp | grep 'name=' | cut -d\"'\" -f2" 2>/dev/null) || true

            # Skip ping loop if no hosts returned
            if [ -z "$hosts" ]
            then
              g_echo "No hosts"
              sleep "$INTERVAL"
              continue
            fi

            mkdir -p "$DIR"

            # Iterate over each discovered host
            for host in $hosts
            do
              # Skip empty hostnames
              if [ -z "$host" ]
              then
                continue
              fi

              # Measure round-trip time
              g_start=$(date +%s%N)
              if ping -c3 -W3 $host >/dev/null 2>&1 || ping -c3 -W3 $host >/dev/null 2>&1
              then
                rtt=$(( ( $(date +%s%N) - start ) / 1000000 ))
                printf '{"hostname":"%s","status":"up","last_check":"%s","rtt":%d}\n' \
                  "$host" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$rtt" \
                  > "$DIR/${host}.json"
                g_logger "host $host up"
              else
                printf '{"hostname":"%s","status":"down","last_check":"%s"}\n' \
                  "$host" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                  > "$DIR/${host}.json"
                g_logger "host $host down"
              fi
            done

            sleep "$INTERVAL"
          done
        dest: /usr/local/bin/ha_pingcheck
        owner: root
        group: root
        mode: '0755'
      notify: Restart ha_pingcheck

    - name: Deploy systemd service for ha_pingcheck
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=HA Ping Check Host Loop
          After=network.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/ha_pingcheck
          Restart=always
          RestartSec=10
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/ha_pingcheck.service
        owner: root
        group: root
        mode: '0644'
      notify: Restart ha_pingcheck

    - name: Enable and start ha_pingcheck service
      ansible.builtin.systemd:
        name: ha_pingcheck
        state: started
        enabled: true
        daemon_reload: true
      notify: Restart ha_pingcheck

    - name: Allow port 8889/tcp on iot0 interface for ping healthchecks for example for shelly scripts
      community.general.ufw:
        rule: allow
        port: '8889'
        proto: tcp
        interface: iot0
        direction: in


  handlers:
    - name: run genpw.sh
      ansible.builtin.shell: ./genpw.sh
      args:
        chdir: /home/docker/home-assistant
      notify: Restart home-assistant

    #- name: run home-assistant.init
    #  ansible.builtin.shell: bash /home/docker/home-assistant/home-assistant.init.sh

    - name: Restart home-assistant
      ansible.builtin.shell: docker compose up -d --force-recreate
      args:
        chdir: /home/docker/home-assistant

    - name: Restart authelia
      ansible.builtin.shell: |
        if docker compose down
        then
          docker compose up -d
        fi
      args:
        chdir: /home/docker/authelia

    - name: Restart ha_pingcheck
      ansible.builtin.systemd:
        name: ha_pingcheck
        state: restarted
        daemon_reload: true


