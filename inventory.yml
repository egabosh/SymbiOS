all:
  vars:
    # SymbiOS defaults
    default_domain: "local"
    acme_resolver: "{{ 'symbios-pki' if default_domain == 'local' else 'letsencrypt' }}"
    instance: "default"
    ldap_basedn: "dc=openldap,dc=local"
    # ddns (desec.io)
    ddns_apikey: ''
    ddns_host: ''
    ddns_ipv6: ''
    # smtp client
    smtp_user: ''
    smtp_password: ''
    smtp_server: ''
    smtp_from: ''
    smtp_tls: ''
    smtp_port: ''
    # ansible defaults
    ansible_user: "root"
    ansible_python_interpreter: "/usr/bin/python3"
  hosts:
    # SymbiOS server
    localhost:
      ansible_connection: local
