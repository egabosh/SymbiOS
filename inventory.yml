all:
  vars:
    # SymbiOS defaults
    timezone: "America/New_York"
    keyboard: "us"
    locale: "en_US.UTF-8"
    default_domain: "local"
    # base_domain is the shared parent for all service subdomains and the
    # Authelia session cookie scope (e.g. symbios.local or myhost.dedyn.io).
    base_domain: "symbios.local"
    acme_resolver: "{{ 'symbios-pki' if default_domain == 'local' else 'letsencrypt' }}"
    instance: "default"
    ldap_basedn: "dc=openldap,dc=local"
    # ddns (desec.io)
    ddns_apikey: ''
    ddns_host: ''
    ddns_ipv6: ''
    # smtp client
    smtp_user: ''
    smtp_password: ''
    smtp_server: ''
    smtp_from: ''
    smtp_tls: ''
    smtp_port: ''
    # ansible defaults
    ansible_user: "root"
    ansible_python_interpreter: "/usr/bin/python3"
    # ssh/sftp backup
    backup_server_host: ''
    backup_server_port: ''
    backup_server_path: ''
    backup_server_user: ''
  hosts:
    # SymbiOS server
    localhost:
      ansible_connection: local
