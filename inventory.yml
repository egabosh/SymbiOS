all:
  vars:
    # SymbiOS defaults
    default_domain: "local"
    # base_domain is the shared parent for all service subdomains and the
    # Authelia session cookie scope (e.g. symbios.local or myhost.dedyn.io).
    base_domain: "symbios.local"
    symbios_domain: "{{ base_domain }}"
    authelia_domain: "auth.{{ base_domain }}"
    traefik_domain: "traefik.{{ base_domain }}"
    acme_resolver: "{{ 'symbios-pki' if default_domain == 'local' else 'letsencrypt' }}"
    instance: "default"
    ldap_basedn: "dc=openldap,dc=local"
    # ddns (desec.io)
    ddns_apikey: ''
    ddns_host: ''
    ddns_ipv6: ''
    # smtp client
    smtp_user: ''
    smtp_password: ''
    smtp_server: ''
    smtp_from: ''
    smtp_tls: ''
    smtp_port: ''
    # ansible defaults
    ansible_user: "root"
    ansible_python_interpreter: "/usr/bin/python3"
  hosts:
    # SymbiOS server
    localhost:
      ansible_connection: local
