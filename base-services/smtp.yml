# docs:
#   short_description: Configure the mail client defaults
#   description: Deploys the shared mail-client configuration (/home/docker/_defaults/mailclient) used by containers to send mail. This is configuration only; no dedicated mail service is managed here.
#   author: Oliver Bohlen
#   version: '1.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: Mail
#   tags:
#   - smtp
#   - mail
#   - mailclient
#   - config
#   service_control:
#     services: []
#

- name: smtp
  hosts: all

  tasks:
    - name: Create mailclient marker file if SMTP is configured
      ansible.builtin.copy:
        dest: /home/docker/_defaults/mailclient
        content: |
          smtp_server={{ smtp_server }}
          smtp_user={{ smtp_user }}
          smtp_from={{ smtp_from }}
        mode: '0644'
      when: smtp_server is defined and smtp_server | length > 0

    - name: Remove mailclient marker file if SMTP is not configured
      ansible.builtin.file:
        path: /home/docker/_defaults/mailclient
        state: absent
      when: smtp_server is not defined or smtp_server | length == 0
