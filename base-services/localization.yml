# docs:
#   short_description: Basic SymbiOS localization
#   description: 'Basic SymbiOS localization sets timezone, keyboard layout and locale'
#   author: Oliver Bohlen
#   version: '1.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'

- name: Basic Debian Linux localization
  hosts: all

  tasks:

    - name: check if we are in an container env by existing systemd
      stat:
        path: /lib/systemd/systemd
      register: nocontainer


    - name: Set timezone to {{ timezone }}
      community.general.timezone:
        name: "{{ timezone }}"
      when: nocontainer.stat.exists == true

    - name: Keyboard layout {{ keyboard }}
      ansible.builtin.lineinfile:
        path: /etc/default/keyboard
        regexp: '^XKBLAYOUT=".+$'
        line: 'XKBLAYOUT="{{ keyboard }}"'
        backup: yes
      notify: setupcon
      when: nocontainer.stat.exists == true

    - name: nodeadkeys
      ansible.builtin.lineinfile:
        path: /etc/default/keyboard
        regexp: '^XKBVARIANT=".+$'
        line: 'XKBVARIANT="nodeadkeys"'
        backup: yes
      notify: setupcon
      when: nocontainer.stat.exists == true

    - name: Ensure {{ locale }} locale exists
      community.general.locale_gen:
        name: "{{ locale }}"
        state: present
      notify: localectl
      when: nocontainer.stat.exists == true

    - name: Register playbook as installed
      ansible.builtin.command: symbios-state.sh set base-services/localization.yml
      changed_when: false

  handlers:

    - name: setupcon
      ansible.builtin.shell: setupcon

    - name: localectl
      ansible.builtin.shell: localectl set-locale LANG="{{ locale }}"
