---

- name: docker
  hosts: all
  tasks:

### Docker ###

    - name: Create docker Group
      ansible.builtin.group:
        name: docker
        state: present
        gid: 1003

    - name: Create docker User
      ansible.builtin.user:
        name: docker
        comment: docker User
        uid: 1003
        group: docker

    - name: Hide docker user from login screen
      blockinfile:
        path: /var/lib/AccountsService/users/docker
        mode: "0444"
        owner: root
        group: root
        create: yes
        block: |
          [User]
          SystemAccount=true          
        backup: no

    - name: Create docker dir
      ansible.builtin.file:
        path: /home/docker
        owner: docker
        group: docker
        state: directory
        mode: '0750'

    - name: Create docker-data dir
      ansible.builtin.file:
        path: /home/docker/var-lib-docker
        owner: root
        group: root
        state: directory
        mode: '0710'

    - name: Create docker-data dir
      ansible.builtin.file:
        path: /home/docker/var-lib-containerd
        owner: root
        group: root
        state: directory
        mode: '0710'

    - name: Create dir for container defaults
      ansible.builtin.file:
        path: /home/docker/_defaults
        owner: root
        group: docker
        state: directory
        mode: '0750'

    - name: Create /var/lib/docker -> /home/docker/var-lib-docker symlink
      ansible.builtin.file:
        src: /home/docker/var-lib-docker
        dest: /var/lib/docker
        owner: root
        group: root
        state: link

    - name: Create /var/lib/docker -> /home/docker/var-lib-containerd symlink
      ansible.builtin.file:
        src: /home/docker/var-lib-containerd
        dest: /var/lib/containerd
        owner: root
        group: root
        state: link

    - name: Set Docker distro to Ubuntu for Linux Mint
      ansible.builtin.set_fact:
        docker_distribution: "ubuntu"
        docker_release: "noble"
      when: ansible_distribution == "Linux Mint"

    - name: Set Docker distro facts for non-Mint systems
      ansible.builtin.set_fact:
        docker_distribution: "{{ ansible_distribution | lower }}"
        docker_release: "{{ ansible_distribution_release }}"
      when: ansible_distribution != "Linux Mint"

    - name: Ensure keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/ubuntu/gpg"
        dest: /tmp/docker.asc
        mode: "0644"
      changed_when: false

    - name: Dearmor Docker GPG key
      ansible.builtin.command:
        cmd: "gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.asc"
        creates: /etc/apt/keyrings/docker.gpg

    - name: Remove temporary Docker key file
      ansible.builtin.file:
        path: /tmp/docker.asc
        state: absent
      changed_when: false

    - name: Get DEB architecture
      ansible.builtin.command:
        cmd: dpkg --print-architecture
      register: deb_architecture
      changed_when: false

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ deb_architecture.stdout }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ docker_distribution }} {{ docker_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      changed_when: false

    - name: Remove packages for docker from default repo if installed
      apt:
        name:
          - docker.io
          - docker-compose
          - containerd
          - runc
        state: absent
        update_cache: no
        install_recommends: no

    - name: Check if Docker data dir has containers
      ansible.builtin.stat:
        path: /home/docker/var-lib-docker/containers
      register: data_dir_stat

    - name: Packages for docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - bridge-utils
          - apache2-utils
          - python3-docker
          - mariadb-client
        update_cache: yes
        install_recommends: no

    # https://github.com/nextcloud/docker/issues/1103
    - name: writing daemon.json (ipv6 settings + data-root) 
      copy:
        dest: "/etc/docker/daemon.json"
        content: |
          {
            "data-root": "/home/docker/var-lib-docker",
            "ipv6": true,
            "fixed-cidr-v6": "fdab::/64",
            "experimental": true, 
            "ip6tables": true
          }
      register: daemon_json

    - name: Restart Docker if daemon.json changed or data dir missing
      block:
        - name: Restart Docker
          ansible.builtin.service:
            name: docker
            state: restarted
      when: daemon_json.changed or not data_dir_stat.stat.exists

    - name: Ensure Docker is running
      ansible.builtin.service:
        name: docker
        state: started


    - name: /home/docker/_defaults/mariadb/genrootpw
      blockinfile:
        path: /home/docker/_defaults/mariadb/genrootpw
        create: yes
        mode: 0550
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          cd /home/docker/_defaults/mariadb

          # Generate a random MySQL root password
          f_mysqlpassword=$(pwgen -s 32 1)

          # Create envroot.db with root password if it does not exist
          if [ ! -f env.db ]
          then
            echo "MARIADB_ROOT_PASSWORD=!MYSQLPASSWORD!" >envroot.db
          fi

          # Create env.rootphpmyadmin with root credentials if it does not exist
          if [ ! -f env.phpmyadmin ]
          then
            echo "PMA_USER=root" >env.rootphpmyadmin
            echo "PMA_PASSWORD=!MYSQLPASSWORD!" >>env.rootphpmyadmin
          fi

          # Restrict permissions on credential files
          chmod 440 envroot.db env.rootphpmyadmin
          chown root:docker envroot.db env.rootphpmyadmin

          # Replace placeholder with actual generated password
          sed -i "s/\!MYSQLPASSWORD\!/$f_mysqlpassword/g" envroot.db env.rootphpmyadmin

        backup: yes
        validate: /bin/bash -n %s

    - name: /home/docker/_defaults/mariadb/genrootpw shebang
      lineinfile:
        path: /home/docker/_defaults/mariadb/genrootpw
        insertbefore: BOF
        line: "#!/bin/bash -e"

    # Generate initial passwords for MariaDB if envroot.db does not exist
    - name: Gen initial passwords if not exists
      ansible.builtin.shell: ./genrootpw
      args:
        chdir: /home/docker/_defaults/mariadb
        creates: /home/docker/_defaults/mariadb/envroot.db

    - name: mariadb env defaults
      blockinfile:
        path: /home/docker/_defaults/mariadb/mariadb.env
        mode: "0444"
        owner: root
        group: root
        create: yes
        block: |
          MARIADB_AUTO_UPGRADE=1
          MARIADB_INITDB_SKIP_TZINFO=1
          # from here: save memory https://techroads.org/reducing-memory-use-on-my-mariadb-mysql-wordpress-docker-stack/
          MARIADB_KEY_BUFFER_SIZE=1M
          MARIADB_MYISAMCHK_KEY_BUFFER_SIZE=1M
          MARIADB_INNODB_BUFFER_POOL_SIZE=10M
          MARIADB_INNODB_LOG_BUFFER_SIZE=512K
          MARIADB_MYISAM_SORT_BUFFER_SIZE=64K
          MARIADB_MYISAMCHK_SORT_BUFFER_SIZE=64K
          MARIADB_READ_BUFFER_SIZE=8K
          MARIADB_READ_RND_BUFFER_SIZE=8K
          MARIADB_SORT_BUFFER_SIZE=64K
        backup: yes

    - name: mariadb server config defaults
      blockinfile:
        path: /home/docker/_defaults/mariadb/99-server.cnf
        mode: "0444"
        owner: root
        group: root
        create: yes
        block: |
          [mariadbd]
          max_connections=300
          query_cache_size=512K
          thread_cache_size=0
          sort_buffer_size=64K
          bulk_insert_buffer_size=0
          tmp_table_size=1K
          max_heap_table_size=16K
          key_buffer_size=1M
          read_buffer_size=8K
          read_rnd_buffer_size=8K
          #innodb_buffer_pool_size=10K
          #innodb_log_buffer_size=512K
        backup: yes

    - name: /usr/local/sbin/autoupdate.d/docker.update
      blockinfile:
        path: /usr/local/sbin/autoupdate.d/docker.update
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Remove notify.sh directory if created as a directory by Docker volume
          if [ -d /usr/local/bin/notify.sh ]
          then
            rmdir /usr/local/bin/notify.sh
          fi

          g_echo_ok "check for updates"

          # Clean up Docker images
          docker system prune -af

          # Find all Docker compose directories excluding special ones
          find /home/docker -maxdepth 1 -mindepth 1 -type d | grep -E -v "mailcow-dockerized$|.del$|.bak$|.old$|var-lib-docker$|var-lib-containerd$" | while read f_docker_dir
          do
            # Skip directories without a compose file
            if [ ! -f "$f_docker_dir/docker-compose.yml" ]
            then
              continue
            fi
            g_echo_ok "$f_docker_dir"
            cd "${f_docker_dir}"
            if docker -l warn compose --ansi never pull --include-deps 2>&1 | grep " Pulled"
            then
              # Write PID file for this service
              echo $$ >/tmp/$(basename $f_docker_dir)
              if ! docker -l warn compose --ansi never up -d --remove-orphans >$g_tmp/up 2>&1
              then
                g_echo_error "$f_docker_dir: docker compose up failed: $(cat $g_tmp/up)"
              fi
              # Check for started containers
              if grep -E -v -- "-wpcli" $g_tmp/up | grep "Started" >${g_tmp}/started
              then
                g_echo_warn "$f_docker_dir Update installed: $(cat ${g_tmp}/started)"
              fi
            fi
            if [ -f Dockerfile ]
            then
              if docker -l warn compose --ansi never build --progress=plain --pull --no-cache --force-rm >$g_tmp/build 2>&1
              then
                if ! docker -l warn compose --ansi never up -d --force-recreate --remove-orphans >$g_tmp/up 2>&1
                then
                  g_echo_error "$f_docker_dir: docker compose up failed: $(cat $g_tmp/up)"
                fi
              else
                g_echo_error "$f_docker_dir: docker compose build failed: $(cat $g_tmp/build)"
              fi
            fi
          done
        backup: yes
        validate: /bin/bash -n %s

    - name: /usr/local/sbin/backup.d/docker.backup
      blockinfile:
        path: /usr/local/sbin/backup.d/docker.backup
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          ### DB Backup ###
          g_echo_ok "Start MySQL and PostgreSQL database backup (Docker)"

          f_days=7

          f_timestamp=$(date +"%Y%m%d%H%M")
          f_container=$(docker ps --format \{\{.Names\}\}:\{\{.Image\}\} | grep -E -v '^mysql|^mariadb' | grep -E 'mysql|mariadb' | cut -d":" -f1 | grep -v mailcow)

          mkdir -p $BACKUPDIR

          ### MYSQL ###
          for f_container_id in $f_container
          do
            # Get database credentials from container environment
            f_db=$(docker exec $f_container_id env | grep -E "MARIADB_DATABASE|MYSQL_DATABASE" | tail -n1 | cut -d"=" -f2)
            f_pwd=$(docker exec $f_container_id env | grep -E "MARIADB_PASSWORD|MYSQL_PASSWORD" | tail -n1 | cut -d"=" -f2)
            f_usr=$(docker exec $f_container_id env | grep -E "MARIADB_USER|MYSQL_USER" | tail -n1 | cut -d"=" -f2)

            # Determine the dump command available in the container
            f_dumpcmd=""
            if docker exec $f_container_id /usr/bin/test -x /usr/bin/mariadb-dump
            then
              f_dumpcmd=/usr/bin/mariadb-dump
            fi
            if docker exec $f_container_id /usr/bin/test -x /usr/bin/mysqldump
            then
              f_dumpcmd=/usr/bin/mysqldump
            fi

            # Skip if no dump command is found
            if [ -z "$f_dumpcmd" ]
            then
              g_echo_error "No dump command found in container $f_container_id! No backup created!"
              continue
            fi

            g_echo "Backup MySQL/MariaDB database $f_db from $f_container_id"

            # Perform the database dump and compress it
            if ! docker exec $f_container_id $f_dumpcmd --no-tablespaces -u $f_usr -p$f_pwd $f_db 2>${g_tmp}/dberr | gzip > $BACKUPDIR/$f_container_id-$f_db-$f_timestamp.sql.gz
            then
              g_echo_error "DB backup of $f_db failed: $(cat ${g_tmp}/dberr)"
            fi

            # Remove old backups but keep at least the last f_days
            f_old_backups=$(ls -1 $BACKUPDIR/$f_container_id*.gz | wc -l)
            if [ $f_old_backups -gt $f_days ]
            then
              find $BACKUPDIR -name "$f_container_id*.gz" -daystart -mtime +$f_days -delete
            fi
          done

          ### POSTGRESQL ###
          f_container=$(docker ps --format \{\{.Names\}\}:\{\{.Image\}\} | grep 'postgres' | cut -d":" -f1 | grep -v mailcow)
          mkdir -p $BACKUPDIR

          for f_container_id in $f_container
          do
            # Get PostgreSQL credentials from container environment
            f_db=$(docker exec $f_container_id env | grep -E "POSTGRES_DB" | tail -n1 | cut -d"=" -f2)
            f_pwd=$(docker exec $f_container_id env | grep -E "POSTGRES_PASSWORD" | tail -n1 | cut -d"=" -f2)
            f_usr=$(docker exec $f_container_id env | grep -E "POSTGRES_USER" | tail -n1 | cut -d"=" -f2)

            g_echo "Backup database $f_db from $f_container_id"

            # Perform the PostgreSQL dump and compress it
            if ! docker exec -e PGPASSWORD=$f_pwd $f_container_id /usr/bin/pg_dump -U $f_usr $f_db 2>${g_tmp}/dberr | gzip > $BACKUPDIR/$f_container_id-$f_db-$f_timestamp.sql.gz
            then
              g_echo_error "DB backup of $f_db failed: $(cat ${g_tmp}/dberr)"
            fi

            # Remove old backups but keep at least the last f_days
            f_old_backups=$(ls -1 $BACKUPDIR/$f_container_id*.gz | wc -l)
            if [ $f_old_backups -gt $f_days ]
            then
              find $BACKUPDIR -name "$f_container_id*.gz" -daystart -mtime +$f_days -delete
            fi
          done
        backup: yes
        validate: /bin/bash -n %s

    - name: docker-compose command/alias for backward compatibility - now docker compose
      blockinfile:
        path: /usr/local/sbin/docker-compose
        mode: "0755"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          docker compose $@          
        backup: yes
        validate: /bin/bash -n %s 

    - name: /usr/local/sbin/docker-compose shebang
      lineinfile:
        path: /usr/local/sbin/docker-compose
        insertbefore: BOF
        line: "#!/bin/bash -e"

    - name: Create traefik network
      community.docker.docker_network:
        name: traefik
        enable_ipv6: yes
        driver_options:
          com.docker.network.bridge.name: br-traefik
        ipam_config:
          - subnet: 192.168.41.0/24
            gateway: 192.168.41.1
          # Local v6 IP  
          - subnet: fdaa:a192:b168:cd41::/64
            gateway: fdaa:a192:b168:cd41::1

    - name: /usr/local/sbin/runchecks.d/symbios-healthcheck-docker.check
      ansible.builtin.blockinfile:
        path: /usr/local/sbin/runchecks.d/symbios-healthcheck-docker.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Healthcheck for docker daemon
          g_check_file="${g_tmp}/symbios-healthcheck-docker"
          if [ -f "$g_check_file" ] && find "$g_check_file" -mmin -5 | grep -q "$g_check_file"
          then
            return 2>/dev/null || true
          fi
          date > "$g_check_file"
          if ! docker info >/dev/null 2>&1
          then
            g_echo_error "Healthcheck failed for docker: daemon not responding"
          fi
        backup: yes
        validate: /bin/bash -n %s

    - name: Deploy healthcheck for Docker containers
      ansible.builtin.blockinfile:
        path: /usr/local/sbin/runchecks.d/symbios-healthcheck-containers.check
        mode: "0400"
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          g_check_file="${g_tmp}/symbios-healthcheck-containers"
          if [ -f "$g_check_file" ] && find "$g_check_file" -mmin -5 | grep -q "$g_check_file"
          then
            return 2>/dev/null || true
          fi
          date > "$g_check_file"

          g_missing=""
          for g_container in traefik symbios-webui openldap ldapam acme-pki-stepca
          do
            if ! docker ps --format '{% raw %}{{.Names}}{% endraw %}' | grep -q "^${g_container}$"
            then
              g_missing="${g_missing:+${g_missing}, }${g_container}"
            fi
          done

          if [ -n "$g_missing" ]
          then
            g_echo_error "Containers not running: ${g_missing}"
          fi
        backup: yes
        validate: /bin/bash -n %s


  handlers:

    - name: Restart docker
      service:
        name: docker
        state: restarted


