---

- name: docker
  hosts: all
  tasks:

### Docker ###

    - name: Create docker Group
      ansible.builtin.group:
        name: docker
        state: present
        gid: 1003

    - name: Create docker User
      ansible.builtin.user:
        name: docker
        comment: docker User
        uid: 1003
        group: docker

    - name: Hide docker user from login screen
      blockinfile:
        path: /var/lib/AccountsService/users/docker
        mode: "0444"
        owner: root
        group: root
        create: yes
        block: |
          [User]
          SystemAccount=true          
        backup: no

    - name: Create docker dir
      ansible.builtin.file:
        path: /home/docker
        owner: docker
        group: docker
        state: directory
        mode: '0750'

    - name: Create docker-data dir
      ansible.builtin.file:
        path: /home/docker/var-lib-docker
        owner: root
        group: root
        state: directory
        mode: '0710'

    - name: Create docker-data dir
      ansible.builtin.file:
        path: /home/docker/var-lib-containerd
        owner: root
        group: root
        state: directory
        mode: '0710'

    - name: Create dir for container defaults
      ansible.builtin.file:
        path: /home/docker/_defaults
        owner: root
        group: docker
        state: directory
        mode: '0750'

    - name: Create /var/lib/docker -> /home/docker/var-lib-docker symlink
      ansible.builtin.file:
        src: /home/docker/var-lib-docker
        dest: /var/lib/docker
        owner: root
        group: root
        state: link

    - name: Create /var/lib/docker -> /home/docker/var-lib-containerd symlink
      ansible.builtin.file:
        src: /home/docker/var-lib-containerd
        dest: /var/lib/containerd
        owner: root
        group: root
        state: link

    - name: Set Docker distro to Ubuntu for Linux Mint
      ansible.builtin.set_fact:
        docker_distribution: "ubuntu"
        docker_release: "noble"
      when: ansible_distribution == "Linux Mint"

    - name: Set Docker distro facts for non-Mint systems
      ansible.builtin.set_fact:
        docker_distribution: "{{ ansible_distribution | lower }}"
        docker_release: "{{ ansible_distribution_release }}"
      when: ansible_distribution != "Linux Mint"

    - name: Ensure keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/ubuntu/gpg"
        dest: /tmp/docker.asc
        mode: "0644"
      changed_when: false

    - name: Dearmor Docker GPG key
      ansible.builtin.command:
        cmd: "gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.asc"
        creates: /etc/apt/keyrings/docker.gpg

    - name: Remove temporary Docker key file
      ansible.builtin.file:
        path: /tmp/docker.asc
        state: absent
      changed_when: false

    - name: Get DEB architecture
      ansible.builtin.command:
        cmd: dpkg --print-architecture
      register: deb_architecture
      changed_when: false

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ deb_architecture.stdout }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ docker_distribution }} {{ docker_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
      changed_when: false

    - name: Remove packages for docker from default repo if installed
      apt:
        name:
          - docker.io
          - docker-compose
          - containerd
          - runc
        state: absent
        update_cache: no
        install_recommends: no

    - name: Check if Docker data dir has containers
      ansible.builtin.stat:
        path: /home/docker/var-lib-docker/containers
      register: data_dir_stat

    - name: Packages for docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - bridge-utils
          - apache2-utils
          - python3-docker
          - mariadb-client
        update_cache: yes
        install_recommends: no

    # https://github.com/nextcloud/docker/issues/1103
    - name: writing daemon.json (ipv6 settings + data-root) 
      copy:
        dest: "/etc/docker/daemon.json"
        content: |
          {
            "data-root": "/home/docker/var-lib-docker",
            "ipv6": true,
            "fixed-cidr-v6": "fdab::/64",
            "experimental": true, 
            "ip6tables": true
          }
      register: daemon_json

    - name: Restart Docker if daemon.json changed or data dir missing
      block:
        - name: Restart Docker
          ansible.builtin.service:
            name: docker
            state: restarted
      when: daemon_json.changed or not data_dir_stat.stat.exists

    - name: Ensure Docker is running
      ansible.builtin.service:
        name: docker
        state: started


    - name: /home/docker/_defaults/mariadb/genrootpw
      blockinfile:
        path: /home/docker/_defaults/mariadb/genrootpw
        create: yes
        mode: 0550
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          cd /home/docker/_defaults/mariadb

          # Generate a random MySQL root password
          f_mysqlpassword=$(pwgen -s 32 1)

          # Create envroot.db with root password if it does not exist
          if [ ! -f env.db ]
          then
            echo "MARIADB_ROOT_PASSWORD=!MYSQLPASSWORD!" >envroot.db
          fi

          # Create env.rootphpmyadmin with root credentials if it does not exist
          if [ ! -f env.phpmyadmin ]
          then
            echo "PMA_USER=root" >env.rootphpmyadmin
            echo "PMA_PASSWORD=!MYSQLPASSWORD!" >>env.rootphpmyadmin
          fi

          # Restrict permissions on credential files
          chmod 440 envroot.db env.rootphpmyadmin
          chown root:docker envroot.db env.rootphpmyadmin

          # Replace placeholder with actual generated password
          sed -i "s/\!MYSQLPASSWORD\!/$f_mysqlpassword/g" envroot.db env.rootphpmyadmin

        backup: yes
        validate: /bin/bash -n %s

    - name: /home/docker/_defaults/mariadb/genrootpw shebang
      lineinfile:
        path: /home/docker/_defaults/mariadb/genrootpw
        insertbefore: BOF
        line: "#!/bin/bash -e"

    # Generate initial passwords for MariaDB if envroot.db does not exist
    - name: Gen initial passwords if not exists
      ansible.builtin.shell: ./genrootpw
      args:
        chdir: /home/docker/_defaults/mariadb
        creates: /home/docker/_defaults/mariadb/envroot.db

    - name: mariadb env defaults
      blockinfile:
        path: /home/docker/_defaults/mariadb/mariadb.env
        mode: "0444"
        owner: root
        group: root
        create: yes
        block: |
          MARIADB_AUTO_UPGRADE=1
          MARIADB_INITDB_SKIP_TZINFO=1
          # from here: save memory https://techroads.org/reducing-memory-use-on-my-mariadb-mysql-wordpress-docker-stack/
          MARIADB_KEY_BUFFER_SIZE=1M
          MARIADB_MYISAMCHK_KEY_BUFFER_SIZE=1M
          MARIADB_INNODB_BUFFER_POOL_SIZE=10M
          MARIADB_INNODB_LOG_BUFFER_SIZE=512K
          MARIADB_MYISAM_SORT_BUFFER_SIZE=64K
          MARIADB_MYISAMCHK_SORT_BUFFER_SIZE=64K
          MARIADB_READ_BUFFER_SIZE=8K
          MARIADB_READ_RND_BUFFER_SIZE=8K
          MARIADB_SORT_BUFFER_SIZE=64K
        backup: yes

    - name: mariadb server config defaults
      blockinfile:
        path: /home/docker/_defaults/mariadb/99-server.cnf
        mode: "0444"
        owner: root
        group: root
        create: yes
        block: |
          [mariadbd]
          max_connections=300
          query_cache_size=512K
          thread_cache_size=0
          sort_buffer_size=64K
          bulk_insert_buffer_size=0
          tmp_table_size=1K
          max_heap_table_size=16K
          key_buffer_size=1M
          read_buffer_size=8K
          read_rnd_buffer_size=8K
          #innodb_buffer_pool_size=10K
          #innodb_log_buffer_size=512K
        backup: yes

    - name: /usr/local/sbin/autoupdate.d/docker.update
      ansible.builtin.copy:
        src: /home/SymbiOS/scripts/autoupdate.d/docker.update
        dest: /usr/local/sbin/autoupdate.d/docker.update
        mode: "0400"
        owner: root
        group: root
        backup: yes

    - name: /usr/local/sbin/backup.d/docker.backup
      ansible.builtin.copy:
        src: /home/SymbiOS/scripts/backup.d/docker.backup
        dest: /usr/local/sbin/backup.d/docker.backup
        mode: "0400"
        owner: root
        group: root
        backup: yes

    - name: docker-compose command/alias for backward compatibility - now docker compose
      ansible.builtin.copy:
        src: /home/SymbiOS/scripts/docker-compose
        dest: /usr/local/sbin/docker-compose
        mode: "0755"
        owner: root
        group: root
        backup: yes

    - name: Create traefik network
      community.docker.docker_network:
        name: traefik
        enable_ipv6: yes
        driver_options:
          com.docker.network.bridge.name: br-traefik
        ipam_config:
          - subnet: 192.168.41.0/24
            gateway: 192.168.41.1
          # Local v6 IP  
          - subnet: fdaa:a192:b168:cd41::/64
            gateway: fdaa:a192:b168:cd41::1

    - name: /usr/local/sbin/runchecks.d/symbios-healthcheck-docker.check
      ansible.builtin.copy:
        src: /home/SymbiOS/scripts/runchecks.d/symbios-healthcheck-docker.check
        dest: /usr/local/sbin/runchecks.d/symbios-healthcheck-docker.check
        mode: "0400"
        owner: root
        group: root
        backup: yes

    - name: Deploy healthcheck for Docker containers
      ansible.builtin.copy:
        src: /home/SymbiOS/scripts/runchecks.d/symbios-healthcheck-containers.check
        dest: /usr/local/sbin/runchecks.d/symbios-healthcheck-containers.check
        mode: "0400"
        owner: root
        group: root
        backup: yes



    - name: Register playbook as installed
      ansible.builtin.command: symbios-state.sh set base-services/docker.yml
      changed_when: false
  handlers:

    - name: Restart docker
      service:
        name: docker
        state: restarted


