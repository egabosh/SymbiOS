# docs:
#   short_description: A local Certificate Authority (step-ca/acme)
#   description: Installs and configures step-ca as a local, ACME-compatible Certificate Authority. It issues local TLS certificates when the server is not accassable via letsencrypt (airgapped).
#   author: Oliver Bohlen
#   version: '1.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: PKI / Certificates
#   service_control:
#     services:
#     - name: acme-pki (step-ca)
#       type: docker
#       compose_file: /home/docker/acme-pki/docker-compose.yml
#       status: test -d /home/docker/acme-pki || exit 2; docker compose -f /home/docker/acme-pki/docker-compose.yml ps | grep -q "Up "
#     logs:
#     - name: acme-pki (step-ca)
#       command: docker compose -f /home/docker/acme-pki/docker-compose.yml logs -f --tail=100
#   actions:
#     uninstall: docker compose -f /home/docker/acme-pki/docker-compose.yml down
#     start: docker compose -f /home/docker/acme-pki/docker-compose.yml up -d
#     stop: docker compose -f /home/docker/acme-pki/docker-compose.yml down
#     restart: docker compose -f /home/docker/acme-pki/docker-compose.yml restart
#     root_cert: cat /home/docker/acme-pki/pki/ca/root-ca.pem

- name: ACME PKI - Set up local Fallback CA (step-ca)
  hosts: all
  gather_facts: true
  vars:
    acme_dir: "/home/docker/acme-pki"
    pki_dir: "{{ acme_dir }}/pki"
    data_dir: "{{ acme_dir }}/data"
    ca_cert: "{{ pki_dir }}/ca/root-ca.pem"
    ca_key: "{{ pki_dir }}/ca/root-ca-key.pem"
    pki_cn: "SymbiOS Local CA"
    pki_org: "SymbiOS"
    traefik_dir: "/home/docker/traefik"
    stepca_port: "9000"
    stepca_container: "acme-pki-stepca"

  tasks:
    - name: Create directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ pki_dir }}/ca"
        - "{{ pki_dir }}/certs"
        - "{{ data_dir }}"
        - "{{ data_dir }}/config"
        - "{{ data_dir }}/certs"
        - "{{ data_dir }}/secrets"
        - "{{ data_dir }}/db"
        - "{{ data_dir }}/acme"

    # Generate 4096-bit RSA private key for the local Root CA
    - name: Generate Root CA Key
      ansible.builtin.shell: openssl genrsa -out {{ ca_key }} 4096
      args: { creates: "{{ ca_key }}" }

    # Self-sign Root CA certificate with 10-year validity
    - name: Self-sign Root CA Certificate (10 years)
      ansible.builtin.shell: |
        openssl req -x509 -new -nodes -key "{{ ca_key }}" -sha256 -days 3650 \
          -out "{{ ca_cert }}" \
          -subj "/C=DE/ST=Local/L=Local/O={{ pki_org }}/CN={{ pki_cn }} Root CA" \
          -addext "basicConstraints=critical,CA:TRUE" \
          -addext "keyUsage=critical,keyCertSign,cRLSign" \
          -addext "subjectKeyIdentifier=hash"
      args: { creates: "{{ ca_cert }}" }

    # ===== Prepare step-ca data directory =====
    - name: Copy CA files to step-ca data directory
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        remote_src: yes
        mode: "{{ item.mode }}"
        owner: "1000"
        group: "1000"
      loop:
        - { src: "{{ ca_cert }}", dest: "{{ data_dir }}/certs/ca.crt", mode: "0644" }
        - { src: "{{ ca_key }}", dest: "{{ data_dir }}/secrets/ca_key", mode: "0600" }

    # ===== step-ca expects a password file (even for unencrypted keys) =====
    - name: Create password file for step-ca
      ansible.builtin.copy:
        content: ""
        dest: "{{ data_dir }}/secrets/password"
        owner: "1000"
        group: "1000"
        mode: "0600"

    # ===== step-ca Configuration =====
    - name: Write step-ca config (ca.json)
      ansible.builtin.copy:
        content: |
          {
            "root": "/home/step/certs/ca.crt",
            "crt": "/home/step/certs/ca.crt",
            "key": "/home/step/secrets/ca_key",
            "address": ":{{ stepca_port }}",
            "dnsNames": ["{{ stepca_container }}", "localhost"],
            "logger": {"level": "info"},
            "db": {
              "type": "badgerv2",
              "dataSource": "/home/step/db"
            },
            "authority": {
              "claims": {
                "maxTLSCertDuration": "2160h",
                "defaultTLSCertDuration": "2160h",
                "minTLSCertDuration": "5m"
              },
              "provisioners": [
                {
                  "type": "ACME",
                  "name": "acme",
                  "forceCN": true
                }
              ]
            },
            "tls": {
              "cipherSuites": [
                "TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256",
                "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256",
                "TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384",
                "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
              ],
              "minVersion": 1.2,
              "maxVersion": 1.3
            }
          }
        dest: "{{ data_dir }}/config/ca.json"
        mode: "0640"
        owner: "1000"
        group: "1000"

    - name: Ensure step-ca contexts.json exists
      ansible.builtin.copy:
        content: "{}"
        dest: "{{ data_dir }}/contexts.json"
        mode: "0644"
        owner: "1000"
        group: "1000"

    # Fix ownership of step-ca data directory to container UID 1000
    - name: Fix ownership of step-ca data directory
      ansible.builtin.shell: chown -R 1000:1000 {{ data_dir }}
      changed_when: false

    - name: Write step-ca Docker Compose
      ansible.builtin.copy:
        content: |
          name: ""

          services:
            stepca:
              image: smallstep/step-ca:latest
              container_name: {{ stepca_container }}
              restart: unless-stopped
              security_opt:
                - no-new-privileges:true
              networks:
                traefik: null
              ports:
                - "{{ stepca_port }}:{{ stepca_port }}"
              volumes:
                - ./data:/home/step
                - /etc/localtime:/etc/localtime:ro
          networks:
            traefik:
              external: true
        dest: "{{ acme_dir }}/docker-compose.yml"
        mode: "0440"
        owner: root
        group: docker
        backup: yes
      notify: Restart stepca

    # ===== Traefik Integration =====
    - name: Ensure traefik providers directory exists
      ansible.builtin.file:
        path: "{{ traefik_dir }}/providers"
        state: directory
        mode: "0755"
        owner: root
        group: docker

    - name: Copy Root CA to Traefik providers
      ansible.builtin.copy:
        src: "{{ ca_cert }}"
        dest: "{{ traefik_dir }}/providers/symbios-pki-ca.pem"
        mode: "0444"
        owner: root
        group: docker
        backup: yes


    # ===== Host System CA Trust =====
    # Install the SymbiOS Root CA into the system-wide CA trust store
    - name: Install SymbiOS Root CA in host trust store
      ansible.builtin.copy:
        src: "{{ ca_cert }}"
        dest: /usr/share/ca-certificates/symbios-pki-ca.crt
        mode: "0644"
      notify: Update CA certificates

    # Register the SymbiOS CA certificate in the ca-certificates configuration
    - name: Register SymbiOS Root CA in ca-certificates.conf
      ansible.builtin.lineinfile:
        path: /etc/ca-certificates.conf
        line: symbios-pki-ca.crt
        state: present
      notify: Update CA certificates

    # Rebuild the combined CA bundle so the Traefik container trusts the local CA
    - name: Rebuild CA bundle for Traefik container
      ansible.builtin.shell: |
        cat /etc/ssl/certs/ca-certificates.crt > {{ traefik_dir }}/ca-bundle.crt
        echo "" >> {{ traefik_dir }}/ca-bundle.crt
        cat {{ ca_cert }} >> {{ traefik_dir }}/ca-bundle.crt
      changed_when: false

    - name: /usr/local/sbin/runchecks.d/symbios-healthcheck-acme-pki.check
      ansible.builtin.blockinfile:
        path: /usr/local/sbin/runchecks.d/symbios-healthcheck-acme-pki.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Healthcheck for step-ca (ACME PKI)
          g_check_file="${g_tmp}/symbios-healthcheck-acme-pki"
          if [ -f "$g_check_file" ] && find "$g_check_file" -mmin -5 | grep -q "$g_check_file"
          then
            return 2>/dev/null || true
          fi
          date > "$g_check_file"
          if ! docker exec acme-pki-stepca wget -q -O /dev/null --no-check-certificate --timeout=10 https://localhost:{{ stepca_port }}/health 2>/dev/null
          then
            g_echo_error "Healthcheck failed for acme-pki: step-ca health endpoint unreachable"
          fi
        backup: yes
        validate: /bin/bash -n %s

    - name: Deploy healthcheck for Step-CA root certificate
      ansible.builtin.blockinfile:
        path: /usr/local/sbin/runchecks.d/symbios-healthcheck-root-ca.check
        mode: "0400"
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          g_check_file="${g_tmp}/symbios-healthcheck-root-ca"
          if [ -f "$g_check_file" ] && find "$g_check_file" -mmin -5 | grep -q "$g_check_file"
          then
            return 2>/dev/null || true
          fi
          date > "$g_check_file"

          g_stepca_ip=$(docker inspect acme-pki-stepca --format '{% raw %}{{range .NetworkSettings.Networks}}{{.IPAddress}}{{"\n"}}{{end}}{% endraw %}' 2>/dev/null | grep '^192\.168\.' | head -1)
          if [ -z "$g_stepca_ip" ]
          then
            g_echo_error "Cannot determine Step-CA container IP for root CA check"
            return 2>/dev/null || true
          fi

          g_enddate=$(echo | openssl s_client -connect "${g_stepca_ip}:9000" -servername acme-pki-stepca 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
          if [ -z "$g_enddate" ]
          then
            g_echo_error "Step-CA root certificate unreachable at ${g_stepca_ip}:9000"
            return 2>/dev/null || true
          fi

          g_expiry_epoch=$(date -d "$g_enddate" +%s 2>/dev/null)
          g_now_epoch=$(date +%s)
          g_days_left=$(( (g_expiry_epoch - g_now_epoch) / 86400 ))

          if [ "$g_days_left" -lt 0 ]
          then
            g_echo_error "Step-CA root certificate EXPIRED on $(date -d "$g_enddate" +%F)"
          elif [ "$g_days_left" -lt 7 ]
          then
            g_echo_error "Step-CA root certificate expires in ${g_days_left} days ($(date -d "$g_enddate" +%F)) — renew now"
          fi
        backup: yes
        validate: /bin/bash -n %s



    - name: Register playbook as installed
      ansible.builtin.command: /usr/local/sbin/symbios-state.sh set acme-pki.yml
      changed_when: false
  handlers:

    # Restart step-ca container after config changes
    - name: Restart stepca
      ansible.builtin.shell: docker compose up -d --force-recreate
      args: { chdir: "{{ acme_dir }}" }

    # Restart Traefik to pick up new certificate bundle
    - name: Restart traefik
      ansible.builtin.shell: docker compose up -d --force-recreate
      args: { chdir: "{{ traefik_dir }}" }

    # Update system CA certificate store
    - name: Update CA certificates
      ansible.builtin.command: update-ca-certificates
