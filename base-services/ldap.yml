# docs:
#   short_description: Deploy and configure the OpenLDAP directory
#   description: Installs OpenLDAP, seeds the directory with users and groups, and provides the identity backend used by Authelia and the WebUI.
#   author: Oliver Bohlen
#   version: '1.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: Directory / Identity
#   service_control:
#     services:
#     - name: ldap
#       type: docker
#       compose_file: /home/docker/ldap/docker-compose.yml
#       status: test -d /home/docker/ldap || exit 2; docker compose -f /home/docker/ldap/docker-compose.yml ps | grep -q "Up "
#     logs:
#     - name: ldap
#       command: docker compose -f /home/docker/ldap/docker-compose.yml logs -f --tail=1000
#   actions:
#     start: docker compose -f /home/docker/ldap/docker-compose.yml up -d
#     stop: docker compose -f /home/docker/ldap/docker-compose.yml down
#     restart: docker compose -f /home/docker/ldap/docker-compose.yml restart

---
- name: ldap
  hosts: all

  vars:
    service_name: "ldap"
    service_domain: "{{ service_name }}.{{ default_domain }}"
    docker_path: "/home/docker/{{ service_name }}"


  tasks:

    - name: Install ldap tools
      apt:
        name:
          - ldap-utils
          - ldapscripts
          - libnss-ldapd
          - libpam-ldapd
        update_cache: no
        install_recommends: no

    - name: Create required directories
      ansible.builtin.file:
        path: "{{ docker_path }}/{{ item.path }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
        state: directory
      loop:
        - { path: '', owner: root, group: docker, mode: '0550' }
        - { path: 'ldap-config', owner: 10001, group: 10001, mode: '0770' }
        - { path: 'ldap-db', owner: 10001, group: 10001, mode: '0770' }
        - { path: 'lam-data', owner: 33, group: 33, mode: '0755' }
        - { path: 'lam-data/etc-ldap-account-manager', owner: 33, group: 33, mode: '0775' }

    - name: Check if lam-data/config exists
      stat:
        path: "{{ docker_path }}/lam-data/config"
      register: lam_config_status

    - name: Generate initial config for lam
      when: not lam_config_status.stat.exists
      block:

        - name: Clone lam git repository to /tmp/lam-temp
          ansible.builtin.git:
            repo: https://github.com/LDAPAccountManager/lam.git
            dest: /tmp/lam-temp
            update: no

        - name: Copy lam/config from clone to {{ docker_path }}/lam-data/config
          ansible.builtin.copy:
            src: /tmp/lam-temp/lam/config/
            dest: "{{ docker_path }}/lam-data/config/"

        - name: Download default customized lam.conf
          ansible.builtin.get_url:
            url: https://raw.githubusercontent.com/egabosh/linux-setups/refs/heads/main/debian/ldap.server/lam.conf
            dest: "{{ docker_path }}/lam-data/config/lam.conf"

        - name: Link lam config.cfg
          ansible.builtin.file:
            src: /etc/ldap-account-manager/config.cfg
            dest: "{{ docker_path }}/lam-data/config/config.cfg"
            state: link
            force: yes

    - name: default user config
      blockinfile:
        path: "{{ docker_path }}/lam-data/config/profiles/lam/default.user"
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          ldap_suffix: -
          ldap_rdn: uid
          inetOrgPerson_description:
          inetOrgPerson_mail:
          posixAccount_primaryGroup: {{ service_name }}-users
          posixAccount_additionalGroup: {{ service_name }}-users
          posixAccount_cn:
          posixAccount_gecos: $firstname $lastname
          posixAccount_homeDirectory: /home/$user
          posixAccount_loginShell: /bin/false
          shadowAccount_addExt: false
          shadowAccount_shadowWarning: 10
          shadowAccount_shadowInactive: 10
          shadowAccount_shadowMin: 1
          shadowAccount_shadowMax: 365
          shadowAccount_shadowExpire_day: -
          shadowAccount_shadowExpire_mon: -
          shadowAccount_shadowExpire_yea: -

    - name: Check if lam-data/etc-ldap-account-manager exists
      stat:
        path: "{{ docker_path }}/lam-data/etc-ldap-account-manager/config.cfg"
      register: lam_etc_ldap_account_manager

    - name: Generate initial config for lam in /etc
      when: not lam_etc_ldap_account_manager.stat.exists
      block:

        - name: Clone lam git repository to /tmp/lam-temp
          ansible.builtin.git:
            repo: https://github.com/LDAPAccountManager/lam.git
            dest: /tmp/lam-temp
            update: no

        - name: Copy LAM config.cfg
          ansible.builtin.copy:
            src: /tmp/lam-temp/lam/config/config.cfg.sample
            dest: "{{ docker_path }}/lam-data/etc-ldap-account-manager/config.cfg"

        - name: Set passwordMinLength to 0
          ansible.builtin.replace:
            path: "{{ docker_path }}/lam-data/etc-ldap-account-manager/config.cfg"
            regexp: '"passwordMinLength": *"10"'
            replace: '"passwordMinLength": "0"'
            backup: yes

        - name: Copy LAM nginx.conf
          ansible.builtin.copy:
            src: /tmp/lam-temp/lam-packaging/debian/lam.nginx.conf
            dest: "{{ docker_path }}/lam-data/etc-ldap-account-manager/nginx.conf"

        - name: Copy LAM apache.conf
          ansible.builtin.copy:
            src: /tmp/lam-temp/lam-packaging/debian/lam.apache.conf
            dest: "{{ docker_path }}/lam-data/etc-ldap-account-manager/apache.conf"

    - name: Remove the cloned /tmp/lam-temp directory
      ansible.builtin.file:
        path: /tmp/lam-temp
        state: absent

    - name: Check if env.ldap exists
      stat:
        path: "{{ docker_path }}/env.ldap"
      register: env_ldap

    - name: Generate initial env.ldap
      when: not env_ldap.stat.exists
      block:

        # Generate a random password for LDAP Account Manager
        - name: Generate lam_password
          command: pwgen -s 32 1
          register: lam_password

        - name: Save plaintext lam_password password to env.ldap file
          copy:
            content: |
              LAM_PASSWORD={{ lam_password.stdout }}
            dest: "{{ docker_path }}/env.ldap"
            mode: '0440'
            owner: docker
            group: root

    - name: Recursively change owner and group to 33:33
      ansible.builtin.file:
        path: "{{ docker_path }}/lam-data"
        recurse: yes
        owner: '33'
        group: '33'

    - name: Check if slapd.conf.ldif exists
      stat:
        path: "{{ docker_path }}/ldap-config/slapd.conf.ldif.done"
      register: slapd_conf_status

    - name: Generate initial config for ldap
      when: not slapd_conf_status.stat.exists
      block:

        # Generate random password for LDAP admin user
        - name: Generate a secure password using pwgen
          command: pwgen -s 32 1
          register: ldap_password
          no_log: true

        # Generate random password for LDAP read-only user
        - name: Generate a secure password using pwgen readuser
          command: pwgen -s 32 1
          register: readuser_password
          no_log: true

        - name: Save plaintext password to env.ldap file
          copy:
            content: |
              LDAP_ADMIN_PASSWORD={{ ldap_password.stdout }}
              LDAP_READUSER_PASSWORD={{ readuser_password.stdout }}
            dest: "{{ docker_path }}/env.openldap"
            mode: '0440'
            owner: docker
            group: root
          no_log: true

        # Generate SSHA hash of admin password for LDIF
        - name: Generate SSHA password hash using Python
          shell: echo "{{ ldap_password.stdout }}" | python3 -c "import hashlib,base64,os,sys; salt=os.urandom(8); pw=sys.stdin.read().strip(); print('{SSHA}'+base64.b64encode(hashlib.sha1(pw.encode()+salt).digest()+salt).decode())"
          register: ssha_hash
          no_log: true

        - name: Set ldap_password_hash variable
          set_fact:
            ldap_password_hash: "{{ ssha_hash.stdout }}"
          no_log: true
 
        # Generate SSHA hash of readuser password for LDIF
        - name: Generate SSHA password hash using Python readuser
          shell: echo "{{ readuser_password.stdout }}" | python3 -c "import hashlib,base64,os,sys; salt=os.urandom(8); pw=sys.stdin.read().strip(); print('{SSHA}'+base64.b64encode(hashlib.sha1(pw.encode()+salt).digest()+salt).decode())"
          register: ssha_hash_readuser
          no_log: true

        - name: Set ldap_password_hash variable readuser
          set_fact:
            ldap_password_readuser_hash: "{{ ssha_hash_readuser.stdout }}"
          no_log: true

        - name: "{{ docker_path }}/ldap-config/base.ldif"
          blockinfile:
            path: "{{ docker_path }}/ldap-config/base.ldif"
            mode: "0440"
            owner: 10001
            group: 10001
            create: yes
            marker: "# {mark} ANSIBLE MANAGED BLOCK"
            block: |
              dn: {{ldap_basedn}}
              objectClass: top
              objectClass: dcObject
              objectClass: organization
              o: {{service_domain}}
              dc: openldap

              dn: cn=readuser,{{ldap_basedn}}
              objectClass: simpleSecurityObject
              objectClass: organizationalRole
              cn: readuser
              description: LDAP Read-Only Service Account. Do not remove!
              userPassword: {{ldap_password_readuser_hash}}

              dn: ou=users,{{ldap_basedn}}
              objectClass: organizationalUnit
              ou: users

              dn: ou=groups,{{ldap_basedn}}
              objectClass: organizationalUnit
              ou: groups

              dn: cn={{ service_name }}-admins,ou=groups,{{ldap_basedn}}
              objectClass: top
              objectClass: posixGroup
              cn: {{ service_name }}-admins
              gidNumber: 30000
              memberUid: admin

              dn: cn={{ service_name }}-users,ou=groups,{{ldap_basedn}}
              objectClass: top
              objectClass: posixGroup
              cn: {{ service_name }}-users
              gidNumber: 30001
              memberUid: admin

              dn: uid=admin,ou=users,{{ldap_basedn}}
              objectClass: top
              objectClass: inetOrgPerson
              objectClass: posixAccount
              objectClass: shadowAccount
              cn: admin
              sn: Administrator
              uid: admin
              uidNumber: 30000
              gidNumber: 30001
              homeDirectory: /home/admin
              loginShell: /bin/bash
              userPassword: {{ldap_password_hash}}
          no_log: true

        - name: "{{ docker_path }}/ldap-config/config.ldif"
          blockinfile:
            path: "{{ docker_path }}/ldap-config/config.ldif"
            mode: "0440"
            owner: 10001
            group: 10001
            create: yes
            marker: "# {mark} ANSIBLE MANAGED BLOCK"
            block: |
              dn: cn=config
              objectClass: olcGlobal
              cn: config
              olcDisallows: bind_anon
              olcRequires: authc

              dn: cn=module,cn=config
              objectClass: olcModuleList
              cn: module
              olcModulePath: /usr/lib/ldap
              olcModuleLoad: back_mdb

              dn: olcDatabase={0}config,cn=config
              objectClass: olcDatabaseConfig
              objectClass: olcConfig
              olcDatabase: config

              dn: olcDatabase={1}mdb,cn=config
              objectClass: olcDatabaseConfig
              objectClass: olcMdbConfig
              olcDatabase: mdb
              olcSuffix: {{ldap_basedn}}
              olcRootDN: cn=head-of-ldap,{{ldap_basedn}}
              olcRootPW: {{ldap_password_hash}}
              olcDbDirectory: /var/lib/ldap
              olcDbIndex: objectClass eq
              olcAccess: {0}to dn.base="" by * read
              olcAccess: {1}to dn.base="cn=Subschema" by * read
              olcAccess: {2}to attrs=userPassword
                by self write
                by anonymous auth
                by dn="cn=readuser,{{ldap_basedn}}" auth
                by * none
              olcAccess: {3}to *
                by dn="cn=readuser,{{ldap_basedn}}" read
                by * none
          no_log: true

    - name: "{{ docker_path }}/Dockerfile"
      blockinfile:
        path: "{{ docker_path }}/Dockerfile"
        mode: "0440"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          FROM ghcr.io/egabosh/debian:latest
          RUN echo "slapd slapd/internal/generated_adminpw password admin" | debconf-set-selections && \
            echo "slapd slapd/password2 password admin" | debconf-set-selections && \
            echo "slapd slapd/internal/adminpw password admin" | debconf-set-selections && \
            echo "slapd slapd/password1 password admin" | debconf-set-selections && \
            echo "slapd slapd/domain string openldap.local" | debconf-set-selections && \
            DEBIAN_FRONTEND=noninteractive apt-get update && \
            addgroup --system --gid 10001 openldap && \
            adduser --system --disabled-password --disabled-login --gid 10001 --uid 10001 --home /var/lib/ldap openldap && \
            DEBIAN_FRONTEND=noninteractive apt-get install -y slapd ldap-utils && \
            apt-get clean && \
            rm -rf /var/lib/apt/lists/*
          COPY ./docker-entrypoint.sh /
          ENTRYPOINT ["/docker-entrypoint.sh"]
        backup: yes
      notify:
      - Restart ldap

    - name: "{{ docker_path }}/docker-entrypoint.sh"
      blockinfile:
        path: "{{ docker_path }}/docker-entrypoint.sh"
        mode: "0555"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          set -x

          # Create slapd runtime directory with correct ownership
          mkdir -p /var/run/slapd
          chown openldap:openldap /var/run/slapd

          # Initialize LDAP configuration if not already done
          if ! [[ -s /ldap-config/slapd.conf.ldif.done ]]
          then
            # Clean existing configuration
            rm -rf /etc/ldap/slapd.d/*
            mkdir /ldap-config/slapd.d
            chown -R openldap:openldap /var/lib/ldap /ldap-config/slapd.d

            # Load configuration LDIF
            slapadd -F /ldap-config/slapd.d -n 0 -l /ldap-config/config.ldif

            # Load standard LDAP schemas
            slapadd -F /ldap-config/slapd.d -n 0 -l /etc/ldap/schema/core.ldif
            slapadd -F /ldap-config/slapd.d -n 0 -l /etc/ldap/schema/cosine.ldif
            slapadd -F /ldap-config/slapd.d -n 0 -l /etc/ldap/schema/inetorgperson.ldif
            slapadd -F /ldap-config/slapd.d -n 0 -l /etc/ldap/schema/nis.ldif

            # Load base directory structure
            slapadd -F /ldap-config/slapd.d -l /ldap-config/base.ldif

            # Fix ownership after slapadd operations
            chown -R openldap:openldap /var/lib/ldap /ldap-config/slapd.d

            # Mark initialization as complete
            date >>/ldap-config/slapd.conf.ldif.done
          fi

          # Start slapd in foreground
          exec /usr/sbin/slapd -h "ldap:/// ldapi:///" -d 0 -u openldap -g openldap -F /ldap-config/slapd.d
        backup: yes
        validate: /bin/bash -n %s
      notify:
      - Restart ldap

    - name: "{{ docker_path }}/docker-entrypoint.sh shebang"
      lineinfile:
        path: "{{ docker_path }}/docker-entrypoint.sh"
        insertbefore: BOF
        line: "#!/bin/bash"

    - name: "{{ docker_path }}/docker-compose.yml Container Configuration"
      blockinfile:
        path: "{{ docker_path }}/docker-compose.yml"
        create: yes
        mode: 0440
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          name: ""

          services:

            openldap:
              build:
                context: .
                dockerfile: Dockerfile
              container_name: openldap
              volumes:
                - ./ldap-db:/var/lib/ldap:rw
                - ./ldap-config:/ldap-config:rw
                - /etc/localtime:/etc/localtime:ro
              restart: unless-stopped
              networks:
                - ldap
                - traefik

            ldapam:
              image: ghcr.io/ldapaccountmanager/lam:stable
              container_name: ldapam
              volumes:
                - /etc/localtime:/etc/localtime:ro
                - /etc/hosts:/etc/hosts:ro
                - ./lam-data/config:/var/lib/ldap-account-manager/config:rw
                - ./lam-data/etc-ldap-account-manager:/etc/ldap-account-manager:rw
              env_file:
                - env.ldap
                - env.openldap
              environment:
                LDAP_SERVER: "ldap://openldap"
                LDAP_BASE_DN: "{{ldap_basedn}}"
                LDAP_USER: "cn=head-of-ldap,{{ldap_basedn}}"
                LDAP_GROUPS_DN: "ou=groups,{{ldap_basedn}}"
                LDAP_USERS_DN: "ou=users,{{ldap_basedn}}"
                LDAP_ORGANISATION: "{{service_domain}}"
                LAM_CONFIGURATION_DATABASE: "files"
                LAM_SKIP_PRECONFIGURE: false
              depends_on:
                - openldap
              restart: unless-stopped
              networks:
                - ldap
                - traefik

          networks:
            ldap:
              driver: bridge
              driver_opts:
                com.docker.network.bridge.name: br-ldap
            traefik:
              external: true

        backup: yes        
      notify: Restart ldap

    - name: /usr/local/sbin/backup.d/ldap-docker.backup
      blockinfile:
        path: /usr/local/sbin/backup.d/ldap-docker.backup
        create: yes
        mode: 0550 
        owner: root
        group: root 
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Configure backup retention period in days
          f_days=7
          f_timestamp=$(date +"%Y%m%d%H%M")

          cd {{ docker_path }}

          # Export LDAP database using slapcat
          if docker compose exec -ti openldap.{{service_domain}} slapcat -F /ldap-config/slapd.d >$BACKUPDIR/openldap.{{service_domain}}-$f_timestamp.ldif 2>"${g_tmp}/ldaperr"
          then
            # Compress the LDIF backup
            gzip $BACKUPDIR/openldap.{{service_domain}}-$f_timestamp.ldif
          else
            g_echo_error "LDAP backup failed: $(cat ${g_tmp}/ldaperr)"
          fi
          cd -

          # Count existing backups
          f_old_backups=$(ls -1 $BACKUPDIR/openldap.{{service_domain}}-*.gz 2>/dev/null | wc -l)

          # Remove old backups if more than retention period
          if [ -n "$f_old_backups" ]
          then
            if [ $f_old_backups -gt $f_days ]
            then
              find $BACKUPDIR -name "openldap.{{service_domain}}-*.gz" -daystart -mtime +$f_days -delete
            fi
          fi
        backup: yes
        validate: /bin/bash -n %s

    # Extract LDAP readuser password from env.openldap for nslcd config
    - name: Get LDAP readuser password from file
      shell: "grep ^LDAP_READUSER_PASSWORD= {{ docker_path }}/env.openldap | cut -d= -f2-"
      register: ldap_readuser_password
      changed_when: false
      no_log: true

    - name: /etc/nslcd.conf
      ansible.builtin.copy:
        dest: /etc/nslcd.conf
        mode: 0640 
        owner: root
        group: nslcd
        content: |
          uid nslcd
          gid nslcd
           
          uri ldaps://openldap.{{default_domain}}:389
          base {{ldap_basedn}}
          base passwd ou=users,{{ldap_basedn}}
          base group ou=groups,{{ldap_basedn}}
          base shadow ou=users,{{ldap_basedn}}
          ldap_version 3
          
          bind_timelimit 3
          timelimit 3
          reconnect_retrytime 1
 
          binddn cn=readuser,{{ldap_basedn}}
          bindpw {{ ldap_readuser_password.stdout }}

          #tls_reqcert demand
          #tls_cacert /etc/ssl/certs/ca-certificates.crt
        backup: yes
        force: yes
      no_log: true

    - name: /etc/ldapscripts/ldapscripts.conf
      blockinfile:
        path: /etc/ldapscripts/ldapscripts.conf
        create: yes
        mode: 0644
        owner: root
        group: root
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          BINDDN="cn=head-of-ldap,{{ldap_basedn}}"
        backup: yes

    # Extract LDAP admin password from env.openldap for ldapscripts
    - name: Get LDAP admin password from file
      shell: "grep ^LDAP_ADMIN_PASSWORD= {{ docker_path }}/env.openldap | cut -d= -f2-"
      register: ldap_admin_password
      changed_when: false
      no_log: true

    # Write admin password to ldapscripts without trailing newline
    - name: Write /etc/ldapscripts/ldapscripts.passwd without newline
      shell: "printf '%s' '{{ ldap_admin_password.stdout }}' > /etc/ldapscripts/ldapscripts.passwd"
      changed_when: false
      no_log: true

    - name: Set ownership and permissions for /etc/ldapscripts/ldapscripts.passwd
      ansible.builtin.file:
        path: /etc/ldapscripts/ldapscripts.passwd
        owner: root
        group: root
        mode: '0400'
        state: file
      become: true

    - name: Create LDAP configuration file
      copy:
        dest: /etc/ldap/ldap.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          BASE {{ldap_basedn}}
          URI ldaps://openldap.{{ default_domain }}:389
          #TLS_REQCERT demand
          #TLS_CACERT /etc/ssl/certs/ca-certificates.crt
          NETWORK_TIMEOUT 3
          timeout 3
          timelimit 3
          bind_timelimit 3
          nss_reconnect_tries 1
          nss_reconnect_sleeptime 1
          nss_reconnect_maxsleeptime 2
          nss_reconnect_maxconntries 1

    - name: "/usr/local/bin/symbios-ldapsearch"
      ansible.builtin.copy:
        dest: "/usr/local/bin/symbios-ldapsearch"
        mode: 0750
        owner: root
        group: root
        content: |
          #!/bin/bash

          # Source LDAP credentials from environment file
          . /home/docker/ldap/env.openldap

          # Use docker exec to bypass Traefik TLS (Step-CA may be unhealthy)
          docker compose -f /home/docker/ldap/docker-compose.yml exec -T openldap \
            ldapsearch -x -H ldap://localhost -D "cn=readuser,{{ldap_basedn}}" -w "$LDAP_READUSER_PASSWORD" -b "{{ldap_basedn}}" "$@"
          f_rc=$?

          # Clear credentials from environment
          unset LDAP_ADMIN_PASSWORD LDAP_READUSER_PASSWORD

          exit $f_rc
        backup: yes


    - name: Flush handlers to ensure LDAP container is started
      ansible.builtin.meta: flush_handlers

# ADMIN_PASSWORD_TASKS_MARKER
    # Wait for LDAP container to respond to authentication queries
    - name: Wait for LDAP to be ready
      ansible.builtin.shell:
        cmd: docker compose exec -T openldap ldapwhoami -x -H ldap://localhost -D cn=head-of-ldap,{{ldap_basedn}} -w {{ ldap_admin_password.stdout }}
      args:
        chdir: "{{ docker_path }}"
      register: ldap_ready
      until: ldap_ready.rc == 0
      retries: 60
      delay: 5
      changed_when: false
      no_log: true

    # Set initial admin user password in LDAP directory (only on first run)
    - name: Check if admin password was already initialized
      ansible.builtin.stat:
        path: /home/docker/symbios-ui/config/.admin_initialized
      register: admin_init_flag

    - name: Ensure admin user password is admin in LDAP
      ansible.builtin.shell: |
        docker compose exec -T openldap ldappasswd -x -H ldap://localhost -D "cn=head-of-ldap,{{ldap_basedn}}" -w "{{ ldap_admin_password.stdout }}" -s admin "uid=admin,ou=users,{{ldap_basedn}}"
      args:
        chdir: "{{ docker_path }}"
      no_log: true
      when: not admin_init_flag.stat.exists

    - name: Create admin initialization flag
      ansible.builtin.file:
        path: /home/docker/symbios-ui/config/.admin_initialized
        state: touch
        mode: "0640"
        owner: "10000"
        group: "10000"
      when: not admin_init_flag.stat.exists
    - name: Write ldap_admin_password to .ldap_admin_pw for webui
      ansible.builtin.copy:
        dest: /home/docker/symbios-ui/config/.ldap_admin_pw
        content: "{{ ldap_admin_password.stdout }}"
        mode: "0400"
        owner: "10000"
        group: "10000"
      no_log: true

    - name: /usr/local/sbin/runchecks.d/symbios-healthcheck-ldap.check
      ansible.builtin.blockinfile:
        path: /usr/local/sbin/runchecks.d/symbios-healthcheck-ldap.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Healthcheck for openldap (LDAP bind test)
          g_check_file="${g_tmp}/symbios-healthcheck-ldap"
          if [ -f "$g_check_file" ] && find "$g_check_file" -mmin -5 | grep -q "$g_check_file"
          then
            return 2>/dev/null || true
          fi
          date > "$g_check_file"
          g_ldap_ip=$(docker inspect openldap --format '{% raw %}{{range .NetworkSettings.Networks}}{{.IPAddress}}{{"\n"}}{{end}}{% endraw %}' 2>/dev/null | grep '^192\.168\.' | head -1)
          g_ldap_pw=$(cat /home/docker/symbios-ui/config/.ldap_admin_pw 2>/dev/null)
          if [ -z "$g_ldap_ip" ]
          then
            g_echo_error "Healthcheck failed for ldap: cannot determine container IP"
          elif [ -z "$g_ldap_pw" ]
          then
            g_echo_error "Healthcheck failed for ldap: admin password file missing"
          elif ! ldapwhoami -x -H "ldap://${g_ldap_ip}" -D "cn=head-of-ldap,dc=openldap,dc=local" -w "$g_ldap_pw" >/dev/null 2>&1
          then
            g_echo_error "Healthcheck failed for ldap: LDAP bind test failed"
          fi
        backup: yes
        validate: /bin/bash -n %s



    - name: Register playbook as installed
      ansible.builtin.command: /usr/local/sbin/symbios-state.sh set ldap.yml
      changed_when: false
  handlers:

    # Rebuild and restart LDAP container
    - name: Restart ldap
      ansible.builtin.shell: docker compose down 2>/dev/null; docker compose up -d --build
      args:
        chdir: "{{ docker_path }}"


