# docs:
#   short_description: Install system/service health checks
#   description: Deploys the runchecks health-check framework (script + systemd service/timer) that periodically verifies critical services and reports their status.
#   author: Oliver Bohlen
#   version: '1.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: Monitoring / Checks
#   service_control:
#     services:
#     - name: runchecks
#       type: systemd
#       unit: runchecks.service
#       status: systemctl is-active runchecks.service
#     - name: runchecks
#       type: systemd
#       unit: runchecks.timer
#       status: systemctl is-active runchecks.timer
#     logs:
#     - name: runchecks.service
#       command: journalctl -u runchecks.service -n 100
#     - name: runchecks.timer
#       command: journalctl -u runchecks.timer -n 100
#   actions:
#     install: systemctl enable --now runchecks.service ; systemctl enable --now runchecks.timer
#     uninstall: systemctl disable --now runchecks.service ; systemctl disable --now runchecks.timer
#     reinstall: systemctl restart runchecks.service ; systemctl restart runchecks.timer
#     start: systemctl start runchecks.service ; systemctl start runchecks.timer
#     stop: systemctl stop runchecks.service ; systemctl stop runchecks.timer
#     restart: systemctl restart runchecks.service ; systemctl restart runchecks.timer
#     reload: systemctl reload runchecks.service ; systemctl reload runchecks.timer
#

---
- name: Checks
  hosts: all
  tasks:
    - name: Install Packages
      apt:
        name:
          - smartmontools
          - mdadm
        update_cache: no
        install_recommends: no

    - name: Create checks dir /usr/local/sbin/runchecks.d
      ansible.builtin.file:
        path: /usr/local/sbin/runchecks.d
        owner: root
        group: root
        state: directory
        mode: '0700'

    - name: /usr/local/sbin/runchecks.sh
      blockinfile:
        path: /usr/local/sbin/runchecks.sh
        mode: "0500"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Source gaboshlib and set up environment
          . /etc/bash/gaboshlib.include
          g_lockfile
          g_nice
          g_all-to-syslog
          g_echo_ok "Starting $0"
          g_staleumount
          # Main loop - runs forever with 5min intervals
          while true
          do
            g_echo "Waiting 5min"
            sleep 300
            g_echo "Next Loop"
            # Iterate over all .check scripts sorted alphabetically
            for g_check in $(find /usr/local/sbin/runchecks.d -name "*.check" -type f | sort)
            do
              # Validate syntax then source each check script
              if bash -n "$g_check" >$g_tmp/check_error 2>&1
              then
                g_echo "Running: $g_check"
                . "$g_check"
              else
                g_echo_error "Error in $g_check $(cat $g_tmp/check_error)"
                continue
              fi
            done
          done
        backup: yes
        validate: /bin/bash -n %s
      notify:
      - Restart runchecks

    - name: /usr/local/sbin/runchecks.d/services
      lineinfile:
        path: /usr/local/sbin/runchecks.d/services
        create: yes
        insertbefore: EOF
        line: "cron rsyslog sshd"

    - name: /usr/local/sbin/runchecks.sh shebang
      lineinfile:
        path: /usr/local/sbin/runchecks.sh
        insertbefore: BOF
        line: "#!/bin/bash"

    - name: /etc/systemd/system/runchecks.service
      blockinfile:
        path: /etc/systemd/system/runchecks.service
        create: yes
        mode: 0444
        owner: root
        group: root
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          [Unit]
          Description=checks
          After=syslog.target network.target
          
          [Service]
          Type=simple
          User=root
          ExecStart=/usr/local/sbin/runchecks.sh
          Restart=on-abort
          
          [Install]
          WantedBy=multi-user.target
      notify:
      - Restart systemd


    - name: /usr/local/sbin/runchecks.d/disks.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/disks.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Check each block device for SMART health and temperature
          for g_disk in $(find /dev/ \( -name "nvme?" -o -name "sd?" \) \( -type b -o -type c \))
          do
            # Determine if the disk is active (not suspended) by comparing IO stats
            g_dev=$(basename $g_disk)
            [ -f /tmp/${g_dev}-stat ] || cat /sys/block/${g_dev}/stat | perl -pe 's/ +/ /g' | cut -d" " -f1,2,3,4,5,6,7,8 > /tmp/${g_dev}-stat
            cat /sys/block/${g_dev}/stat | perl -pe 's/ +/ /g' | cut -d" " -f1,2,3,4,5,6,7,8 > /tmp/${g_dev}-stat-now
            # If stats are unchanged, disk might be suspended - skip SMART checks
            if diff /tmp/${g_dev}-stat-now /tmp/${g_dev}-stat >/dev/null 2>&1
            then
              cat /tmp/${g_dev}-stat-now >/tmp/${g_dev}-stat
              # Run SMART health check on the disk
              g_opt=""
              udevadm info --query=all -n $g_disk | grep -q usb- && g_opt="-d sat"
              smartctl -H $g_opt $g_disk >${g_tmp}/smartctl
              if ! cat ${g_tmp}/smartctl | grep -E -iq "SMART overall-health self-assessment test result: PASSED|SMART Health Status: OK|Read Device Identity failed: scsi error no medium present"
              then
                g_echo_error "SMART of $g_disk unhealthy: smartctl -H $g_opt $g_disk $(cat ${g_tmp}/smartctl)"
              fi
              # Check disk temperature
              g_temperature=$(smartctl -x $g_opt $g_disk | perl -pe 's/ +/ /g; s/^ //' | grep -E "^194 Temperature_Celsius " | cut -d" " -f 8)
              [ -z "$g_temperature" ] && continue
              [ $g_temperature -gt 55 ] && g_echo_error "SMART temperature of disk $g_disk high ($g_temperature Celsius)"
            fi
          done
        validate: /bin/bash -n %s
        backup: yes
      notify:
      - Restart runchecks

    - name: /usr/local/sbin/runchecks.d/raid-mdadm.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/raid-mdadm.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Check each mdadm RAID array for healthy state
          mdadm -D --scan | grep -E "^ARRAY" | cut -d" " -f2 | while read g_array
          do
            mdadm -D $g_array >$g_tmp/raiddetails
            # Verify array state is clean, active or checking
            if ! cat $g_tmp/raiddetails | grep -E "^ +State : " | grep -E -q "^ +State : clean $|^ +State : active $|^ +State : active, checking $|^ +State : clean, checking $"
            then
              g_echo_error "RAID $g_array state unhealthy - mdadm -D $g_array: $(cat $g_tmp/raiddetails)"
            fi
          done
        validate: /bin/bash -n %s
        backup: yes
      notify:
      - Restart runchecks
    
    - name: /usr/local/sbin/runchecks.d/internet.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/internet.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Ping a known external host to verify internet connectivity
          g_testip=dns3.digitalcourage.de
          if ! ping -c3 ${g_testip} >/dev/null 2>&1
          then
            g_echo_error "No Internet connection? ping $g_testip failed!"
          fi
        validate: /bin/bash -n %s
        backup: yes
      notify:
      - Restart runchecks

    - name: /usr/local/sbin/runchecks.d/processes.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/processes.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Monitor processes in D (uninterruptible), Z (zombie) or R (running) state
          mkdir -p ${g_tmp}/proc-check
          # Clean up processes that are no longer in a monitored state
          ls ${g_tmp}/proc-check | while read g_odzpid
          do
            if ! grep -E -q "^State:.+D \(|State:.+Z \(|State:.+R \(" /proc/$g_odzpid/status 2>/dev/null
            then
              rm ${g_tmp}/proc-check/$g_odzpid
            fi
          done
          # Report processes stuck in monitored state for more than 30 minutes
          grep -E "^State:.+D \(|State:.+Z \(|State:.+R \(" /proc/[0-9]*/status | cut -d/ -f3 | while read g_dzpid
          do
            if [ -f ${g_tmp}/proc-check/$g_dzpid ]
            then
              g_timestamp=$(ls --full-time ${g_tmp}/proc-check/$g_dzpid | sed 's/  */ /g' | cut -d" " -f6,7)
              date >>${g_tmp}/proc-check/$g_dzpid
              touch -d "$g_timestamp" ${g_tmp}/proc-check/$g_dzpid
              if find ${g_tmp}/proc-check/$g_dzpid -mmin +30 | grep -q $g_dzpid
              then
                ps aufx | grep $g_dzpid | grep -v grep >${g_tmp}/proc-check-$g_dzpid.notify
                pstree $g_dzpid >>${g_tmp}/proc-check-$g_dzpid.notify
                cat ${g_tmp}/proc-check/$g_dzpid >>${g_tmp}/proc-check-$g_dzpid.notify
                grep -E -q "usb-storage|md[0-9]*_" ${g_tmp}/proc-check-$g_dzpid.notify || g_echo_error "$(cat ${g_tmp}/proc-check-$g_dzpid.notify)"
              fi
            else
              date >${g_tmp}/proc-check/$g_dzpid
            fi
          done
        backup: yes
        validate: /bin/bash -n %s
      notify:
      - Restart runchecks

    - name: /usr/local/sbin/runchecks.d/thermal.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/thermal.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Check CPU temperature from thermal sysfs interface
          if [ -f /sys/class/thermal/thermal_zone0/temp ]
          then
            let g_temp=`cat /sys/class/thermal/thermal_zone0/temp`/1000
            if [ $g_temp -gt 65 ]
            then
              g_echo_error "Server temperature high $g_temp°C"
            fi
          fi
        backup: yes
        validate: /bin/bash -n %s
      notify:
      - Restart runchecks

    - name: /usr/local/sbin/runchecks.d/measuretemp.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/measuretemp.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Check CPU temperature via vcgencmd on Raspberry Pi
          if which vcgencmd >/dev/null 2>&1
          then
            g_temp=$(vcgencmd measure_temp | grep ^temp= | cut -d"=" -f2 | cut -d. -f1)
            if [ $g_temp -gt 65 ]
            then
              g_echo_error "Server temperature high $g_temp°C"
            fi
          fi
        backup: yes
        validate: /bin/bash -n %s
      notify:
      - Restart runchecks

    - name: /usr/local/sbin/runchecks.d/load.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/load.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Alert if system load average exceeds (number of CPUs + 10)
          let g_maxload=$(cat /proc/cpuinfo | grep ^processor | wc -l)+10
          g_load=`cat /proc/loadavg | cut -d" " -f1`
          g_intload=`echo $g_load | cut -d'.' -f1`
          if [ $g_intload -gt $g_maxload ]
          then
            g_echo_error "System Load high at $g_load"
          fi
        backup: yes
        validate: /bin/bash -n %s
      notify:
      - Restart runchecks

    - name: /usr/local/sbin/runchecks.d/services.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/services.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Verify required system services are running
          for g_service in $(cat /usr/local/sbin/runchecks.d/services | sort)
          do
            if ! ps aux | grep -v grep | grep -q "$g_service"
            then
              g_echo_error "$g_service down"
            fi
          done
        backup: yes
        validate: /bin/bash -n %s
      notify:
      - Restart runchecks

    - name: /usr/local/sbin/runchecks.d/df.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/df.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Alert when any filesystem exceeds 98% disk usage
          df -al | grep -E -v ' - |Mounted on|/rom' | sed 's/  */ /g; s/\%//' | cut -d" " -f1,5 | sort -u | while read g_i
          do
            g_disk=`echo $g_i | cut -d" " -f1`
            g_usa=`echo $g_i | cut -d" " -f2`
            if [ $g_usa -gt 98 ]
            then
              g_echo_error "Space of $g_disk full: $g_usa%"
            fi
          done
        backup: yes
        validate: /bin/bash -n %s
      notify:
      - Restart runchecks

    - name: /usr/local/sbin/runchecks.d/dfinodes.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/dfinodes.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Alert when any filesystem exceeds 98% inode usage
          df -ali | grep -E -v ' - |Mounted on|/rom' | sed 's/  */ /g; s/\%//' | cut -d" " -f1,5 | sort -u | while read g_i
          do
            g_disk=`echo $g_i | cut -d" " -f1`
            g_usa=`echo $g_i | cut -d" " -f2`
            if [ $g_usa -gt 98 ]
            then
              g_echo_error "Inodes if $g_disk full: $g_usa%"
            fi
          done
        backup: yes
        validate: /bin/bash -n %s
      notify:
      - Restart runchecks

    - name: /usr/local/sbin/runchecks.d/freemem.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/freemem.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Alert when free memory drops below 20MB
          g_mem=`free | grep "^Mem:" | sed 's/  */ /g' | cut -d" " -f 4`
          if [ $g_mem -lt 20480 ]
          then
            g_echo_error "Memory full! Free: ${g_mem}kB"
          fi
        backup: yes
        validate: /bin/bash -n %s
      notify:
      - Restart runchecks

    - name: /usr/local/sbin/runchecks.d/freeswap.check
      blockinfile:
        path: /usr/local/sbin/runchecks.d/freeswap.check
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Alert when swap is active and free space drops below 50MB
          if ! [ $(free | grep "^Swap:" | sed 's/  */ /g' | cut -d" " -f 2) == 0 ]
          then
            g_mem=`free | grep "^Swap:" | sed 's/  */ /g' | cut -d" " -f 4`
            if [ $g_mem -lt 50000 ]
            then
              g_echo_error "Swap full! Free: ${g_mem}kB"
            fi
          fi
        backup: yes
        validate: /bin/bash -n %s
      notify:
      - Restart runchecks

    - name: 'add runchecks to startup'
      command: systemctl enable runchecks
      args:
        creates: /etc/systemd/system/multi-user.target.wants/runchecks.service


  handlers:

    - name: Restart systemd
      ansible.builtin.shell: systemctl daemon-reload
      notify: Restart runchecks

    - name: Restart runchecks
      service:
        name: runchecks
        state: restarted
