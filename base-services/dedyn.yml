# docs:
#   short_description: Configure desec.de dynamic DNS
#   description: Sets up dyndns updates against desec (dedyn.io) so the public DNS record follows the host's current IP address. Also restarts Traefik when the IP changes. Runs as a cron job.
#   author: Oliver Bohlen
#   version: '1.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: DNS / Network
#   service_control:
#     services:
#     - name: dedyn
#       type: cron
#       file: /etc/cron.d/dedyn_local
#       status: test -f /etc/cron.d/dedyn_local || exit 2
#     logs:
#     - name: dedyn
#       command: tail -F /var/log/syslog | grep dedyn
#   actions:
#     enable: sed -i 's/^#//' /etc/cron.d/dedyn_local
#     disable: sed -i 's/^/#/' /etc/cron.d/dedyn_local
#     run now: /usr/local/sbin/dedyn.sh
#

---
- name: desec dyndns
  hosts: all
  tasks:
    - name: Needed software
      apt:
        name:
          - curl
        update_cache: no
        install_recommends: no

    - name: /usr/local/sbin/dedyn.sh
      ansible.builtin.copy:
        src: /home/SymbiOS/scripts/dedyn.sh
        dest: /usr/local/sbin/dedyn.sh
        mode: "0500"
        owner: root
        group: root
        backup: yes

    - name: /etc/cron.d/dedyn_local
      blockinfile:
        path: /etc/cron.d/dedyn_local
        create: yes
        mode: 0644
        owner: root
        group: root
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          */5 * * * * root /usr/local/sbin/dedyn.sh >/dev/null 2>&1
        backup: yes

    - name: /etc/cron.d/host-ip
      blockinfile:
        path: /etc/cron.d/host-ip
        create: yes
        mode: 0644
        owner: root
        group: root
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          */5 * * * * root /usr/local/sbin/update_host_ip.sh
        backup: yes

    - name: /usr/local/sbin/update_host_ip.sh
      ansible.builtin.copy:
        dest: /usr/local/sbin/update_host_ip.sh
        mode: "0755"
        content: |
          #!/bin/bash
          # Write host primary LAN IP for webui container
          ip route get 1.1.1.1 2>/dev/null | grep -oP "src \K[0-9.]+" > /home/docker/symbios-ui/config/.host-ip
 
    - name: /usr/local/etc/dedyn.conf
      blockinfile:
        path: /usr/local/etc/dedyn.conf
        mode: "0500"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          dedynpw="{{ ddns_apikey }}"
          dedynhosts="{{ ddns_host | default('') }}"
          doipv6="{{ ddns_ipv6 | default('') }}"
        backup: yes
        validate: /bin/bash -n %s
      when: ddns_host is defined and ddns_host | length > 0


    - name: Register playbook as installed
      ansible.builtin.command: symbios-state.sh set base-services/dedyn.yml
      changed_when: false
