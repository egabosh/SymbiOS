# docs:
#   short_description: Deploy the SymbiOS WebUI
#   description: Builds and runs the SymbiOS web interface (Django/gunicorn), wires it to Traefik/Authelia, and configures the loopback break-glass and the audit-logging SSH executor.
#   author: Oliver Bohlen
#   version: '1.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: WebUI
#   service_control:
#     services:
#     - name: symbios-ui
#       type: docker
#       compose_file: /home/docker/symbios-ui/docker-compose.yml
#       status: test -d /home/docker/symbios-ui || exit 2; docker compose -f /home/docker/symbios-ui/docker-compose.yml ps | grep -q "Up "
#     logs:
#     - name: symbios-ui
#       command: docker compose -f /home/docker/symbios-ui/docker-compose.yml logs -f --tail=1000
#   actions:

---
- name: symbios-ui
  hosts: all

  vars:
    service_name: "symbios-ui"
    symbios_domain: "{{ base_domain }}"
    authelia_domain: "auth.{{ base_domain }}"
    traefik_domain: "traefik.{{ base_domain }}"
    service_domain: "{{ symbios_domain }}"
    docker_path: "/home/docker/{{ service_name }}"

  tasks:

    - name: Create required directories
      ansible.builtin.file:
        path: "{{ docker_path }}/{{ item.path }}"
        owner: "{{ item.owner }}"
        group: "{{ item.group }}"
        mode: "{{ item.mode }}"
        state: directory
      loop:
        - { path: "", owner: root, group: docker, mode: "0550" }
        - { path: "log", owner: "10000", group: "10000", mode: "0770" }
        - { path: "config", owner: "10000", group: "10000", mode: "0770" }
        - { path: "config/.ssh", owner: "10000", group: "10000", mode: "0770" }
        - { path: "webui", owner: "10000", group: "10000", mode: "0770" }

    - name: Dockerfile
      ansible.builtin.copy:
        src: /home/SymbiOS/webui/Dockerfile
        dest: "{{ docker_path }}/Dockerfile"
        owner: root
        group: docker
        mode: "0440"
      notify: Restart {{ service_name }}

    - name: docker-compose.yml
      ansible.builtin.blockinfile:
        path: "{{ docker_path }}/docker-compose.yml"
        create: yes
        mode: "0440"
        owner: root
        group: docker
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          services:

            symbios-webui:
              build:
                context: .
                dockerfile: Dockerfile
              ports:
                # Published only on the loopback interface. The WebUI is reached
                # externally only through Traefik + Authelia on :443; 127.0.0.1:8080
                # is the host-local break-glass (e.g. via SSH tunnel).
                - "127.0.0.1:8080:8080"
              volumes:
                - ./webui:/app
                - ./config:/config
                - ./log:/log
                - /var/log:/var/log:ro
                - /var/lib/docker/containers:/docker/containers:ro
                - /root/.ssh/authorized_keys:/root-host-keys:ro
                # Playbook sources, read-only, so the WebUI can parse the
                # machine-readable '# docs:' blocks locally (no host helper).
                - /home/SymbiOS:/repo:ro
                - type: tmpfs
                  target: /app/db
                  tmpfs:
                    mode: 511
              restart: unless-stopped
              environment:
                - PYTHONUNBUFFERED=1
                - CONFIG_PATH=/config/inventory.yml
                - LDAP_URI=ldap://openldap
                - HOME=/app
                - DJANGO_SECRET_KEY={{ lookup("password", "/home/docker/symbios-ui/.django_secret_key length=50 chars=ascii_letters,digits") }}
              extra_hosts:
                - "host.docker.internal:host-gateway"
              networks:
                traefik:
                  aliases:
                    - symbios-ui

          networks:
            traefik:
              external: true
        backup: yes
      notify: Restart {{ service_name }}

    - name: Sync webui source
      ansible.builtin.copy:
        src: /home/SymbiOS/webui/
        dest: "{{ docker_path }}/webui/"
        mode: preserve
        owner: "10000"
        group: "10000"
        # Keep synced directories aligned with "Create required directories" so
        # the directory mode (0770) and ownership (10000:10000) stay stable across
        # runs; otherwise this task would reset the webui dir and flip it back.
        directory_mode: "0770"
      notify: Restart {{ service_name }}

    - name: Remove obsolete WebUI files (DB-free auth refactor)
      ansible.builtin.file:
        path: "{{ docker_path }}/webui/{{ item }}"
        state: absent
      loop:
        - main/backends.py
        - main/management/commands/initial_setup.py
        - main/templates/main/login.html

    - name: Set permissions
      # Add others-read to files only. Recursing into directories would flip
      # their mode (e.g. 0770 -> 0774) and make the "Create required
      # directories" webui assertion report changed on every run. The container
      # user (uid 10000) traverses via the group rwx bits, so dirs are left alone.
      ansible.builtin.command:
        cmd: "find {{ docker_path }}/webui -type f -exec chmod o+r {} +"
      changed_when: false

    - name: Copy symbios-exec.sh wrapper
      ansible.builtin.copy:
        src: /home/SymbiOS/symbios-exec.sh
        dest: /usr/local/sbin/symbios-exec.sh
        owner: root
        group: root
        mode: "0755"

    - name: Generate SSH key for webui remote execution
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -f /home/docker/symbios-ui/config/.ssh/id_symbios -N "" -C "symbios-webui"
        creates: /home/docker/symbios-ui/config/.ssh/id_symbios

    - name: Fix permissions on SSH key
      ansible.builtin.file:
        path: /home/docker/symbios-ui/config/.ssh/{{ item.path }}
        owner: root
        group: "10000"
        mode: "{{ item.mode }}"
      loop:
        - { path: id_symbios, mode: "640" }
        - { path: id_symbios.pub, mode: "644" }

    - name: Read SSH public key
      ansible.builtin.slurp:
        src: /home/docker/symbios-ui/config/.ssh/id_symbios.pub
      register: symbios_ssh_pubkey_raw

    - name: Set webserver SSH pubkey fact
      ansible.builtin.set_fact:
        symbios_ssh_pubkey: "{{ symbios_ssh_pubkey_raw.content | b64decode | trim }}"

    - name: Add webui SSH key to root authorized_keys
      ansible.builtin.lineinfile:
        path: /root/.ssh/authorized_keys
        regexp: ".*symbios-webui$"
        line: '{{ symbios_ssh_pubkey }}'
        mode: "0644"
        create: yes

    - name: Make authorized_keys readable by the WebUI container
      ansible.builtin.file:
        path: /root/.ssh/authorized_keys
        mode: "0644"

    - name: Copy container-index.sh
      ansible.builtin.copy:
        dest: /usr/local/bin/symbios-container-index.sh
        content: |
          #!/bin/bash

          # Index file storing Docker container information
          g_index_file=/home/docker/symbios-ui/log/docker-containers.tsv
          g_temp_file="${g_index_file}.tmp"

          # Write current container list to temp file
          docker ps --no-trunc --format '{% raw %}{{.ID}}\t{{.Names}}{% endraw %}' > "$g_temp_file" 2>/dev/null

          # Atomically replace index file
          mv "$g_temp_file" "$g_index_file"

          # Set permissions on index file
          chmod 644 "$g_index_file"

          # Grant read and execute on containers directory
          setfacl -m u:10000:rx /var/lib/docker/containers/ 2>/dev/null

          # Grant read and execute on each container subdirectory
          for d in /var/lib/docker/containers/*/
          do
            setfacl -m u:10000:rx "$d" 2>/dev/null
          done

          # Grant read permission on each JSON log file
          for f in /var/lib/docker/containers/*/*-json.log
          do
            setfacl -m u:10000:r "$f" 2>/dev/null
          done
        mode: "0755"
        owner: root
        group: root

    - name: Copy service-status.sh
      ansible.builtin.copy:
        dest: /usr/local/bin/symbios-service-status.sh
        content: |
          #!/bin/bash

          # File storing system service statuses
          g_file=/home/docker/symbios-ui/log/symbios-services.tsv
          g_tmp="${g_file}.tmp"

          # Write status for each service to temp file
          # No system services to track currently
          echo -e "" > "$g_tmp"

          # Set permissions on temp file
          chmod 644 "$g_tmp"

          # Atomically replace status file
          mv "$g_tmp" "$g_file"
        mode: "0755"
        owner: root
        group: root

    - name: Install container-index systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/symbios-container-index.service
        content: |
          [Unit]
          Description=Write Docker container index to /var/run
          After=docker.service

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/symbios-container-index.sh
          User=root
          Group=root

    - name: Install container-index systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/symbios-container-index.timer
        content: |
          [Unit]
          Description=Update Docker container index every 60s

          [Timer]
          OnBootSec=30
          OnUnitActiveSec=60
          Unit=symbios-container-index.service

          [Install]
          WantedBy=timers.target

    - name: Install service-status systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/symbios-service-status.service
        content: |
          [Unit]
          Description=Write system service statuses to /var/run

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/symbios-service-status.sh
          User=root
          Group=root

    - name: Install service-status systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/symbios-service-status.timer
        content: |
          [Unit]
          Description=Update service statuses every 60s

          [Timer]
          OnBootSec=35
          OnUnitActiveSec=60
          Unit=symbios-service-status.service

          [Install]
          WantedBy=timers.target

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable container-index timer
      ansible.builtin.systemd:
        name: symbios-container-index.timer
        enabled: yes
        state: started

    - name: Enable service-status timer
      ansible.builtin.systemd:
        name: symbios-service-status.timer
        enabled: yes
        state: started

    - name: Inventory must be owned by the WebUI user so the UI can read/write it
      ansible.builtin.file:
        path: "{{ docker_path }}/config/inventory.yml"
        owner: "10000"
        group: "10000"
        mode: "0640"

    - name: Remove LAN-only 8080 firewall (port now bound to loopback only)
      # The published port is restricted to 127.0.0.1, so the DOCKER-USER
      # rules are no longer needed. Flush any stale rules left from earlier.
      ansible.builtin.shell: |
        nft flush chain ip filter DOCKER-USER 2>/dev/null || true
        nft flush chain ip6 filter DOCKER-USER 2>/dev/null || true
      changed_when: false

    - name: Disable LAN restriction service
      # Do NOT mask here: masking creates a /dev/null symlink at the unit path,
      # which the "Remove LAN restriction unit file" task then deletes every run,
      # causing a non-idempotent changed loop. The unit file itself is removed below.
      ansible.builtin.systemd:
        name: symbios-lan-8080.service
        enabled: no
        state: stopped
      failed_when: false

    - name: Remove LAN restriction unit file
      ansible.builtin.file:
        path: /etc/systemd/system/symbios-lan-8080.service
        state: absent

    - name: Reload systemd after unit removal
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Remove LAN restriction script
      ansible.builtin.file:
        path: /usr/local/sbin/symbios-lan-8080.sh
        state: absent

    - name: Ensure symbios-ui container is running
      ansible.builtin.shell: docker compose up -d
      args:
        chdir: "{{ docker_path }}"
      changed_when: false

    - name: Seed pinned SSH known_hosts for exec gateway
      # Pin the host key used by the WebUI's SSH exec path. The WebUI connects
      # to host.docker.internal:22; we record the real host key (from 127.0.0.1)
      # under that hostname and under every IP the container resolves it to, so
      # paramiko's RejectPolicy accepts the gateway but rejects any changed key.
      ansible.builtin.shell: |
        set -e
        KH="{{ docker_path }}/config/.ssh/known_hosts"
        ct=$(docker ps --filter "name=symbios-webui" --format "{{ '{{' }}.Names{{ '}}' }}" | head -1)
        tmp=$(mktemp)
        ssh-keyscan -t ed25519,ecdsa,rsa -p 22 127.0.0.1 > "$tmp" 2>/dev/null || true
        if [ ! -s "$tmp" ]; then
          echo "ssh-keyscan failed" >&2
          exit 1
        fi
        tokens="host.docker.internal,localhost,127.0.0.1"
        if [ -n "$ct" ]; then
          for ip in $(docker exec "$ct" getent hosts host.docker.internal 2>/dev/null | awk '{print $1}'); do
            case "$ip" in *:*) ip="[$ip]";; esac
            tokens="$tokens,$ip"
          done
        fi
        : > "$KH"
        while read -r line; do
          case "$line" in \#*) continue;; esac
          keytype=$(echo "$line" | awk '{print $2}')
          key=$(echo "$line" | awk '{print $3}')
          [ -z "$keytype" ] && continue
          echo "$tokens $keytype $key" >> "$KH"
        done < "$tmp"
        chmod 644 "$KH"
        chown root:10000 "$KH"
        rm -f "$tmp"
      args:
        executable: /bin/bash
      changed_when: false

    - name: /usr/local/sbin/autoupdate.d/symbios.update
      # Drop-in for the autoupdate.d dispatcher (run nightly by cron). It pulls
      # the SymbiOS git repository and redeploys the WebUI from it. Gaboshlib
      # (g_echo_*) is sourced by /usr/local/sbin/autoupdate.sh before this runs.
      blockinfile:
        path: /usr/local/sbin/autoupdate.d/symbios.update
        mode: "0400"
        owner: root
        group: root
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          # Update SymbiOS from git and redeploy the WebUI. Executed automatically
          # by the autoupdate.d dispatcher (/usr/local/sbin/autoupdate.sh, cron).
          # Clone source and target directory; override them via the environment
          # if a non-default setup is required.
          g_repo_url="${SYMBIOS_REPO_URL:-https://github.com/egabosh/SymbiOS.git}"
          g_symbios_dir="${SYMBIOS_DIR:-/home/SymbiOS}"

          # Pull when a checkout already exists, otherwise clone it fresh.
          if [[ -d "$g_symbios_dir/.git" ]]
          then
            g_echo_ok "Updating SymbiOS repository in $g_symbios_dir"
            cd "$g_symbios_dir" || exit 1
            # Use the currently checked-out branch so we don't assume "main".
            g_branch="$(git rev-parse --abbrev-ref HEAD)"
            # Ensure the remote uses the expected URL (may have been cloned
            # via SSH which fails without keys; override to HTTPS).
            git remote set-url origin "$g_repo_url" 2>/dev/null || true
            # Fetch upstream first so we can tell fast-forward from divergence.
            git fetch origin || g_echo_error "git fetch failed"
            # Fast-forward when possible. If the local checkout has diverged
            # (it carries commits not present upstream), stash local changes,
            # merge, then restore them. Conflicts are warned about but never
            # silently discarded.
            if git merge --ff-only "origin/$g_branch"
            then
              g_echo_ok "SymbiOS repository updated"
            else
              g_echo_warn "Local checkout diverged; stashing local changes"
              git stash push -m "autoupdate-stash" || g_echo_error "git stash failed"
              if git merge --ff-only "origin/$g_branch"
              then
                g_echo_ok "SymbiOS repository updated"
              else
                g_echo_error "Merge still failed after stash; resetting to origin/$g_branch"
                git reset --hard "origin/$g_branch" || g_echo_error "git reset failed"
              fi
              if ! git stash pop
              then
                g_echo_warn "Stash pop had conflicts — resolve manually or git checkout --theirs <file>"
              fi
            fi
          elif [[ -d "$g_symbios_dir" ]] && [[ -n "$(ls -A "$g_symbios_dir" 2>/dev/null)" ]]
          then
            g_echo_warn "$g_symbios_dir is not a git repository; skipping git update"
          else
            g_echo_ok "Cloning SymbiOS repository to $g_symbios_dir"
            git clone "$g_repo_url" "$g_symbios_dir" || g_echo_error "git clone failed"
          fi

          # Redeploy the WebUI from the refreshed repository when able.
          if [[ -f "$g_symbios_dir/base-services/symbios-ui.yml" ]] && command -v ansible-playbook >/dev/null 2>&1
          then
            g_echo_ok "Redeploying SymbiOS WebUI"
            cd "$g_symbios_dir" || exit 1
            ansible-playbook --connection=local \
              --inventory /home/docker/symbios-ui/config/inventory.yml \
              --limit localhost \
              -e "ansible_python_interpreter=/usr/bin/python3" \
              base-services/symbios-ui.yml || g_echo_error "WebUI redeploy failed"
          else
            g_echo_warn "ansible-playbook or symbios-ui playbook missing; skipping WebUI redeploy"
          fi
        backup: yes
        validate: /bin/bash -n %s

  handlers:

    - name: Restart {{ service_name }}
      ansible.builtin.shell: |
        if docker compose build --no-cache
        then
          if docker compose down
          then
            docker compose up -d
          fi
        fi
      args:
        chdir: "{{ docker_path }}"

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: yes

