# docs:
#   short_description: Re-assert WebUI exec-gateway SSH key
#   description: Ensures the WebUI exec-gateway key is always present in /root/.ssh/authorized_keys. The WebUI writes user keys directly via SSH exec; this playbook only re-asserts the system key.
#   author: Oliver Bohlen
#   version: '2.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: SSH / Access
#   service_control:
#     services:
#     - name: ssh
#       type: systemd
#       unit: ssh.service
#       status: systemctl is-active ssh.service
#     logs:
#     - name: ssh.service
#       command: journalctl -fu ssh.service -n 1000
#   actions:

- name: Re-assert WebUI exec-gateway SSH key
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Ensure .ssh directory exists
      file:
        path: /root/.ssh
        state: directory
        mode: "0700"
        owner: root
        group: root
      become: yes

    - name: Read webui SSH public key
      ansible.builtin.slurp:
        src: /home/docker/symbios-ui/config/.ssh/id_symbios.pub
      register: symbios_ssh_pubkey_raw

    - name: Re-assert webui exec-gateway key (never removed by key edits)
      ansible.builtin.lineinfile:
        path: /root/.ssh/authorized_keys
        regexp: ".*symbios-webui$"
        line: '{{ symbios_ssh_pubkey_raw.content | b64decode | trim }}'
        mode: "0644"
      become: yes

    - name: Deploy healthcheck for remote SSH
      ansible.builtin.blockinfile:
        path: /usr/local/sbin/runchecks.d/symbios-healthcheck-remote-ssh.check
        mode: "0400"
        create: yes
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
        block: |
          g_check_file="${g_tmp}/symbios-healthcheck-remote-ssh"
          if [ -f "$g_check_file" ] && find "$g_check_file" -mmin -5 | grep -q "$g_check_file"
          then
            return 2>/dev/null || true
          fi
          date > "$g_check_file"

          if [ ! -f "/home/docker/symbios-ui/config/.ssh/id_symbios" ]
          then
            g_echo_error "Remote SSH exec key missing at /home/docker/symbios-ui/config/.ssh/id_symbios"
          fi

          if ! timeout 3 bash -c 'echo > /dev/tcp/192.168.41.1/22' >/dev/null 2>&1
          then
            g_echo_error "Cannot reach host SSH on 192.168.41.1:22"
          fi
        backup: yes
        validate: /bin/bash -n %s

    - name: Register playbook as installed
      ansible.builtin.command: /usr/local/sbin/symbios-state.sh set base-services/ssh-keys.yml
      changed_when: false
