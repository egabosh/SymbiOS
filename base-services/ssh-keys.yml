# docs:
#   short_description: Deploy managed SSH authorized_keys
#   description: Distributes managed SSH authorized_keys from the inventory to users/hosts and protects the WebUI exec-gateway key. Reloads sshd after changes.
#   author: Oliver Bohlen
#   version: '1.0'
#   license: GPLv3
#   copyright: Copyright 2026, Oliver Bohlen
#   min_ansible_version: '2.11'
#   platforms:
#   - name: Debian
#     versions:
#     - '13'
#   category: SSH / Access
#   service_control:
#     services:
#     - name: ssh
#       type: systemd
#       unit: ssh.service
#       status: systemctl is-active ssh.service
#     logs:
#     - name: ssh.service
#       command: journalctl -fu ssh.service -n 1000
#   actions:

- name: Deploy SSH authorized keys
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Ensure .ssh directory exists
      file:
        path: /root/.ssh
        state: directory
        mode: "0700"
        owner: root
        group: root
      become: yes

    - name: Write authorized_keys from inventory
      copy:
        dest: /root/.ssh/authorized_keys
        content: |
          {% for key in ssh_authorized_keys | default([]) %}
          {{ key }}
          {% endfor %}
        mode: "0644"
        owner: root
        group: root
      become: yes

    - name: Read webui SSH public key
      ansible.builtin.slurp:
        src: /home/docker/symbios-ui/config/.ssh/id_symbios.pub
      register: symbios_ssh_pubkey_raw

    - name: Re-assert webui exec-gateway key (never removed by key edits)
      ansible.builtin.lineinfile:
        path: /root/.ssh/authorized_keys
        regexp: ".*symbios-webui$"
        line: '{{ symbios_ssh_pubkey_raw.content | b64decode | trim }}'
        mode: "0644"
      become: yes
