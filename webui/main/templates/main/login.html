<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SymbiOS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #343a40; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    </style>
</head>
<body>
    <div class="card shadow" style="max-width:400px;width:100%">
        <div class="card-body p-4">
            <div class="text-center mb-3">
                <h3>SymbiOS</h3>
                <p class="text-muted">Server Management</p>
            </div>
            {% if form.errors %}
            <div class="alert alert-danger">Invalid username or password.</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>
            <hr>
            <p class="text-center text-muted small mb-0">
                <i class="bi bi-shield-check"></i>
                Single Sign-On via <a href="#" id="authelia-link">Authelia</a>
            </p>
        </div>
    </div>
    <script>
        (function() {
            var host = window.location.hostname;
            var authDomain = host.replace(/^[^.]+\./, 'auth.');
            if (authDomain === host) authDomain = 'auth.' + host;
            document.getElementById('authelia-link').href = 'https://' + authDomain + '/';
        })();
    </script>
</body>
</html>
