{% regroup all_services by group as groups %}
<ul class="nav flex-column">
  {% for g in groups %}
    <li class="nav-item mt-2 mb-1">
      <small class="text-muted text-uppercase fw-bold">{{ g.grouper }}</small>
    </li>
    {% for svc in g.list %}
      <li class="nav-item mb-1">
        <a class="nav-link d-flex align-items-center gap-2 py-1 {% if svc.group == 'base-services' %}text-secondary{% endif %}"
           href="/services/{{ svc.playbook }}/">
          <i class="bi bi-box"></i>
          <span>{{ svc.menu_label }}</span>
          {% if svc.group == 'base-services' %}
            <span class="badge bg-info ms-1" style="font-size:0.55rem;">built-in</span>
          {% endif %}
        </a>
      </li>
    {% endfor %}
  {% empty %}
    <li class="nav-item px-3"><small class="text-muted">No services available</small></li>
  {% endfor %}
</ul>
