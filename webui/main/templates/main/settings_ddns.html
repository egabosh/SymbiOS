{% extends "main/base.html" %}
{% block sidebar %}
    {% include "main/sidebar_settings.html" %}
{% endblock %}
{% block content %}
<h2>Dynamic DNS Settings (deSEC)</h2>

{% if messages %}
{% for message in messages %}
<div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
    {{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endfor %}
{% endif %}

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">API Key</label>
                    <input type="password" class="form-control" name="ddns_apikey" value="{{ vars.ddns_apikey|default:'' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Host</label>
                    <input type="text" class="form-control" name="ddns_host" value="{{ vars.ddns_host|default:'' }}" placeholder="myserver.dedyn.io">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">IPv6 Address</label>
                    <input type="text" class="form-control" name="ddns_ipv6" value="{{ vars.ddns_ipv6|default:'' }}">
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
</div>
{% endblock %}
