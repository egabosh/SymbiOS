{% extends "main/base.html" %}
{% load static %}
{% block title %}System Health - SymbiOS WebUI{% endblock %}
{% block sidebar %}{% endblock %}
{% block sidebar_col_class %}d-none{% endblock %}
{% block content %}
<h2><i class="bi bi-heart-pulse"></i> System Health</h2>

<div id="health-container" class="row g-3 mt-2">
  <div class="col-12 text-center">
    <div class="spinner-border" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
</div>

<script>
  const HEALTH_INTERVAL_MS = 15000;

  function statusIcon(status) {
    if (status === 'ok') return '<i class="bi bi-check-circle-fill text-success"></i>';
    if (status === 'warn') return '<i class="bi bi-exclamation-triangle-fill text-warning"></i>';
    if (status === 'error') return '<i class="bi bi-x-circle-fill text-danger"></i>';
    return '<i class="bi bi-question-circle-fill text-secondary"></i>';
  }

  function statusBadge(status) {
    if (status === 'ok') return '<span class="badge bg-success">OK</span>';
    if (status === 'warn') return '<span class="badge bg-warning text-dark">Warning</span>';
    if (status === 'error') return '<span class="badge bg-danger">Error</span>';
    return '<span class="badge bg-secondary">Unknown</span>';
  }

  function escapeHtml(text) {
    if (!text) return '';
    const d = document.createElement('div');
    d.appendChild(document.createTextNode(text));
    return d.innerHTML;
  }

  async function fetchHealth() {
    const expanded = new Set();
    document.querySelectorAll('.collapse.show').forEach(el => {
      if (el.id) expanded.add(el.id);
    });

    try {
      const resp = await fetch('/health/data/');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();

      const rc = data.runchecks || {};
      const status = rc.status || 'unknown';
      const lastRun = rc.last_run || 'unknown';
      const results = rc.results || [];

      let okCount = 0, warnCount = 0, errorCount = 0;
      results.forEach(r => {
        if (r.status === 'ok') okCount++;
        else if (r.status === 'warn') warnCount++;
        else if (r.status === 'error') errorCount++;
      });

      const overallBadge = errorCount > 0
        ? '<span class="badge bg-danger fs-5 me-2"><i class="bi bi-x-circle-fill"></i> ' + errorCount + ' Error' + (errorCount > 1 ? 's' : '') + '</span>'
        : warnCount > 0
        ? '<span class="badge bg-warning text-dark fs-5 me-2"><i class="bi bi-exclamation-triangle-fill"></i> ' + warnCount + ' Warning' + (warnCount > 1 ? 's' : '') + '</span>'
        : '<span class="badge bg-success fs-5"><i class="bi bi-check-circle-fill"></i> All OK</span>';

      let tableRows = '';
      results.forEach(r => {
        tableRows += '<tr>' +
          '<td style="width:30px">' + statusIcon(r.status) + '</td>' +
          '<td class="fw-semibold">' + escapeHtml(r.name) + '</td>' +
          '<td class="text-muted">' + escapeHtml(r.message || '') + '</td>' +
          '</tr>';
      });

      document.getElementById('health-container').innerHTML =
        '<div class="col-12 mb-3">' +
        '<div class="d-flex align-items-center gap-3">' + overallBadge +
        '<span class="text-muted small">' + results.length + ' checks &mdash; last run: ' + escapeHtml(lastRun) + '</span>' +
        '</div></div>' +
        '<div class="col-12">' +
        '<div class="card border-' + (status === 'ok' ? 'success' : status === 'warn' ? 'warning' : 'danger') + '">' +
        '<div class="card-body">' +
        '<h6 class="card-title">Runchecks Results</h6>' +
        '<div class="table-responsive">' +
        '<table class="table table-sm table-borderless align-middle mb-0">' +
        '<tbody>' + tableRows + '</tbody></table>' +
        '</div></div></div></div>';

      expanded.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.add('show');
      });
    } catch (e) {
      document.getElementById('health-container').innerHTML =
        '<div class="col-12"><div class="alert alert-danger">Error fetching health data: ' + e.message + '</div></div>';
    }
  }

  fetchHealth();
  setInterval(fetchHealth, HEALTH_INTERVAL_MS);
</script>

<style>
  .health-card { cursor: pointer; transition: transform .15s, box-shadow .15s; }
  .health-card:hover { transform: translateY(-2px); box-shadow: 0 .25rem .5rem rgba(0,0,0,.1); }
</style>
{% endblock %}
