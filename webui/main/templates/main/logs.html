{% extends "main/base.html" %}
{% block content %}
<h2>Logs</h2>

<div class="row mb-3">
  <div class="col-md-6">
    <label for="log-select" class="form-label">Select log file</label>
    <div class="input-group">
      <select id="log-select" class="form-select">
        <optgroup label="System Logs">
          <option value="symbios" {% if default_log_name == "symbios" %}selected{% endif %}>symbios.log</option>
          <option value="dedyn" {% if default_log_name == "dedyn" %}selected{% endif %}>dedyn.log (DDNS)</option>
          <option value="messages" {% if default_log_name == "messages" %}selected{% endif %}>/var/log/messages</option>
          <option value="syslog" {% if default_log_name == "syslog" %}selected{% endif %}>/var/log/syslog</option>
        </optgroup>
        <optgroup label="Docker Containers" id="docker-optgroup">
          <option value="" disabled>Loading containers...</option>
        </optgroup>
      </select>
    </div>
  </div>
</div>

<div id="log-meta" class="mb-2 text-muted" style="font-size: 0.9rem;">
</div>

<div id="log-container"></div>

<script>
    let currentLogName = "{{ default_log_name|default:'symbios' }}";
    let currentOffset = 0;
    let autoScroll = true;

    const logContainer = document.getElementById('log-container');
    const logMeta = document.getElementById('log-meta');
    const logSelect = document.getElementById('log-select');
    const dockerGroup = document.getElementById('docker-optgroup');

    logContainer.addEventListener('scroll', () => {
        const nearBottom = logContainer.scrollHeight - logContainer.scrollTop - logContainer.clientHeight < 20;
        autoScroll = nearBottom;
    });

    // Fetch Docker container list
    async function loadDockerContainers() {
        try {
            const resp = await fetch('/logs/containers/');
            if (!resp.ok) return;
            const data = await resp.json();
            dockerGroup.innerHTML = '';
            if (data.containers && data.containers.length > 0) {
                data.containers.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = 'docker:' + c.id;
                    opt.textContent = c.name + ' (' + c.short_id + ')';
                    dockerGroup.appendChild(opt);
                });
            } else {
                const opt = document.createElement('option');
                opt.disabled = true;
                opt.textContent = 'No containers found';
                dockerGroup.appendChild(opt);
            }
        } catch (e) {
            dockerGroup.innerHTML = '<option value="" disabled>Error loading containers</option>';
        }
    }

    function setLogName(newName) {
        currentLogName = newName;
        currentOffset = 0;
        logContainer.innerHTML = '';
        logMeta.textContent = 'Loading log "' + currentLogName + '" ...';
        fetchLogs();
    }

    logSelect.addEventListener('change', () => {
        setLogName(logSelect.value);
    });

    async function fetchLogs() {
        const params = new URLSearchParams();
        params.set('log', currentLogName);
        params.set('offset', String(currentOffset));

        try {
            const response = await fetch('/logs/stream/?' + params.toString());
            if (!response.ok) {
                logMeta.textContent = 'Error loading log "' + currentLogName + '": HTTP ' + response.status;
                return;
            }
            const data = await response.json();

            if (data.error) {
                logMeta.textContent = 'Error: ' + data.error + ' (' + (data.path || '') + ')';
                return;
            }

            logMeta.textContent = 'Showing log "' + (data.log_name || currentLogName) + '" at ' + (data.path || '') +
                ' | total lines: ' + data.total_lines;

            if (currentOffset === 0) {
                logContainer.innerHTML = data.lines.join('');
            } else {
                if (data.lines && data.lines.length > 0) {
                    logContainer.innerHTML += data.lines.join('');
                }
            }

            currentOffset = data.total_lines;

            if (autoScroll) {
                logContainer.scrollTop = logContainer.scrollHeight;
            }
        } catch (e) {
            console.error('Error fetching logs', e);
            logMeta.textContent = 'Error fetching logs: ' + e;
        }
    }

    loadDockerContainers();
    fetchLogs();
    const POLL_INTERVAL_MS = 2000;
    setInterval(fetchLogs, POLL_INTERVAL_MS);
</script>
<script>
    function resizeLogContainer() {
        const logContainer = document.getElementById('log-container');
        if (!logContainer) return;
        const rect = logContainer.getBoundingClientRect();
        const available = window.innerHeight - rect.top - 20;
        logContainer.style.height = available + 'px';
    }

    window.addEventListener('load', resizeLogContainer);
    window.addEventListener('resize', resizeLogContainer);
</script>
{% endblock %}
